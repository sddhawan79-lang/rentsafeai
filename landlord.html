<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rent Safe AI — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1E3D;--navy-mid:#132847;
  --green:#00C896;--green-dark:#009970;--green-bg:rgba(0,200,150,0.1);
  --blue:#3B6FE8;--blue-bg:rgba(59,111,232,0.09);
  --red:#E53E3E;--red-bg:rgba(229,62,62,0.09);
  --amber:#D97706;--amber-bg:rgba(217,119,6,0.09);
  --white:#fff;--off:#F6F8FB;--border:#E4EAF1;
  --txt:#1A2B45;--muted:#7A8FA6;
  --font:'DM Sans',system-ui,sans-serif;
  --disp:'DM Serif Display',Georgia,serif;
  --sb:228px;
}
html,body{height:100%;font-family:var(--font);color:var(--txt);background:var(--off);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
/* ── APP LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}
/* ── SIDEBAR ── */
.sidebar{width:220px;min-width:220px;background:#0B1E3D;display:flex;flex-direction:column;height:100vh;position:relative;z-index:100}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sb-logo a{font-family:var(--disp);font-size:17px;color:#fff;text-decoration:none;display:block}
.sb-logo a span{color:var(--green)}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-nav::-webkit-scrollbar{display:none}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 16px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);cursor:pointer;border:none;background:none;font-family:var(--font);width:100%;text-align:left;transition:all .18s;position:relative}
.sb-item:hover{color:#fff;background:rgba(255,255,255,0.07)}
.sb-item.active{color:#fff;background:rgba(0,200,150,0.12)}
.sb-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--green);border-radius:0 3px 3px 0}
.sb-icon{width:17px;height:17px;flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1);opacity:.6}
.sb-item:hover .sb-icon{opacity:1;transform:scale(1.18) rotate(6deg)}
.sb-item.active .sb-icon{opacity:1;color:var(--green);transform:scale(1.1)}
.sb-label{flex:1}
.sb-badge{font-size:10px;font-weight:700;background:var(--red);color:#fff;padding:1px 6px;border-radius:100px;min-width:18px;text-align:center}
.sb-divider{height:1px;background:rgba(255,255,255,0.07);margin:8px 14px}
.sb-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,0.22);padding:10px 18px 4px}
.sb-item[data-page="assistant"]{color:rgba(0,200,150,0.75)}
.sb-item[data-page="assistant"]:hover{color:var(--green);background:rgba(0,200,150,0.1)}
.sb-item[data-page="assistant"].active{color:var(--green)}
.sb-item[data-page="assistant"] .sb-icon{color:var(--green)}
.sb-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.08)}
.sb-user{display:flex;align-items:center;gap:10px}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:rgba(0,200,150,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--green);flex-shrink:0}
.sb-username{font-size:12px;color:rgba(255,255,255,0.5);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-logout{font-size:11px;color:rgba(255,255,255,0.3);background:none;border:none;cursor:pointer;font-family:var(--font);padding:0;transition:color .15s}
.sb-logout:hover{color:rgba(255,255,255,0.7)}
/* ── MAIN CONTENT AREA ── */
.main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-size:13px;font-weight:600;color:var(--txt)}
.tb-right{display:flex;align-items:center;gap:8px}
.content{padding:24px 28px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--white);color:var(--muted);text-decoration:none;white-space:nowrap}
.btn:hover{border-color:#c5d0dd;background:var(--off);color:var(--txt)}
.btn-navy{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-navy:hover{background:var(--navy-mid);color:#fff;border-color:var(--navy-mid)}
.btn-navy:disabled{opacity:.6;cursor:not-allowed}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{width:28px;height:28px;padding:0;justify-content:center;font-size:13px}
.ph{margin-bottom:22px}
.ph h1{font-size:22px;font-weight:600;color:var(--txt);margin-bottom:3px}
.ph p{font-size:13px;color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.metrics-3{grid-template-columns:repeat(3,1fr)}
.mc{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:box-shadow .15s,transform .1s}
.mc[onclick]:hover{box-shadow:0 3px 14px rgba(0,0,0,0.09);transform:translateY(-1px)}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.mc-label{font-size:12px;color:var(--muted)}
.mc-icon{width:30px;height:30px;border-radius:7px;background:var(--off);display:flex;align-items:center;justify-content:center;font-size:14px}
.mc-val{font-size:26px;font-weight:600;color:var(--txt);line-height:1}
.mc-sub{font-size:11px;color:var(--muted);margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
.panel{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.panel:last-child{margin-bottom:0}
.ph2{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ph2 h2{font-size:14px;font-weight:600;color:var(--txt)}
.ph2 p{font-size:12px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green-dark)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:#EEF2F7;color:#556678}
.ai-row{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;cursor:pointer;transition:background .1s}
.ai-row:last-child{border-bottom:none}
.ai-row:hover{background:var(--off)}
.ai-body{flex:1}
.ai-title{font-size:13px;font-weight:500;color:var(--txt)}
.ai-sub{font-size:11px;color:var(--muted);margin-top:2px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 14px;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--off);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:#3D5166;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(246,248,251,.8)}
.td-bold{font-weight:500;color:var(--txt)}
.td-act{display:flex;gap:5px;align-items:center}
.prop-group{padding:12px 14px;background:var(--off);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.prog-wrap{width:70px;height:5px;background:var(--border);border-radius:100px;overflow:hidden;display:inline-block}
.prog-fill{height:100%;border-radius:100px;background:var(--green)}
.tabs{display:flex;margin-bottom:18px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.tab{flex:1;padding:9px 18px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);background:var(--white);border:none;font-family:var(--font);transition:all .15s;border-right:1px solid var(--border)}
.tab:last-child{border-right:none}
.tab.active{background:var(--blue);color:#fff}
.prop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.pc{background:var(--white);border:1px solid var(--border);border-radius:10px;transition:box-shadow .2s;overflow:hidden}
.pc:hover{box-shadow:0 4px 18px rgba(11,30,61,.07)}
.pc-head{padding:16px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.pc-addr{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:2px}
.pc-city{font-size:12px;color:var(--muted)}
.pc-info{padding:0 16px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pc-tag{background:var(--off);color:var(--muted);border:1px solid var(--border);font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px}
.pc-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.t-av{width:34px;height:34px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue);flex-shrink:0}
.sf{display:flex;align-items:center;gap:4px;white-space:nowrap}
.sf-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--muted);font-family:var(--font)}
.sf-on{background:var(--navy);color:#fff;border-color:var(--navy)}
.chat-outer{display:flex;flex-direction:column;height:calc(100vh - 54px)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:70%;padding:10px 14px;border-radius:10px;font-size:13.5px;line-height:1.6}
.msg.ai{background:var(--white);border:1px solid var(--border);color:#3D5166;align-self:flex-start;border-radius:3px 10px 10px 10px}
.msg.ai .mlbl{font-size:10px;font-weight:600;color:var(--green-dark);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.msg.user{background:var(--navy);color:#fff;align-self:flex-end;border-radius:10px 3px 10px 10px}
.chat-bar{padding:14px 24px;border-top:1px solid var(--border);background:var(--white);display:flex;gap:10px}
.chat-in{flex:1;padding:9px 13px;border-radius:8px;border:1px solid var(--border);font-family:var(--font);font-size:13.5px;outline:none;color:var(--txt)}
.chat-in:focus{border-color:var(--navy)}
.chat-disc{font-size:10px;color:var(--muted);text-align:center;padding:6px 24px;background:var(--off);border-top:1px solid var(--border)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.cal-nav h3{font-size:14px;font-weight:600}
.cal-wrap{padding:14px 18px}
.cal-dh{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-dn{text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted)}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cc{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);cursor:pointer;position:relative}
.cc:hover{background:var(--off)}
.cc.cm{color:var(--txt)}
.cc.td{background:var(--navy);color:#fff;font-weight:600}
.cc.hd::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.cc.td.hd::after{background:rgba(255,255,255,.7)}
.detail-back{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;background:none;border:none;font-family:var(--font);margin-bottom:18px;padding:0}
.detail-back:hover{color:var(--navy)}
.coll{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.coll-hd{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.coll-hd:hover{background:var(--off)}
.coll-l{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;color:var(--txt)}
.coll-cnt{font-size:11px;color:#fff;background:var(--navy);padding:1px 7px;border-radius:100px;font-weight:600}
.coll-r{display:flex;align-items:center;gap:10px}
.coll-arr{color:var(--muted);font-size:12px;transition:transform .2s;display:inline-block}
.coll-arr.op{transform:rotate(180deg)}
.coll-body{border-top:1px solid var(--border);padding:18px}
.coll-body.hidden{display:none}
.det-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px}
.det-f label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);display:block;margin-bottom:3px}
.det-f span{font-size:13.5px;color:var(--txt)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mo-box{background:var(--white);border-radius:12px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto}
.mo-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
.mo-hd h3{font-size:15px;font-weight:600;color:var(--txt)}
.mo-hd p{font-size:12px;color:var(--muted);margin-top:2px}
.mo-x{font-size:18px;cursor:pointer;color:var(--muted);background:none;border:none;padding:0;margin-left:10px;flex-shrink:0}
.mo-bd{padding:20px}
.mo-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--white)}
.fg{margin-bottom:14px}
.fg label{font-size:11px;font-weight:600;color:var(--txt);margin-bottom:5px;display:block;letter-spacing:.3px;text-transform:uppercase}
.fg label .req{color:var(--red);margin-left:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border-radius:7px;border:1px solid var(--border);font-family:var(--font);font-size:13.5px;color:var(--txt);outline:none;background:var(--white)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy)}
.fg textarea{min-height:70px;resize:vertical}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg-div{height:1px;background:var(--border);margin:18px 0}
.fg-sec{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:12px}
.scan-box{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px;position:relative}
.scan-box:hover{border-color:var(--navy);background:var(--off)}
.scan-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.scan-ic{font-size:28px;margin-bottom:8px}
.scan-t{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:3px}
.scan-s{font-size:12px;color:var(--muted)}
.scan-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);color:var(--green-dark);border:1px solid rgba(0,200,150,0.2);font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;margin-top:8px}
.ai-res{background:var(--off);border:1px solid rgba(0,200,150,0.25);border-radius:8px;padding:14px;margin-bottom:14px;display:none}
.ai-res-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;font-weight:600;color:var(--green-dark)}
.ai-res-g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ai-res-f{font-size:12px}
.ai-res-f span{display:block;color:var(--muted);font-size:11px;margin-bottom:1px}
.ai-res-f strong{color:var(--txt)}
.empty{padding:40px;text-align:center}
.empty-ic{font-size:28px;margin-bottom:10px;opacity:.35}
.empty-t{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:4px}
.empty-s{font-size:12px;color:var(--muted)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.step-bar{display:flex;gap:6px;margin-bottom:20px}
.step-bar-seg{flex:1;height:3px;border-radius:100px;background:var(--border);transition:background .3s}
.step-bar-seg.done{background:var(--blue)}
.step-box{display:none}
.step-box.active{display:block}
.step-title{font-size:13px;color:var(--muted);margin-bottom:16px}
.mo-nav{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--white)}
.btn-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;font-family:var(--font);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;padding:7px 0}
.btn-back:hover{color:var(--txt)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
/* ── PROPERTY DETAIL TABS ── */
.pd-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:22px;gap:0;overflow-x:auto}
.pd-tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;font-family:var(--font);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.pd-tab:hover{color:var(--txt)}
.pd-tab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--navy)}
.pd-tab .pd-cnt{font-size:10px;font-weight:700;background:var(--off);border:1px solid var(--border);color:var(--muted);padding:1px 6px;border-radius:100px}
.pd-tab.active .pd-cnt{background:var(--navy);border-color:var(--navy);color:#fff}
/* Stat pills on property header */
.pd-stat{display:flex;align-items:center;gap:10px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px}
.pd-stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pd-stat-val{font-size:20px;font-weight:700;color:var(--txt);line-height:1}
.pd-stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.mo-wide{width:700px!important;max-width:96vw!important}
.s8-step-bar{display:flex;gap:4px;margin-bottom:20px}
.s8-seg{flex:1;height:3px;border-radius:100px;background:var(--border);transition:background .3s}
.s8-seg.done{background:var(--navy)}
.s8-seg.active{background:var(--blue)}
.s8-pre-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.s8-pre-row:last-child{border-bottom:none}
.s8-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.s8-cat-card{border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;background:var(--white);margin-bottom:10px;display:flex;align-items:center;gap:12px}
.s8-cat-card:hover{border-color:var(--navy);background:var(--off)}
.s8-cat-card.sel{border-color:var(--blue);background:var(--blue-bg)}
.s8-ground-card{border:1px solid var(--border);border-radius:8px;padding:11px 14px;cursor:pointer;transition:all .15s;background:var(--white);margin-bottom:8px;position:relative}
.s8-ground-card:hover{border-color:var(--navy)}
.s8-ground-card.sel{border-color:var(--blue);background:var(--blue-bg)}
.s8-badge-m{background:rgba(229,62,62,0.1);color:var(--red);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}

async function sbLoadChecklist(pid, prefix) {
  const cacheKey = prefix + '_' + pid;
  if (_checkCache[cacheKey] !== undefined) return _checkCache[cacheKey];
  try {
    const { data } = await sb.from('checklist_progress')
      .select('data')
      .eq('prop_id', String(pid))
      .eq('prefix', prefix)
      .single();
    _checkCache[cacheKey] = data?.data || {};
  } catch(e) { _checkCache[cacheKey] = {}; }
  return _checkCache[cacheKey];
}

async function sbSaveChecklist(pid, prefix, saved) {
  if (!currentUser) return;
  _checkCache[prefix + '_' + pid] = saved;
  try {
    await sb.from('checklist_progress').upsert({
      user_id: currentUser.id,
      prop_id: String(pid),
      prefix,
      data: saved,
      updated_at: new Date().toISOString()

async function sbLoadMeters(pid) {

      .eq('prop_id', parseInt(pid))

  } catch(e) { _meterCache[pid] = {}; }
  return _meterCache[pid];
}

// ── COMPLIANCE RAG SCORE ──
function calcRAG(pid) {
  const certs = CF(pid);
  if (!certs.length) return { rag: 'red', label: 'No documents', score: 0 };

  // Critical cert types that must be present and valid
  const criticalTypes = ['gas', 'eicr', 'electrical', 'epc', 'energy', 'deposit'];
  const hasCritical = type => certs.some(c => c.type && c.type.toLowerCase().includes(type));
  const criticalMissing = criticalTypes.filter(t => !hasCritical(t)).length;

  // Count by status
  const valid   = certs.filter(c => c.status === 'Valid').length;
  const expired = certs.filter(c => c.status === 'Expired').length;
  const missing = certs.filter(c => c.status === 'Missing').length;
  const due     = certs.filter(c => c.status === 'Due').length;
  const total   = certs.length || 1;

  // Score: start at 100, deduct for problems
  let score = Math.round((valid / total) * 100);
  score = Math.max(0, score - (expired * 15) - (missing * 10) - (due * 5) - (criticalMissing * 10));
  score = Math.min(100, Math.max(0, score));

  let rag, label;
  if (score >= 80) { rag = 'green'; label = 'Compliant'; }
  else if (score >= 50) { rag = 'amber'; label = 'Action needed'; }
  else { rag = 'red'; label = 'At risk'; }

  return { rag, label, score };
}

}

async function loadData() {
  const [p, t, c, m, r, i, el, ct, con, ja] = await Promise.all([
    sb.from('properties').select('*').order('created_at', {ascending: false}),
    sb.from('tenants').select('*'),
    sb.from('certificates').select('*'),
    sb.from('maintenance').select('*').order('issue_date', {ascending: false}),
    sb.from('rent_payments').select('*').order('due_date', {ascending: false}),
    sb.from('insurance').select('*'),
    sb.from('email_log').select('*').order('sent_at', {ascending: false}),
    sb.from('custom_templates').select('*').order('created_at', {ascending: false}),
    sb.from('contractors').select('*').order('name', {ascending: true}),
    sb.from('job_assignments').select('*, tenant_maintenance(prop_id, category, submitted_at)'),
  ]);

  if (p.data?.length) {
    D.properties = p.data.map(row => ({
      ...row,
      rooms: row.rooms || [],
      inspections: row.inspections || []
    }));
  }
  if (t.data?.length) {
    D.tenants = t.data.map(row => ({
      ...row,
      start: row.start_date, end: row.end_date
    }));
  }
  if (c.data?.length) {
    D.certs = c.data.map(row => ({
      ...row,
      file: row.has_file
    }));
  }
  if (m.data?.length) {
    D.maintenance = m.data.map(row => ({
      ...row,
      desc: row.description || '',
      date: row.issue_date
    }));
  }
  if (r.data?.length) {
    D.rent = r.data.map(row => ({
      ...row,
      due: row.due_date,
      paid: row.paid_date
    }));
  }
  if (i.data?.length) D.insurance = i.data;
  if (el.data?.length) D.emailLog = el.data;
  if (ct.data?.length) D.customTemplates = ct.data;
  if (con.data?.length) D.contractors = con.data;
  if (ja.data?.length) D.jobAssignments = ja.data;
  await checkComplianceReminders();
}

function checkComplianceReminders() {
  const today = new Date(); today.setHours(0,0,0,0);
  const urgent = [];
  D.certs.filter(c => c.expiry).forEach(c => {
    const d = new Date(c.expiry); d.setHours(0,0,0,0);
    const days = Math.round((d - today) / 864e5);
    if (days >= 0 && days <= 7) urgent.push(`${c.type} expires in ${days === 0 ? 'today' : days + ' day' + (days !== 1 ? 's' : '')}`);
  });
  D.properties.filter(p => p.licence_expiry).forEach(p => {
    const d = new Date(p.licence_expiry); d.setHours(0,0,0,0);
    const days = Math.round((d - today) / 864e5);
    if (days >= 0 && days <= 7) urgent.push(`${p.licence_type || 'Licence'} expires in ${days} day${days !== 1 ? 's' : ''} — ${p.address}`);
  });
  if (urgent.length) toast('⚠ ' + urgent[0] + (urgent.length > 1 ? ` (+${urgent.length - 1} more)` : ''), true);
}

// ── REUSABLE: scanAndFill ──
async function scanAndFill(file, onResult){
  if(!file) return;
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
  const isImg=file.type.startsWith('image/');
  const msgContent=isImg
    ?[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'UK property compliance certificate. Extract: certificate type, issue date (YYYY-MM-DD), expiry date (YYYY-MM-DD), engineer or provider name, address. Return JSON only, keys: type, issued, expiry, engineer, address.'}]
    :[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'UK property compliance certificate. Extract: certificate type, issue date (YYYY-MM-DD), expiry date (YYYY-MM-DD), engineer or provider name, address. Return JSON only, keys: type, issued, expiry, engineer, address.'}];
  const res=await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:300,messages:[{role:'user',content:msgContent}]})});
  const data=await res.json();
  const txt=data.content?.[0]?.text||'{}';
  try {
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    onResult(parsed);
  } catch(e) {
    onResult({});
  }
}

// ── UPLOAD & SCAN EXISTING CERT ──
async function uploadScanCert(certId, input){
  if(!input.files[0]) return;
  const file=input.files[0];
  const lbl=document.getElementById('scan-lbl-'+certId);
  if(lbl) lbl.textContent='⏳ Scanning…';
  try{
    await scanAndFill(file, async (parsed)=>{
      const updates={has_file:true};
      if(parsed.expiry) updates.expiry=parsed.expiry;
      if(parsed.engineer) updates.engineer=parsed.engineer;
      if(parsed.expiry) updates.status=new Date(parsed.expiry)<new Date()?'Expired':'Valid';
      const{error}=await sb.from('certificates').update(updates).eq('id',certId);
      if(error){toast('Error: '+error.message,true);return;}
      const c=D.certs.find(x=>x.id===certId);
      if(c) Object.assign(c,updates,{file:true});
      toast('✓ Scanned & saved — expiry and engineer auto-filled!');
      nav('compliance');
    });
  }catch(e){
    if(lbl) lbl.textContent='⚠️ Scan failed';
    toast('Could not scan — please edit manually',true);
  }
}

  const file=input.files[0];

    goStep(2);
  } else if(s === 2){
    goStep(3);
  } else if(s === 3){

    if(!rent){ toast('Please enter the monthly rent.', true); return; }
    savePropToDB();
  }
}
function propStepBack(){ if(window._propStep > 1) goStep(window._propStep - 1); }
function goStep(n){
  window._propStep = n;
  document.querySelectorAll('.step-box').forEach((el,i) => el.classList.toggle('active', i+1 === n));
  document.querySelectorAll('.step-bar-seg').forEach((el,i) => el.classList.toggle('done', i < n));

  document.getElementById('mo-next-btn').textContent = n === 3 ? 'Add property ✓' : 'Next →';
  const labels = ['1 — address','2 — property details','3 — financials'];
  document.getElementById('mo-s').textContent = 'Step ' + labels[n-1];

}

async function archiveProperty(pid) {
  if (!confirm('Mark this property as sold? It will be archived and removed from your active portfolio. You can restore it from your database if needed.')) return;
  const { error } = await sb.from('properties').update({ status: 'Archived' }).eq('id', pid);
  if (error) { toast('Error: ' + error.message, true); return; }
  const idx = D.properties.findIndex(p => String(p.id) === String(pid));
  if (idx >= 0) D.properties.splice(idx, 1);
  await logAudit('ARCHIVE_PROPERTY', 'properties', pid, 'Property archived / marked as sold');
  closeMo(); toast('✓ Property archived'); nav('properties');
}

// ── MODAL: PROPERTY SETUP WIZARD (5-step compliance setup) ──
window._psetup = {};

function moPropertySetup(pid) {
  const p = P(pid);
  if (!p) { toast('Property not found', true); return; }

  window._psetup = {
    pid: String(pid), step: 1,
    // Step 1: Licence
    licType: p.licence_type || 'None required',
    licRef: p.licence_ref || '',
    licExpiry: p.licence_expiry || '',
    // Step 2: Safety certs
    gasExpiry: '', gasEngineer: '',
    eicrExpiry: '', eicrEngineer: '',
    epcRating: p.epc_rating ? p.epc_rating.replace(' — minimum legal standard','').replace(' — below standard','') : '',
    epcExpiry: p.epc_expiry || '',
    // Step 3: Insurance
    bldProvider: '', bldPolicyRef: '', bldExpiry: '',
    llProvider: '', llPolicyRef: '', llExpiry: '',
    rgProvider: '', rgExpiry: '',
    // Step 4: Boiler
    boilerLast: p.boiler_last_service || '',
    boilerNext: p.boiler_next_service || '',
    boilerEng: p.boiler_engineer || '',
  };

  // Pre-fill from existing certs if present
  const pCerts = CF(pid);
  const gasCert = pCerts.find(c => c.type && c.type.toLowerCase().includes('gas'));
  const eicrCert = pCerts.find(c => c.type && c.type.toLowerCase().includes('eicr') || (c.type||'').toLowerCase().includes('electrical'));
  const epcCert = pCerts.find(c => c.type && c.type.toLowerCase().includes('epc') || (c.type||'').toLowerCase().includes('energy'));
  if (gasCert) { window._psetup.gasExpiry = gasCert.expiry || ''; window._psetup.gasEngineer = gasCert.engineer || ''; }
  if (eicrCert) { window._psetup.eicrExpiry = eicrCert.expiry || ''; window._psetup.eicrEngineer = eicrCert.engineer || ''; }
  if (epcCert) { window._psetup.epcExpiry = epcCert.expiry || ''; }

  // Pre-fill from existing insurance if present
  const pIns = D.insurance.filter(i => String(i.prop_id) === String(pid));
  const bldIns = pIns.find(i => i.type && i.type.toLowerCase().includes('buildings'));
  const llIns = pIns.find(i => i.type && i.type.toLowerCase().includes('contents') || (i.type||'').toLowerCase().includes('landlord'));
  const rgIns = pIns.find(i => i.type && i.type.toLowerCase().includes('guarantee') || (i.type||'').toLowerCase().includes('rent'));
  if (bldIns) { window._psetup.bldProvider = bldIns.provider || ''; window._psetup.bldPolicyRef = bldIns.policy || ''; window._psetup.bldExpiry = bldIns.expiry || ''; }
  if (llIns) { window._psetup.llProvider = llIns.provider || ''; window._psetup.llPolicyRef = llIns.policy || ''; window._psetup.llExpiry = llIns.expiry || ''; }
  if (rgIns) { window._psetup.rgProvider = rgIns.provider || ''; window._psetup.rgExpiry = rgIns.expiry || ''; }

  document.getElementById('mo-t').textContent = 'Property setup';
  document.getElementById('mo-s').textContent = `${p.address} · Step 1 of 5`;
  document.querySelector('.mo-box').classList.add('mo-wide');
  _renderSetupStep(1);
  document.getElementById('mo').classList.add('open');
}

      <div style="display:flex;align-items:center;gap:20px">
        <div style="text-align:center;flex-shrink:0;min-width:70px">
          <div style="font-size:40px;font-weight:700;color:#fff;line-height:1">${score}</div>
          <div style="font-size:11px;color:${scoreCol};font-weight:700;margin-top:4px">${scoreLabel}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px">setup score</div>
        </div>
        <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px">

          </div>`).join('')}
        </div>
      </div>
    </div>

    ${filled > 0 ? `<div style="background:var(--green-bg);border:1px solid rgba(0,200,150,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green-dark);margin-bottom:8px">
      ✓ ${filled} item${filled!==1?'s':''} will be saved. Updates are merged with any existing records.
    </div>` : ''}
    ${filled < items.length ? `<div style="background:var(--blue-bg);border:1px solid rgba(59,111,232,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--blue)">
      ℹ️ ${items.length - filled} blank item${items.length-filled!==1?'s':''} — come back and fill these in from the property page anytime.
    </div>` : ''}`;
  }
  return '';
}

function setupStepNext() {
  const n = window._psetup.step;
  const s = window._psetup;

  // Persist current step inputs to state
  if (n === 1) {
    s.licType   = document.getElementById('s-lic-type')?.value || 'None required';
    s.licRef    = document.getElementById('s-lic-ref')?.value.trim() || '';
    s.licExpiry = document.getElementById('s-lic-expiry')?.value || '';
  } else if (n === 2) {
    s.gasExpiry   = document.getElementById('s-gas-expiry')?.value || '';
    s.gasEngineer = document.getElementById('s-gas-eng')?.value.trim() || '';
    s.eicrExpiry  = document.getElementById('s-eicr-expiry')?.value || '';
    s.eicrEngineer= document.getElementById('s-eicr-eng')?.value.trim() || '';
    s.epcRating   = document.getElementById('s-epc-rating')?.value || '';
    s.epcExpiry   = document.getElementById('s-epc-expiry')?.value || '';
  } else if (n === 3) {
    s.bldProvider  = document.getElementById('s-bld-prov')?.value.trim() || '';
    s.bldPolicyRef = document.getElementById('s-bld-ref')?.value.trim() || '';
    s.bldExpiry    = document.getElementById('s-bld-expiry')?.value || '';
    s.llProvider   = document.getElementById('s-ll-prov')?.value.trim() || '';
    s.llPolicyRef  = document.getElementById('s-ll-ref')?.value.trim() || '';
    s.llExpiry     = document.getElementById('s-ll-expiry')?.value || '';
    s.rgProvider   = document.getElementById('s-rg-prov')?.value.trim() || '';
    s.rgExpiry     = document.getElementById('s-rg-expiry')?.value || '';
  } else if (n === 4) {
    s.boilerLast = document.getElementById('s-boiler-last')?.value || '';
    s.boilerNext = document.getElementById('s-boiler-next')?.value || '';
    s.boilerEng  = document.getElementById('s-boiler-eng')?.value.trim() || '';
  } else if (n === 5) {
    _savePropertySetupToDB();
    return;
  }

  window._psetup.step = n + 1;
  const p = P(window._psetup.pid);
  document.getElementById('mo-s').textContent = `${p?.address || ''} · Step ${n+1} of 5`;
  _renderSetupStep(n + 1);
  document.querySelector('.mo-box')?.scrollTo?.(0, 0);
}

function setupStepBack() {
  const n = window._psetup.step;
  if (n <= 1) return;
  window._psetup.step = n - 1;
  const p = P(window._psetup.pid);
  document.getElementById('mo-s').textContent = `${p?.address || ''} · Step ${n-1} of 5`;
  _renderSetupStep(n - 1);
  document.querySelector('.mo-box')?.scrollTo?.(0, 0);
}

async function _savePropertySetupToDB() {
  const btn = document.getElementById('psetup-next');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving…'; }
  const s = window._psetup;
  const pid = s.pid;

  try {
    // ① Update properties table (licence + boiler + epc)
    const propUpdates = {};
    if (s.licType)    propUpdates.licence_type     = s.licType;
    if (s.licRef)     propUpdates.licence_ref       = s.licRef;
    if (s.licExpiry)  propUpdates.licence_expiry    = s.licExpiry;
    if (s.epcRating)  propUpdates.epc_rating        = s.epcRating;
    if (s.epcExpiry)  propUpdates.epc_expiry        = s.epcExpiry;
    if (s.boilerLast) propUpdates.boiler_last_service = s.boilerLast;
    if (s.boilerNext) propUpdates.boiler_next_service = s.boilerNext;
    if (s.boilerEng)  propUpdates.boiler_engineer   = s.boilerEng;

    if (Object.keys(propUpdates).length) {
      const { error: pe } = await sb.from('properties').update(propUpdates).eq('id', pid);
      if (!pe) { const p = P(pid); if (p) Object.assign(p, propUpdates); }
    }

    // ② Certificates
    const mkStatus = exp => exp ? (new Date(exp) < new Date() ? 'Expired' : 'Valid') : 'Valid';
    const certsToInsert = [];
    if (s.gasExpiry || s.gasEngineer)   certsToInsert.push({ prop_id:parseInt(pid), type:'Gas Safety Certificate (GSC)',                    expiry:s.gasExpiry||null,  engineer:s.gasEngineer||null,  status:mkStatus(s.gasExpiry),  has_file:false, served:false, user_id:currentUser.id });
    if (s.eicrExpiry || s.eicrEngineer) certsToInsert.push({ prop_id:parseInt(pid), type:'Electrical Installation Condition Report (EICR)', expiry:s.eicrExpiry||null, engineer:s.eicrEngineer||null, status:mkStatus(s.eicrExpiry), has_file:false, served:false, user_id:currentUser.id });
    if (s.epcRating || s.epcExpiry)     certsToInsert.push({ prop_id:parseInt(pid), type:'Energy Performance Certificate (EPC)',             expiry:s.epcExpiry||null,  engineer:null,                 status:mkStatus(s.epcExpiry),  has_file:false, served:false, user_id:currentUser.id });
    if (certsToInsert.length) {
      const { data: cd } = await sb.from('certificates').insert(certsToInsert).select();
      if (cd) D.certs.push(...cd.map(c=>({...c,file:false})));
    }

    // ③ Insurance
    const mkInsStatus = exp => exp ? (new Date(exp) < new Date() ? 'Expired' : 'Active') : 'Active';
    const existing = D.insurance.filter(i=>String(i.prop_id)===String(pid));
    const insToInsert = [];
    if ((s.bldProvider||s.bldExpiry) && !existing.find(i=>(i.type||'').toLowerCase().includes('buildings')))
      insToInsert.push({ prop_id:parseInt(pid), type:'Buildings Insurance',        provider:s.bldProvider||'Not set', policy:s.bldPolicyRef||null, expiry:s.bldExpiry||null, premium:null, status:mkInsStatus(s.bldExpiry), user_id:currentUser.id });
    if ((s.llProvider||s.llExpiry) && !existing.find(i=>(i.type||'').toLowerCase().includes('contents')))
      insToInsert.push({ prop_id:parseInt(pid), type:'Landlord Contents Insurance', provider:s.llProvider||'Not set', policy:s.llPolicyRef||null, expiry:s.llExpiry||null,  premium:null, status:mkInsStatus(s.llExpiry),  user_id:currentUser.id });
    if ((s.rgProvider||s.rgExpiry) && !existing.find(i=>(i.type||'').toLowerCase().includes('guarantee')))
      insToInsert.push({ prop_id:parseInt(pid), type:'Rent Guarantee Insurance',   provider:s.rgProvider||'Not set', policy:null,                 expiry:s.rgExpiry||null,  premium:null, status:mkInsStatus(s.rgExpiry),  user_id:currentUser.id });
    if (insToInsert.length) {
      const { data: id2 } = await sb.from('insurance').insert(insToInsert).select();
      if (id2) D.insurance.push(...id2);
    }

    await logAudit('PROPERTY_SETUP','properties',pid,'Compliance setup wizard completed');
    closeMo();
    toast('✓ Property setup saved!');
    nav('prop-detail', pid);

  } catch(err) {
    if (btn) { btn.disabled=false; btn.textContent='Save setup ✓'; }
    toast('Error: '+err.message, true);
  }
}

function scanSetupLicence(input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  const box = document.getElementById('lic-scan-box');
  if (box) box.innerHTML = `<div style="font-size:13px;color:var(--muted)">⏳ Scanning licence document…</div><div class="scan-badge" style="margin-top:8px">✦ AI reading</div>`;

  scanAndFill(file, (parsed) => {
    if (parsed.expiry) {
      const el = document.getElementById('s-lic-expiry');
      if (el) { el.value = parsed.expiry; window._psetup.licExpiry = parsed.expiry; }
    }
    if (parsed.type) {
      const lt = parsed.type.toLowerCase();
      const sel = document.getElementById('s-lic-type');
      const matchMap = { hmo:'Mandatory HMO', additional:'Additional HMO', selective:'Selective Licence', 'article 4':'Article 4', 'short-term':'Short-term Let', 'short term':'Short-term Let' };
      for (const [key, val] of Object.entries(matchMap)) {
        if (lt.includes(key) && sel) { sel.value = val; window._psetup.licType = val; break; }
      }
    }
    const result = document.getElementById('lic-ai-result');
    if (result) result.style.display = 'block';

// ── RTR DOCUMENT SCAN ──
function scanRTRDoc(input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  const box = document.getElementById('ts-rtr-scan-box');
  if (box) box.innerHTML = `<div style="font-size:13px;color:var(--muted)">⏳ Scanning document…</div><div class="scan-badge" style="margin-top:6px">✦ AI reading</div>`;

  // Custom prompt for RTR docs
  const reader = new FileReader();
  reader.onload = async () => {
    const b64 = reader.result.split(',')[1];
    const isImg = file.type.startsWith('image/');
    const msgContent = isImg
      ? [{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'This is a UK Right to Rent identity document. Extract: document type (e.g. Passport, Biometric Residence Permit, Share Code, Birth Certificate), document/reference number, expiry date (YYYY-MM-DD if present, null if none), nationality if visible. Return JSON only, keys: doc_type, ref, expiry, nationality.'}]
      : [{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'This is a UK Right to Rent identity document. Extract: document type, reference number, expiry date (YYYY-MM-DD if present, null if none), nationality if visible. Return JSON only, keys: doc_type, ref, expiry, nationality.'}];
    try {
      const res = await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({model:'claude-sonnet-4-5',max_tokens:300,messages:[{role:'user',content:msgContent}]})
      });
      const data = await res.json();
      const parsed = JSON.parse((data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());

      // Map detected doc type to dropdown options
      const dt = (parsed.doc_type||'').toLowerCase();
      const sel = document.getElementById('ts-rtr-doctype');
      if (sel) {
        if (dt.includes('passport')) sel.value = 'Passport (UK/EU)';
        else if (dt.includes('biometric')||dt.includes('brp')) sel.value = 'Biometric Residence Permit';
        else if (dt.includes('share')||dt.includes('evisa')) sel.value = 'Share Code (eVisa)';
        else if (dt.includes('birth')) sel.value = 'UK Birth Certificate + NI';
      }
      if (parsed.ref) { const el=document.getElementById('ts-rtr-ref'); if(el) el.value=parsed.ref; }
      if (parsed.expiry) { const el=document.getElementById('ts-rtr-expiry'); if(el) el.value=parsed.expiry; window._tsetup.rtrExpiry=parsed.expiry; }

      const result = document.getElementById('ts-rtr-ai-result');
      if (result) {
        result.style.display = 'block';
        result.innerHTML = `✦ Detected: <strong>${parsed.doc_type||'Unknown'}</strong>${parsed.expiry?` · Expires ${parsed.expiry}`:''}${parsed.nationality?' · '+parsed.nationality:''} — confirm below`;
      }
      if (box) box.innerHTML = `<div style="font-size:13px;color:var(--green-dark);font-weight:600">✓ Document scanned — fields filled below</div><div style="font-size:11px;color:var(--muted);margin-top:3px">${file.name}</div>`;
      toast('✓ RTR document scanned');
    } catch(e) {
      if (box) box.innerHTML = `<div style="font-size:13px;color:var(--amber)">⚠ Could not scan — fill in manually</div>`;
    }
  };
  reader.readAsDataURL(file);
}

function bulkDropFiles(e) {
  e.preventDefault();

function bulkFilesSelected(input) {
  const files = [...input.files].slice(0,10);

function _setBulkFiles(files) {
  window._bulkScan.files = files;
  window._bulkScan.results = [];
  const queue = document.getElementById('bulk-queue');
  const list  = document.getElementById('bulk-queue-list');
  const btn   = document.getElementById('bulk-scan-btn');
  const saveBtn = document.getElementById('bulk-save-btn');

  list.innerHTML = files.map((f,i)=>`<div id="bulk-item-${i}" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--off);border-radius:7px;margin-bottom:6px">

  </div>`).join('');

}

async function runBulkScan() {
  const btn = document.getElementById('bulk-scan-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spin"></span>Scanning…'; }
  const files = window._bulkScan.files;
  const results = [];

  for (let i=0; i<files.length; i++) {
    const f = files[i];
    const statusEl = document.getElementById(`bulk-status-${i}`);
    const itemEl   = document.getElementById(`bulk-item-${i}`);
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--blue)">⏳ Scanning…</span>';

    await new Promise(resolve => {
      scanAndFill(f, (parsed) => {
        results.push({ file:f, parsed, idx:i });
        if (statusEl) statusEl.innerHTML = '<span style="color:var(--green-dark);font-weight:600">✓ Done</span>';
        if (itemEl) itemEl.style.background = 'rgba(0,200,150,0.07)';
        resolve();
      });
      setTimeout(resolve, 8000); // timeout safety
    });
  }

  window._bulkScan.results = results;
  _renderBulkResults(results);
  if (btn) { btn.style.display='none'; }
}

function _renderBulkResults(results) {
  const container = document.getElementById('bulk-results');
  const list = document.getElementById('bulk-results-list');
  const saveBtn = document.getElementById('bulk-save-btn');

  const certTypeOpts = ['Gas Safety Certificate (GSC)','Electrical Installation Condition Report (EICR)','Energy Performance Certificate (EPC)','How to Rent Guide','Deposit Certificate','Tenancy Agreement','Property Licence','Other'];

  list.innerHTML = results.map((r,i)=>`<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px">

          ${certTypeOpts.map(t=>`<option${t===r.parsed.type||t.toLowerCase().includes((r.parsed.type||'').toLowerCase().slice(0,4))?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>

    </div>
    <div class="fg-row" style="margin-bottom:0">
      <div class="fg"><label>Engineer / provider</label><input type="text" id="br-eng-${i}" value="${r.parsed.engineer||''}" placeholder="Auto-detected or enter manually"></div>
      <div class="fg"><label>Address detected</label><input type="text" id="br-addr-${i}" value="${r.parsed.address||''}" disabled style="background:var(--off);color:var(--muted)"></div>

}

async function saveBulkResults() {
  const btn = document.getElementById('bulk-save-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spin"></span>Saving…'; }
  const pid = parseInt(document.getElementById('bulk-prop')?.value || window._bulkScan.pid);
  const results = window._bulkScan.results;
  let saved = 0;

  for (let i=0; i<results.length; i++) {
    const type   = document.getElementById(`br-type-${i}`)?.value;
    const expiry = document.getElementById(`br-expiry-${i}`)?.value || null;
    const eng    = document.getElementById(`br-eng-${i}`)?.value.trim() || null;
    if (!type) continue;

    const status = expiry ? (new Date(expiry)<new Date()?'Expired':'Valid') : 'Valid';
    const cert = { prop_id:pid, type, expiry:expiry||null, engineer:eng, status, has_file:true, served:false, user_id:currentUser.id };

    const { data, error } = await sb.from('certificates').insert(cert).select().single();
    if (!error && data) {
      D.certs.push({...data, file:true});
      await logAudit('BULK_SCAN_CERT','certificates',data.id,`Bulk scan: ${type} · ${expiry||'no expiry'}`);
      saved++;
    }
  }

  closeMo();
  toast(`✓ ${saved} certificate${saved!==1?'s':''} saved from bulk scan`);
  nav('compliance');
}

      <div class="scan-badge">✦ AI auto-extraction</div>
    </div>
    <div id="ts-rtr-ai-result" style="display:none;background:var(--off);border:1px solid rgba(0,200,150,0.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green-dark);font-weight:600;margin-bottom:14px">✦ AI detected — confirm the fields below</div>
    <div class="fg-row">
      <div class="fg"><label>Document type <span class="req">*</span></label>
        <select id="ts-rtr-doctype">
          ${['Passport (UK/EU)','Biometric Residence Permit','Share Code (eVisa)','UK Birth Certificate + NI','Other'].map(d=>`<option${d===s.rtrDocType?' selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label>Document ref / Share code</label><input type="text" id="ts-rtr-ref" value="${s.rtrRef}" placeholder="e.g. W7X-4F2-9ZA"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>Check date <span class="req">*</span></label><input type="date" id="ts-rtr-date" value="${s.rtrCheckDate}"></div>
      <div class="fg"><label>Checked by</label><input type="text" id="ts-rtr-by" value="${s.rtrCheckedBy}" placeholder="e.g. Your Name (landlord)"></div>
    </div>
    <div class="fg"><label>Document expiry <span style="font-weight:400;color:var(--muted)">(leave blank if no expiry)</span></label><input type="date" id="ts-rtr-expiry" value="${s.rtrExpiry}"></div>
    <div style="background:var(--off);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:8px;align-items:flex-start">
      <span style="flex-shrink:0">💡</span>
      <div><strong style="color:var(--txt)">Time-limited right to rent:</strong> If document has an expiry date, RentSafe AI will remind you to re-check before it expires. Keep a copy of the document on file.</div>
    </div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--muted)">
        <input type="checkbox" id="ts-rtr-skip" ${s.rtrSkipped?'checked':''} onchange="window._tsetup.rtrSkipped=this.checked;document.getElementById('ts-rtr-warn').style.display=this.checked?'flex':'none'">
        Skip for now (I'll complete this separately) — will flag as missing in compliance
      </label>
      <div id="ts-rtr-warn" style="display:${s.rtrSkipped?'flex':'none'};align-items:center;gap:8px;background:var(--amber-bg);border:1px solid rgba(217,119,6,0.2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--amber);margin-top:8px">
        ⚠️ Right to Rent check will show as RED in compliance until completed.
      </div>
    </div>`;

  // ── STEP 3: ADDRESS PROOF + DEPOSIT ──
  if (n === 3) return `
    <div style="font-size:15px;font-weight:600;margin-bottom:2px">Address proof & deposit</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Two address documents required · Deposit entered here flows everywhere in the app</div>

    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">Address proof — 2 documents required</div>

    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:10px">Document 1 <span style="color:var(--red)">*</span></div>
      <div class="fg-row" style="margin-bottom:0">
        <div class="fg"><label>Document type</label>
          <select id="ts-addr1-type">
            <option value="">Select type…</option>
            ${['Bank statement (last 3 months)','Utility bill (last 3 months)','Council tax bill','HMRC letter','NHS letter','Government letter','Driving licence','Other'].map(d=>`<option${d===s.addr1Type?' selected':''}>${d}</option>`).join('')}
          </select>
        </div>
        <div class="fg"><label>Upload (optional)</label>
          <div class="scan-box" style="padding:8px;margin-bottom:0" id="ts-addr1-box">
            <input type="file" accept="image/*,.pdf" onchange="tsAddrFile(1,this)">
            <div style="font-size:11px;color:var(--muted)">📎 Upload document</div>
          </div>
        </div>
      </div>
    </div>

    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:10px">Document 2 <span style="color:var(--red)">*</span></div>
      <div class="fg-row" style="margin-bottom:0">
        <div class="fg"><label>Document type</label>
          <select id="ts-addr2-type">
            <option value="">Select type…</option>
            ${['Bank statement (last 3 months)','Utility bill (last 3 months)','Council tax bill','HMRC letter','NHS letter','Government letter','Driving licence','Other'].map(d=>`<option${d===s.addr2Type?' selected':''}>${d}</option>`).join('')}
          </select>
        </div>
        <div class="fg"><label>Upload (optional)</label>
          <div class="scan-box" style="padding:8px;margin-bottom:0" id="ts-addr2-box">
            <input type="file" accept="image/*,.pdf" onchange="tsAddrFile(2,this)">
            <div style="font-size:11px;color:var(--muted)">📎 Upload document</div>
          </div>
        </div>
      </div>
    </div>

    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">Deposit</div>
    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px">
      <div class="fg-row">
        <div class="fg"><label>Deposit amount (£) <span class="req">*</span></label><input type="number" id="ts-deposit" value="${s.deposit}" placeholder="e.g. 1500"></div>
        <div class="fg"><label>Protection scheme</label>
          <select id="ts-dep-scheme">
            <option value="">Not yet protected</option>
            <option${s.depositScheme==='DPS'?' selected':''}>DPS (Deposit Protection Service)</option>
            <option${s.depositScheme==='MyDeposits'?' selected':''}>MyDeposits</option>
            <option${s.depositScheme==='TDS'?' selected':''}>TDS (Tenancy Deposit Scheme)</option>
          </select>
        </div>
      </div>
      <div class="fg" style="margin-bottom:0"><label>Scheme reference</label><input type="text" id="ts-dep-ref" value="${s.depositRef}" placeholder="Scheme reference number"></div>
    </div>
    <div style="background:rgba(229,62,62,0.07);border:1px solid rgba(229,62,62,0.15);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-top:10px;display:flex;gap:8px;align-items:flex-start">
      <span style="flex-shrink:0">⚠️</span>
      <div>Deposit must be protected in an approved scheme within <strong>30 days</strong> of receipt. Failure = 1–3× deposit penalty.</div>
    </div>`;

  // ── STEP 4: RENT ──
  if (n === 4) return `
    <div style="font-size:15px;font-weight:600;margin-bottom:2px">Rent details</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Sets up automatic rent tracking and payment reminders</div>
    <div class="fg-row">
      <div class="fg"><label>Monthly rent (£) <span class="req">*</span></label><input type="number" id="ts-rent" value="${s.rent}" placeholder="e.g. 1200"></div>
      <div class="fg"><label>Rent due day <span class="req">*</span></label><input type="number" id="ts-rentday" value="${s.rentDay}" min="1" max="28" placeholder="1"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>First payment date</label><input type="date" id="ts-firstpay" value="${s.firstPayDate}"></div>
      <div class="fg"><label>Payment method</label>
        <select id="ts-paymethod">
          ${['Standing order','BACS transfer','Direct debit','Cash','Other'].map(m=>`<option${m===s.payMethod?' selected':''}>${m}</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="background:var(--green-bg);border:1px solid rgba(0,200,150,0.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--green-dark);margin-top:4px">
      ✓ Rent tracking will start automatically from the first payment date. You'll be notified if a payment is late.
    </div>
    <div style="background:var(--blue-bg);border:1px solid rgba(59,111,232,0.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--blue);margin-top:8px">
      ℹ️ Under RRA 2025, rent can only be increased once per year using a Section 13 notice. RentSafe AI will generate this for you when the time comes.
    </div>`;

  // ── STEP 5: INSURANCE ──
  if (n === 5) {
    const insTypes = [
      { key:'ins_buildings',    icon:'🏠', label:'Buildings insurance',       desc:'Structure, fixtures & fittings — annual' },
      { key:'ins_contents',     icon:'🛋', label:'Contents insurance',         desc:'Furnishings & landlord-owned items' },
      { key:'ins_liability',    icon:'🛡', label:'Landlord liability',          desc:'Public & property owner liability' },
      { key:'ins_rentguarantee',icon:'💷', label:'Rent guarantee insurance',    desc:'Covers rent if tenant stops paying' },
    ];
    return `
    <div style="font-size:15px;font-weight:600;margin-bottom:2px">Insurance</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px">All optional — fill what you have. These are stored against this tenancy.</div>
    <div style="background:var(--blue-bg);border:1px solid rgba(59,111,232,0.2);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--blue);margin-bottom:14px">
      💡 Contents and rent guarantee are typically reviewed at tenancy start. Buildings insurance is annual — notify your insurer of the new tenancy to keep cover valid.
    </div>
    ${insTypes.map(ins => `
    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">${ins.icon} ${ins.label} <span style="font-weight:400;color:var(--muted);font-size:11px">· ${ins.desc}</span></div>
      <div class="fg-row" style="margin-bottom:6px">
        <div class="fg"><label>Provider</label><input type="text" id="ts-${ins.key}-prov" value="${s[ins.key]?.provider||''}" placeholder="e.g. Aviva, Direct Line"></div>
        <div class="fg"><label>Policy number</label><input type="text" id="ts-${ins.key}-pol" value="${s[ins.key]?.policy||''}" placeholder="e.g. POL-12345"></div>
      </div>
      <div class="fg-row" style="margin-bottom:0">
        <div class="fg"><label>Renewal / expiry date</label><input type="date" id="ts-${ins.key}-exp" value="${s[ins.key]?.expiry||''}"></div>
        <div class="fg"><label>Annual premium (£)</label><input type="number" id="ts-${ins.key}-prem" value="${s[ins.key]?.premium||''}" placeholder="e.g. 450" min="0"></div>
      </div>
    </div>`).join('')}`;
  }

  // ── STEP 6: REVIEW ──
  if (n === 6) {
    const p = P(s.pid);
    const rtrStatus = s.rtrSkipped ? { col:'var(--amber)', label:'⚠ Skipped — flags in compliance' } : (s.rtrCheckDate ? { col:'var(--green-dark)', label:'✓ Completed' } : { col:'var(--red)', label:'✗ Not entered' });
    const depStatus = s.deposit ? { col:'var(--green-dark)', label:`✓ £${parseFloat(s.deposit).toLocaleString()} · ${s.depositScheme||'Scheme TBC'}` } : { col:'var(--red)', label:'✗ Not entered' };
    const addr1OK = !!s.addr1Type; const addr2OK = !!s.addr2Type;
    const addrStatus = addr1OK && addr2OK ? { col:'var(--green-dark)', label:'✓ 2 documents entered' } : addr1OK ? { col:'var(--amber)', label:'⚠ Only 1 document — 2 required' } : { col:'var(--red)', label:'✗ Not entered' };
    const rentStatus = s.rent ? { col:'var(--green-dark)', label:`✓ £${parseFloat(s.rent).toLocaleString()}/mo · Due day ${s.rentDay}` } : { col:'var(--red)', label:'✗ Not entered' };
    const rows = [
      { icon:'👤', label:'Tenant name',   val: s.name || '—',   col: s.name?'var(--txt)':'var(--red)' },
      { icon:'✉️', label:'Email',          val: s.email || 'Not set', col:'var(--txt)' },
      { icon:'🏠', label:'Property',       val: p?.address || '—',    col:'var(--txt)' },
      { icon:'📅', label:'Tenancy start',  val: s.startDate ? new Date(s.startDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—', col: s.startDate?'var(--txt)':'var(--red)' },
      { icon:'🔍', label:'Right to Rent',  val: rtrStatus.label, col: rtrStatus.col },
      { icon:'📄', label:'Address proof',  val: addrStatus.label, col: addrStatus.col },
      { icon:'🔒', label:'Deposit',         val: depStatus.label,  col: depStatus.col },
      { icon:'💷', label:'Monthly rent',   val: rentStatus.label, col: rentStatus.col },
    ];
    const allGood = s.name && s.startDate && s.rent && s.deposit;
    return `
    <div style="font-size:15px;font-weight:600;margin-bottom:2px">Review & add tenant</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Check everything below before saving</div>

    <div class="panel" style="margin-bottom:14px">
      <div style="padding:0">
        ${rows.map((r,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;${i<rows.length-1?'border-bottom:1px solid var(--border)':''}">
          <span style="font-size:15px;width:22px;text-align:center;flex-shrink:0">${r.icon}</span>
          <span style="font-size:12px;color:var(--muted);min-width:110px;flex-shrink:0">${r.label}</span>
          <span style="font-size:13px;font-weight:500;color:${r.col};flex:1">${r.val}</span>
        </div>`).join('')}
      </div>
    </div>

    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px">
      <div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:10px">After saving</div>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:10px">
        <input type="checkbox" id="ts-send-invite" ${s.sendInvite?'checked':''} onchange="window._tsetup.sendInvite=this.checked" style="width:15px;height:15px;cursor:pointer">
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--txt)">Send portal invite to tenant</div>
          <div style="font-size:11px;color:var(--muted)">Emails a unique link to ${s.email||'tenant'} for the tenant portal</div>
        </div>
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
        <input type="checkbox" id="ts-send-kit" ${s.sendWelcomeKit?'checked':''} onchange="window._tsetup.sendWelcomeKit=this.checked" style="width:15px;height:15px;cursor:pointer">
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--txt)">Send welcome kit</div>
          <div style="font-size:11px;color:var(--muted)">Compiles and emails How to Rent, GSC, EICR, EPC, RRA info sheet</div>
        </div>
      </label>
    </div>

    ${!allGood ? `<div style="background:var(--amber-bg);border:1px solid rgba(217,119,6,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--amber);margin-top:10px">
      ⚠️ Some required fields are missing — you can still save and complete them later from the tenant page.
    </div>` : `<div style="background:var(--green-bg);border:1px solid rgba(0,200,150,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green-dark);margin-top:10px">
      ✓ All required information entered — ready to save.
    </div>`}`;
  }
  return '';
}

function tsAddrFile(num, input) {
  if (!input.files[0]) return;
  const f = input.files[0];
  const box = document.getElementById(`ts-addr${num}-box`);
  if (box) box.innerHTML = `<div style="font-size:11px;color:var(--green-dark);font-weight:600">✓ ${f.name}</div>`;
  if (num === 1) window._tsetup.addr1File = f;
  else window._tsetup.addr2File = f;
}

function tenantStepNext() {
  const n = window._tsetup.step;
  const s = window._tsetup;

  // Validate + save current step
  if (n === 1) {
    s.pid        = document.getElementById('ts-prop')?.value || s.pid;
    s.name       = document.getElementById('ts-name')?.value.trim() || '';
    s.email      = document.getElementById('ts-email')?.value.trim() || '';
    s.phone      = document.getElementById('ts-phone')?.value.trim() || '';
    s.tenancyType= document.getElementById('ts-type')?.value || 'APT';
    s.startDate  = document.getElementById('ts-start')?.value || '';
    s.endDate    = document.getElementById('ts-end')?.value || '';
    if (!s.name)      { toast('Tenant name is required', true); return; }
    if (!s.startDate) { toast('Tenancy start date is required', true); return; }
    if (!s.pid)       { toast('Please select a property', true); return; }

  } else if (n === 2) {
    s.rtrDocType   = document.getElementById('ts-rtr-doctype')?.value || '';
    s.rtrRef       = document.getElementById('ts-rtr-ref')?.value.trim() || '';
    s.rtrCheckDate = document.getElementById('ts-rtr-date')?.value || '';
    s.rtrCheckedBy = document.getElementById('ts-rtr-by')?.value.trim() || '';
    s.rtrExpiry    = document.getElementById('ts-rtr-expiry')?.value || '';
    s.rtrSkipped   = document.getElementById('ts-rtr-skip')?.checked || false;
    if (!s.rtrSkipped && !s.rtrCheckDate) {
      toast('Please enter the check date, or tick "Skip for now"', true); return;
    }

  } else if (n === 3) {
    s.addr1Type   = document.getElementById('ts-addr1-type')?.value || '';
    s.addr2Type   = document.getElementById('ts-addr2-type')?.value || '';
    s.deposit     = document.getElementById('ts-deposit')?.value || '';
    s.depositScheme = document.getElementById('ts-dep-scheme')?.value || '';
    s.depositRef  = document.getElementById('ts-dep-ref')?.value.trim() || '';
    if (!s.addr1Type) { toast('Please select document type for Address proof 1', true); return; }
    if (!s.addr2Type) { toast('Please select document type for Address proof 2 — 2 documents are required', true); return; }
    if (!s.deposit)   { toast('Deposit amount is required', true); return; }

  } else if (n === 4) {
    s.rent        = document.getElementById('ts-rent')?.value || '';
    s.rentDay     = document.getElementById('ts-rentday')?.value || '1';
    s.firstPayDate= document.getElementById('ts-firstpay')?.value || '';
    s.payMethod   = document.getElementById('ts-paymethod')?.value || 'Standing order';
    if (!s.rent) { toast('Monthly rent is required', true); return; }

  } else if (n === 5) {
    // Save insurance fields from step 5
    ['ins_buildings','ins_contents','ins_liability','ins_rentguarantee'].forEach(k => {
      s[k] = {
        provider: document.getElementById(`ts-${k}-prov`)?.value.trim() || '',
        policy:   document.getElementById(`ts-${k}-pol`)?.value.trim()  || '',
        expiry:   document.getElementById(`ts-${k}-exp`)?.value         || '',
        premium:  document.getElementById(`ts-${k}-prem`)?.value        || '',
      };
    });

  } else if (n === 6) {
    s.sendInvite     = document.getElementById('ts-send-invite')?.checked ?? true;
    s.sendWelcomeKit = document.getElementById('ts-send-kit')?.checked ?? false;
    _saveTenantSetupToDB();
    return;
  }

  window._tsetup.step = n + 1;
  document.getElementById('mo-s').textContent = `Step ${n+1} of 6`;
  _renderTenantStep(n + 1);
  document.querySelector('.mo-box')?.scrollTo?.(0, 0);
}

function tenantStepBack() {
  const n = window._tsetup.step;
  if (n <= 1) return;
  window._tsetup.step = n - 1;
  document.getElementById('mo-s').textContent = `Step ${n-1} of 6`;
  _renderTenantStep(n - 1);
  document.querySelector('.mo-box')?.scrollTo?.(0, 0);
}

async function _saveTenantSetupToDB() {
  const btn = document.getElementById('tsetup-next');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Saving…'; }
  const s = window._tsetup;

  try {
    // Clean deposit scheme value (strip long form)
    const schemeClean = s.depositScheme.replace(' (Deposit Protection Service)','').replace(' (Tenancy Deposit Scheme)','');

    const tenant = {
      prop_id:      parseInt(s.pid),
      name:         s.name,
      email:        s.email || null,
      phone:        s.phone || null,
      type:         s.tenancyType,
      start_date:   s.startDate || null,
      end_date:     s.endDate || null,
      rent:         parseFloat(s.rent) || 0,
      rent_day:     parseInt(s.rentDay) || 1,
      deposit:      parseFloat(s.deposit) || 0,
      scheme:       schemeClean || null,
      scheme_ref:   s.depositRef || null,
      // Right to Rent
      rtr_doc_type:   s.rtrSkipped ? null : (s.rtrDocType || null),
      rtr_ref:        s.rtrSkipped ? null : (s.rtrRef || null),
      rtr_check_date: s.rtrSkipped ? null : (s.rtrCheckDate || null),
      rtr_checked_by: s.rtrSkipped ? null : (s.rtrCheckedBy || null),
      rtr_expiry:     s.rtrSkipped ? null : (s.rtrExpiry || null),
      rtr_skipped:    s.rtrSkipped || false,
      // Address proof
      addr_proof_1:   s.addr1Type || null,
      addr_proof_2:   s.addr2Type || null,
      // Payment
      first_pay_date: s.firstPayDate || null,
      pay_method:     s.payMethod || null,
      status:         'Active',
      is_lead:        s.isLead !== false,
      user_id:        currentUser.id,
      invite_token:   crypto.randomUUID(),
      invite_used:    false,
      landlord_email: currentUser.email,
    };

    const { data: td, error: te } = await sb.from('tenants').insert(tenant).select().single();
    if (te) throw new Error(te.message);

    D.tenants.push({ ...td, start: td.start_date, end: td.end_date });
    await logAudit('ADD_TENANT', 'tenants', td.id, `Added tenant: ${s.name} · Property: ${s.pid} · Deposit: £${s.deposit} · RTR: ${s.rtrSkipped?'skipped':'completed'}`);

    // Save insurance records if any filled
    const insTypeMap = {
      ins_buildings:    'Buildings Insurance',
      ins_contents:     'Contents Insurance',
      ins_liability:    'Landlord Liability Insurance',
      ins_rentguarantee:'Rent Guarantee Insurance',
    };
    const insToSave = Object.entries(insTypeMap)
      .filter(([k]) => s[k]?.provider || s[k]?.expiry || s[k]?.premium)
      .map(([k, typeName]) => ({
        prop_id:  parseInt(s.pid),
        type:     typeName,
        provider: s[k].provider || null,
        policy:   s[k].policy   || null,
        expiry:   s[k].expiry   || null,
        premium:  parseFloat(s[k].premium) || null,
        status:   s[k].expiry ? (new Date(s[k].expiry) > new Date() ? 'Active' : 'Expired') : 'Active',
        user_id:  currentUser.id,
      }));
    if (insToSave.length) {
      const { data: id2 } = await sb.from('insurance').insert(insToSave).select();
      if (id2) D.insurance.push(...id2);
    }

    // Send portal invite if toggled

// ── MODAL: WELCOME KIT ──
// Auto-compiled document pack sent to tenant at tenancy start.
// Mandatory items cannot be silently removed — they show a warning if missing.
function moWelcomeKit(pid) {
  const p = P(pid);
  if (!p) { toast('Property not found', true); return; }
  const tenant = D.tenants.find(t => String(t.prop_id) === String(pid) && t.status === 'Active');
  const pCerts = CF(pid);

  const findCert = type => pCerts.find(c => c.type && c.type.toLowerCase().includes(type.toLowerCase()));
  const gasCert  = findCert('gas');
  const eicrCert = findCert('eicr') || findCert('electrical');
  const epcCert  = findCert('epc')  || findCert('energy');

  // Check if RRA sheet already sent
  const rraSent = D.emailLog.some(e => String(e.prop_id) === String(pid) && (e.template_id === 'rra_info_sheet' || (e.subject||'').toLowerCase().includes('renters rights')));

  // Build document list — mandatory items marked, optional can be toggled
  // Each item: { id, icon, label, desc, mandatory, available, warning, link, certId }
  const docs = [
    {
      id: 'rra',
      icon: '📋',
      label: 'RRA 2025 Information Sheet',
      desc: 'Mandatory from 1 May 2026 · Fine up to £7,000 if not served',
      mandatory: true,
      available: true, // always — we include the GOV.UK link
      alreadySent: rraSent,
      warning: rraSent ? null : 'Not yet sent to this tenant — this is MANDATORY',
      link: 'https://www.gov.uk/government/publications/how-to-rent',
      certId: null,
    },
    {
      id: 'h2r',
      icon: '📖',
      label: 'How to Rent Guide',
      desc: 'Government guide — must be current edition · Keep proof of service',
      mandatory: true,
      available: true,
      link: 'https://www.gov.uk/government/publications/how-to-rent',
      certId: null,
    },
    {
      id: 'gsc',
      icon: '🔥',
      label: 'Gas Safety Certificate (GSC)',
      desc: gasCert ? `Expires: ${gasCert.expiry ? new Date(gasCert.expiry).toLocaleDateString('en-GB') : 'No expiry'} · Engineer: ${gasCert.engineer||'—'}` : 'No certificate on file',
      mandatory: true,
      available: !!gasCert,
      warning: !gasCert ? 'Missing — upload a GSC before sending' : (gasCert.status === 'Expired' ? 'Certificate EXPIRED — renew before serving' : null),
      certId: gasCert?.id || null,
    },
    {
      id: 'eicr',
      icon: '⚡',
      label: 'Electrical Installation Report (EICR)',
      desc: eicrCert ? `Expires: ${eicrCert.expiry ? new Date(eicrCert.expiry).toLocaleDateString('en-GB') : 'No expiry'} · Engineer: ${eicrCert.engineer||'—'}` : 'No certificate on file',
      mandatory: true,
      available: !!eicrCert,
      warning: !eicrCert ? 'Missing — upload an EICR before sending' : (eicrCert.status === 'Expired' ? 'Certificate EXPIRED — renew before serving' : null),
      certId: eicrCert?.id || null,
    },
    {
      id: 'epc',
      icon: '🏷',
      label: 'Energy Performance Certificate (EPC)',
      desc: epcCert ? `Rating: ${p.epc_rating||'—'} · Expires: ${epcCert.expiry ? new Date(epcCert.expiry).toLocaleDateString('en-GB') : 'No expiry'}` : 'No certificate on file',
      mandatory: true,
      available: !!epcCert,
      warning: !epcCert ? 'Missing — upload an EPC before sending' : (epcCert.status === 'Expired' ? 'Certificate EXPIRED — renew before serving' : null),
      certId: epcCert?.id || null,
    },
    {
      id: 'deposit',
      icon: '🔒',
      label: 'Deposit protection details',
      desc: tenant?.scheme ? `Scheme: ${tenant.scheme} · Ref: ${tenant.scheme_ref||'—'} · Amount: £${(tenant.deposit||0).toLocaleString()}` : 'No deposit scheme on record',
      mandatory: true,
      available: !!(tenant?.scheme),
      warning: !tenant?.scheme ? 'Deposit scheme not set — add via tenant details' : null,
      certId: null,
    },
    {
      id: 'tenancy',
      icon: '✍️',
      label: 'Written Statement / Tenancy Agreement',
      desc: 'Send via e-sign if not yet provided — required under RRA 2025',
      mandatory: true,
      available: false,
      warning: 'Use the e-sign tool to send and get a signed copy',
      certId: null,
    },
    {
      id: 'prescribed',
      icon: '🏦',
      label: 'Prescribed Information (deposit scheme)',
      desc: tenant?.scheme ? `Scheme: ${tenant.scheme} · Must be served within 30 days of receiving deposit` : 'No deposit scheme on record — set up deposit protection first',
      mandatory: true,
      available: !!(tenant?.scheme),
      warning: !tenant?.scheme ? 'Deposit scheme not set — add via tenant details before serving' : null,
      certId: null,
    },
    {
      id: 'alarms',
      icon: '🔔',
      label: 'Smoke & CO alarm test confirmation',
      desc: 'Landlord must test all alarms on day 1 of tenancy and keep a signed record — fine up to £5,000 if not done',
      mandatory: true,
      available: false,
      warning: 'Log the alarm test in the property inspection record and get tenant signature',
      certId: null,
    },
  ];

  const missingMandatory = docs.filter(d => d.mandatory && (!d.available || d.warning));
  const propAddr = [p.address, p.city].filter(Boolean).join(', ');
  const tenantName = tenant?.name || 'Tenant';
  const tenantEmail = tenant?.email || '';

  openMo('📦 Welcome kit', `${propAddr} · ${tenantName}`, `
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Auto-compiled from your property records. Review before sending — mandatory items are locked.</div>

    ${missingMandatory.length ? `<div style="background:rgba(229,62,62,0.07);border:1px solid rgba(229,62,62,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px;display:flex;gap:8px">
      <span style="flex-shrink:0;font-size:16px">⚠️</span>
      <div><strong>${missingMandatory.length} mandatory item${missingMandatory.length!==1?'s':''} need attention</strong> — you can still send but these will be flagged. Fix them first for full compliance.</div>
    </div>` : `<div style="background:var(--green-bg);border:1px solid rgba(0,200,150,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green-dark);margin-bottom:14px">
      ✅ All mandatory documents are ready — good to send.
    </div>`}

    <div style="margin-bottom:16px">
      ${docs.map(doc => `
        <div style="display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1px solid ${doc.warning?'rgba(217,119,6,0.25)':'var(--border)'};border-radius:8px;margin-bottom:6px;background:${doc.warning?(doc.mandatory&&!doc.available?'rgba(229,62,62,0.04)':'rgba(217,119,6,0.04)'):'var(--white)'}">
          <span style="font-size:18px;flex-shrink:0;margin-top:1px">${doc.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">
              <span style="font-size:13px;font-weight:600;color:var(--txt)">${doc.label}</span>
              ${doc.mandatory ? `<span style="font-size:10px;font-weight:700;color:var(--red);background:var(--red-bg);padding:1px 7px;border-radius:100px">Mandatory</span>` : `<span style="font-size:10px;font-weight:600;color:var(--muted);background:var(--off);padding:1px 7px;border-radius:100px">Optional</span>`}
              ${doc.alreadySent ? `<span style="font-size:10px;font-weight:700;color:var(--green-dark);background:var(--green-bg);padding:1px 7px;border-radius:100px">✓ Already sent</span>` : ''}
            </div>
            <div style="font-size:11px;color:var(--muted)">${doc.desc}</div>
            ${doc.warning ? `<div style="font-size:11px;color:${doc.mandatory&&!doc.available?'var(--red)':'var(--amber)'};font-weight:600;margin-top:3px">⚠ ${doc.warning}</div>` : ''}
          </div>
          <div style="flex-shrink:0;display:flex;align-items:center;gap:8px">
            ${!doc.mandatory ? `<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--muted)">
              <input type="checkbox" id="wk-${doc.id}" checked style="width:14px;height:14px;cursor:pointer">
              Include
            </label>` : `<span style="font-size:18px">${doc.available&&!doc.warning?'✅':'⚠️'}</span>`}
          </div>
        </div>`).join('')}
    </div>

    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px">
      <div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:10px">Send to</div>
      <div class="fg-row" style="margin-bottom:0">
        <div class="fg"><label>Tenant name</label><input type="text" id="wk-tenant-name" value="${tenantName}" placeholder="Tenant name"></div>
        <div class="fg"><label>Tenant email <span class="req">*</span></label><input type="email" id="wk-tenant-email" value="${tenantEmail}" placeholder="tenant@example.com"></div>
      </div>
    </div>
  `,
  `<button class="btn" onclick="closeMo()">Cancel</button>
   <button class="btn btn-navy" id="wk-send-btn" onclick="sendWelcomeKit('${pid}')">📦 Send welcome kit</button>`);
}

function switchSkTab(tab) {
  window._sk.phase = tab;

  document.getElementById('sk-panel-day30').style.display = tab==='day30' ? 'block' : 'none';
