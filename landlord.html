<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rent Safe AI — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1E3D;--navy-mid:#132847;
  --green:#00C896;--green-dark:#009970;--green-bg:rgba(0,200,150,0.1);
  --blue:#3B6FE8;--blue-bg:rgba(59,111,232,0.09);
  --red:#E53E3E;--red-bg:rgba(229,62,62,0.09);
  --amber:#D97706;--amber-bg:rgba(217,119,6,0.09);
  --white:#fff;--off:#F6F8FB;--border:#E4EAF1;
  --txt:#1A2B45;--muted:#7A8FA6;
  --font:'DM Sans',system-ui,sans-serif;
  --disp:'DM Serif Display',Georgia,serif;
  --sb:228px;
}
html,body{height:100%;font-family:var(--font);color:var(--txt);background:var(--off);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;min-height:100vh}
.top-header{background:var(--navy);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.th-logo{font-family:var(--disp);font-size:18px;color:#fff;text-decoration:none}
.th-logo span{color:var(--green)}
.th-right{display:flex;align-items:center;gap:8px}
.th-user{display:flex;align-items:center;gap:8px}
.th-avatar{width:28px;height:28px;border-radius:50%;background:rgba(0,200,150,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--green);flex-shrink:0}
.th-username{font-size:13px;color:rgba(255,255,255,0.6)}
.th-btn{padding:6px 14px;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:none;color:rgba(255,255,255,0.6);transition:all .15s}
.th-btn:hover{background:rgba(255,255,255,0.08);color:#fff}
.top-nav{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99;overflow-x:auto;flex-shrink:0}
.top-nav::-webkit-scrollbar{display:none}
.top-nav-inner{display:flex;align-items:center;padding:0 28px;min-width:max-content}
.nav-item{display:flex;align-items:center;gap:7px;padding:14px 14px;font-size:13.5px;font-weight:400;color:var(--muted);cursor:pointer;border:none;background:none;font-family:var(--font);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-item:hover{color:var(--txt)}
.nav-item.active{color:var(--navy);font-weight:600;border-bottom-color:var(--navy)}
.nav-item svg{width:14px;height:14px;opacity:.6;flex-shrink:0}
.nav-item.active svg{opacity:1}
.nav-divider{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
.topbar{background:var(--off);border-bottom:1px solid var(--border);padding:0 28px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-size:13px;font-weight:500;color:var(--muted)}
.tb-right{display:flex;align-items:center;gap:8px}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.content{padding:24px 28px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--white);color:var(--muted);text-decoration:none;white-space:nowrap}
.btn:hover{border-color:#c5d0dd;background:var(--off);color:var(--txt)}
.btn-navy{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-navy:hover{background:var(--navy-mid);color:#fff;border-color:var(--navy-mid)}
.btn-navy:disabled{opacity:.6;cursor:not-allowed}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{width:28px;height:28px;padding:0;justify-content:center;font-size:13px}
.ph{margin-bottom:22px}
.ph h1{font-size:22px;font-weight:600;color:var(--txt);margin-bottom:3px}
.ph p{font-size:13px;color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.metrics-3{grid-template-columns:repeat(3,1fr)}
.mc{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.mc-label{font-size:12px;color:var(--muted)}
.mc-icon{width:30px;height:30px;border-radius:7px;background:var(--off);display:flex;align-items:center;justify-content:center;font-size:14px}
.mc-val{font-size:26px;font-weight:600;color:var(--txt);line-height:1}
.mc-sub{font-size:11px;color:var(--muted);margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
.panel{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.panel:last-child{margin-bottom:0}
.ph2{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ph2 h2{font-size:14px;font-weight:600;color:var(--txt)}
.ph2 p{font-size:12px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green-dark)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:#EEF2F7;color:#556678}
.ai-row{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;cursor:pointer;transition:background .1s}
.ai-row:last-child{border-bottom:none}
.ai-row:hover{background:var(--off)}
.ai-body{flex:1}
.ai-title{font-size:13px;font-weight:500;color:var(--txt)}
.ai-sub{font-size:11px;color:var(--muted);margin-top:2px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 14px;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--off);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:#3D5166;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(246,248,251,.8)}
.td-bold{font-weight:500;color:var(--txt)}
.td-act{display:flex;gap:5px;align-items:center}
.prop-group{padding:12px 14px;background:var(--off);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.prog-wrap{width:70px;height:5px;background:var(--border);border-radius:100px;overflow:hidden;display:inline-block}
.prog-fill{height:100%;border-radius:100px;background:var(--green)}
.tabs{display:flex;margin-bottom:18px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.tab{flex:1;padding:9px 18px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);background:var(--white);border:none;font-family:var(--font);transition:all .15s;border-right:1px solid var(--border)}
.tab:last-child{border-right:none}
.tab.active{background:var(--blue);color:#fff}
.prop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.pc{background:var(--white);border:1px solid var(--border);border-radius:10px;transition:box-shadow .2s;overflow:hidden}
.pc:hover{box-shadow:0 4px 18px rgba(11,30,61,.07)}
.pc-head{padding:16px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.pc-addr{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:2px}
.pc-city{font-size:12px;color:var(--muted)}
.pc-info{padding:0 16px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pc-tag{background:var(--off);color:var(--muted);border:1px solid var(--border);font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px}
.pc-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.t-av{width:34px;height:34px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue);flex-shrink:0}
.sf{display:flex;align-items:center;gap:4px;white-space:nowrap}
.sf-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--muted);font-family:var(--font)}
.sf-on{background:var(--navy);color:#fff;border-color:var(--navy)}
.chat-outer{display:flex;flex-direction:column;height:calc(100vh - 54px)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:70%;padding:10px 14px;border-radius:10px;font-size:13.5px;line-height:1.6}
.msg.ai{background:var(--white);border:1px solid var(--border);color:#3D5166;align-self:flex-start;border-radius:3px 10px 10px 10px}
.msg.ai .mlbl{font-size:10px;font-weight:600;color:var(--green-dark);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.msg.user{background:var(--navy);color:#fff;align-self:flex-end;border-radius:10px 3px 10px 10px}
.chat-bar{padding:14px 24px;border-top:1px solid var(--border);background:var(--white);display:flex;gap:10px}
.chat-in{flex:1;padding:9px 13px;border-radius:8px;border:1px solid var(--border);font-family:var(--font);font-size:13.5px;outline:none;color:var(--txt)}
.chat-in:focus{border-color:var(--navy)}
.chat-disc{font-size:10px;color:var(--muted);text-align:center;padding:6px 24px;background:var(--off);border-top:1px solid var(--border)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.cal-nav h3{font-size:14px;font-weight:600}
.cal-wrap{padding:14px 18px}
.cal-dh{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-dn{text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted)}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cc{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);cursor:pointer;position:relative}
.cc:hover{background:var(--off)}
.cc.cm{color:var(--txt)}
.cc.td{background:var(--navy);color:#fff;font-weight:600}
.cc.hd::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.cc.td.hd::after{background:rgba(255,255,255,.7)}
.detail-back{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;background:none;border:none;font-family:var(--font);margin-bottom:18px;padding:0}
.detail-back:hover{color:var(--navy)}
.coll{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.coll-hd{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.coll-hd:hover{background:var(--off)}
.coll-l{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;color:var(--txt)}
.coll-cnt{font-size:11px;color:#fff;background:var(--navy);padding:1px 7px;border-radius:100px;font-weight:600}
.coll-r{display:flex;align-items:center;gap:10px}
.coll-arr{color:var(--muted);font-size:12px;transition:transform .2s;display:inline-block}
.coll-arr.op{transform:rotate(180deg)}
.coll-body{border-top:1px solid var(--border);padding:18px}
.coll-body.hidden{display:none}
.det-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px}
.det-f label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);display:block;margin-bottom:3px}
.det-f span{font-size:13.5px;color:var(--txt)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mo-box{background:var(--white);border-radius:12px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto}
.mo-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
.mo-hd h3{font-size:15px;font-weight:600;color:var(--txt)}
.mo-hd p{font-size:12px;color:var(--muted);margin-top:2px}
.mo-x{font-size:18px;cursor:pointer;color:var(--muted);background:none;border:none;padding:0;margin-left:10px;flex-shrink:0}
.mo-bd{padding:20px}
.mo-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--white)}
.fg{margin-bottom:14px}
.fg label{font-size:11px;font-weight:600;color:var(--txt);margin-bottom:5px;display:block;letter-spacing:.3px;text-transform:uppercase}
.fg label .req{color:var(--red);margin-left:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border-radius:7px;border:1px solid var(--border);font-family:var(--font);font-size:13.5px;color:var(--txt);outline:none;background:var(--white)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy)}
.fg textarea{min-height:70px;resize:vertical}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg-div{height:1px;background:var(--border);margin:18px 0}
.fg-sec{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:12px}
.scan-box{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px;position:relative}
.scan-box:hover{border-color:var(--navy);background:var(--off)}
.scan-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.scan-ic{font-size:28px;margin-bottom:8px}
.scan-t{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:3px}
.scan-s{font-size:12px;color:var(--muted)}
.scan-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);color:var(--green-dark);border:1px solid rgba(0,200,150,0.2);font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;margin-top:8px}
.ai-res{background:var(--off);border:1px solid rgba(0,200,150,0.25);border-radius:8px;padding:14px;margin-bottom:14px;display:none}
.ai-res-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;font-weight:600;color:var(--green-dark)}
.ai-res-g{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ai-res-f{font-size:12px}
.ai-res-f span{display:block;color:var(--muted);font-size:11px;margin-bottom:1px}
.ai-res-f strong{color:var(--txt)}
.empty{padding:40px;text-align:center}
.empty-ic{font-size:28px;margin-bottom:10px;opacity:.35}
.empty-t{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:4px}
.empty-s{font-size:12px;color:var(--muted)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.step-bar{display:flex;gap:6px;margin-bottom:20px}
.step-bar-seg{flex:1;height:3px;border-radius:100px;background:var(--border);transition:background .3s}
.step-bar-seg.done{background:var(--blue)}
.step-box{display:none}
.step-box.active{display:block}
.step-title{font-size:13px;color:var(--muted);margin-bottom:16px}
.mo-nav{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--white)}
.btn-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;font-family:var(--font);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;padding:7px 0}
.btn-back:hover{color:var(--txt)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<div class="app">

<!-- TOP HEADER -->
<div class="top-header">
  <a href="index.html" class="th-logo"><span>Rent</span>Safe AI</a>
  <div class="th-right">
    <div class="th-user">
      <div class="th-avatar" id="th-av">—</div>
      <span class="th-username" id="sb-username">Loading…</span>
    </div>
    <button class="th-btn" onclick="window.location.href='index.html'">← Website</button>
    <button class="th-btn" onclick="logout()">Log out</button>
  </div>
</div>

<!-- TOP NAV -->
<div class="top-nav">
  <div class="top-nav-inner">
    <button class="nav-item active" data-page="dashboard">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      Dashboard
    </button>
    <div class="nav-divider"></div>
    <button class="nav-item" data-page="properties">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14V7L8 2l6 5v7"/><path d="M6 14v-4h4v4"/></svg>
      Properties
    </button>
    <button class="nav-item" data-page="tenants">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5"/></svg>
      Tenants
    </button>
    <button class="nav-item" data-page="rent">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5v7M5.5 6.5a2.5 2 0 015 0c0 2-5 2-5 4a2.5 2 0 005 0"/></svg>
      Rent
    </button>
    <div class="nav-divider"></div>
    <button class="nav-item" data-page="compliance">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1.5L2 4v4c0 3.5 2.5 6 6 7 3.5-1 6-3.5 6-7V4L8 1.5z"/><path d="M5.5 8l2 2 3-3"/></svg>
      Compliance
    </button>
    <button class="nav-item" data-page="maintenance">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.5 2.5a3 3 0 00-4 4L2 11a1.5 1.5 0 002 2l4.5-4.5a3 3 0 004-4l-2 2-1.5-1.5 2-2z"/></svg>
      Maintenance
    </button>
    <button class="nav-item" data-page="insurance">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h10v6.5c0 2.5-2 4-5 4.5-3-.5-5-2-5-4.5V3z"/><path d="M6 8l1.5 1.5L10 6"/></svg>
      Insurance
    </button>
    <div class="nav-divider"></div>
    <button class="nav-item" data-page="calendar">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="2.5" width="13" height="12" rx="2"/><path d="M5 1v3M11 1v3M1.5 6.5h13"/></svg>
      Calendar
    </button>
    <button class="nav-item" data-page="financials">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12V4l4 3 3-4 3 3 2-2v8H2z"/></svg>
  P&L
</button>
    <button class="nav-item" data-page="templates">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="9" height="12" rx="1.5"/><path d="M5 4h5M5 7h5M5 10h3"/><path d="M11 9l3 3-1.5 1.5L9 10.5"/></svg>
  Templates

// ── REUSABLE: scanAndFill ──
async function scanAndFill(file, onResult){
  if(!file) return;
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
  const isImg=file.type.startsWith('image/');
  const msgContent=isImg
    ?[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'UK property compliance certificate. Extract: certificate type, issue date (YYYY-MM-DD), expiry date (YYYY-MM-DD), engineer or provider name, address. Return JSON only, keys: type, issued, expiry, engineer, address.'}]
    :[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'UK property compliance certificate. Extract: certificate type, issue date (YYYY-MM-DD), expiry date (YYYY-MM-DD), engineer or provider name, address. Return JSON only, keys: type, issued, expiry, engineer, address.'}];
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:msgContent}]})});
  const data=await res.json();
  const txt=data.content?.[0]?.text||'{}';
  const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
  onResult(parsed);
}

async function uploadScanCert(certId, input){
  if(!input.files[0]) return;

  if(lbl) lbl.textContent='⏳ Scanning…';

      const updates={has_file:true};
      if(parsed.expiry) updates.expiry=parsed.expiry;
      if(parsed.engineer) updates.engineer=parsed.engineer;
      if(parsed.expiry) updates.status=new Date(parsed.expiry)<new Date()?'Expired':'Valid';
      const{error}=await sb.from('certificates').update(updates).eq('id',certId);
      if(error){toast('Error: '+error.message,true);return;}
      const c=D.certs.find(x=>x.id===certId);
      if(c) Object.assign(c,updates,{file:true});
      toast('✓ Scanned & saved — expiry and engineer auto-filled!');
      nav('compliance');
    });
  }catch(e){
    if(lbl) lbl.textContent='⚠️ Scan failed';
    toast('Could not scan — please edit manually',true);
  }
}

function propStepNext(){
  const s=window._propStep;
  if(s===1){
    if(!document.getElementById('p-addr').value.trim()||!document.getElementById('p-city').value.trim()||!document.getElementById('p-post').value.trim()){toast('Please fill in address, city and postcode.',true);return;}
    goStep(2);
  } else if(s===2){
    goStep(3);
  } else if(s===3){
    savePropToDB();
  }
}
function propStepBack(){if(window._propStep>1)goStep(window._propStep-1);}
function goStep(n){
  window._propStep=n;
  document.querySelectorAll('.step-box').forEach((el,i)=>el.classList.toggle('active',i+1===n));
  document.querySelectorAll('.step-bar-seg').forEach((el,i)=>el.classList.toggle('done',i<n));
  document.getElementById('mo-back-btn').style.visibility=n===1?'hidden':'visible';
  document.getElementById('mo-next-btn').textContent=n===3?'Add property ✓':'Next →';
}

async function saveInspectionToDB(pid) {
  const date = document.getElementById('insp-date')?.value;
  const type = document.getElementById('insp-type')?.value;
  const inspector = document.getElementById('insp-who')?.value.trim();
  const notes = document.getElementById('insp-notes')?.value.trim();
  if (!date) { toast('Please enter an inspection date.', true); return; }

  const p = P(pid);
  const inspections = [...(p.inspections || []), {date, type, inspector, notes}];
  const { error } = await sb.from('properties').update({inspections}).eq('id', pid);
  if (error) { toast('Error: ' + error.message, true); return; }

  p.inspections = inspections;
  await logAudit('ADD_INSPECTION', 'properties', pid, `${type} inspection on ${date}`);
  closeMo(); toast('✓ Inspection logged!');
  nav('prop-detail', pid);
}

// ── ACTION ITEMS ──
function UA(){
  const today=new Date(); today.setHours(0,0,0,0);
  const miss=D.certs.filter(c=>c.status==='Missing').map(c=>({b:'red',l:'Urgent',t:`Missing ${c.type}`,s:(P(c.prop_id)||{address:'—'}).address}));
  const mnt=D.maintenance.filter(x=>x.status!=='Resolved').map(x=>({b:x.priority==='Urgent'?'red':'amber',l:x.awaab?'Awaab':x.priority,t:x.title,s:(P(x.prop_id)||{address:'—'}).address}));
  const rnt=D.rent.filter(x=>x.status==='Due'||x.status==='Late').map(x=>({b:x.status==='Late'?'red':'amber',l:x.status,t:`Rent ${x.status.toLowerCase()} — ${x.month}`,s:(P(x.prop_id)||{address:'—'}).address}));
  // Smart reminders from calendar
  const reminders=[];
  D.certs.filter(c=>c.expiry).forEach(c=>{
    const d=new Date(c.expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    if(days>=0&&days<=30){
      const prop=(P(c.prop_id)||{address:'—'}).address;
      reminders.push({b:days<=7?'red':'amber',l:days===0?'Today':days<=7?'This week':'Due soon',t:`${c.type} expires in ${days===0?'today':days+' days'}`,s:prop});
    }
  });
  D.properties.filter(p=>p.licence_expiry).forEach(p=>{
    const d=new Date(p.licence_expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    if(days>=0&&days<=30) reminders.push({b:days<=7?'red':'amber',l:'Licence',t:`${p.licence_type||'Licence'} expires in ${days} days`,s:p.address});
  });
  D.properties.filter(p=>p.mortgage_end).forEach(p=>{
    const d=new Date(p.mortgage_end); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    if(days>=0&&days<=30) reminders.push({b:days<=7?'red':'amber',l:'Mortgage',t:`Mortgage ends in ${days} days`,s:p.address});
  });
  return[...miss,...reminders,...mnt,...rnt];
}

function getTodayEventsHtml(){

function renderPropChecklist(prefix, pid, mode){
  var ITEMS = getPropCheckItems(mode);
  var key='rsa_prop_'+prefix+'_'+pid;
  var mkey='rsa_prop_meters_'+pid;
  var saved=JSON.parse(localStorage.getItem(key)||'{}');
  var meters=JSON.parse(localStorage.getItem(mkey)||'{}');
  var total=ITEMS.length, done=ITEMS.filter(function(i){return saved[i.id];}).length;
  var pct=Math.round(done/total*100);
  var col=pct===100?'#00C896':pct>=50?'#D97706':'#E53E3E';
  setTimeout(function(){var el=document.getElementById(prefix+'-cnt-'+pid);if(el)el.textContent=done+'/'+total;},0);
  var groups={};
  ITEMS.forEach(function(item){if(!groups[item.group])groups[item.group]=[];groups[item.group].push(item);});
  var html='<div style="padding:4px 0 8px">';
  html+='<div style="height:5px;background:#E4EAF1;border-radius:100px;overflow:hidden;margin-bottom:14px"><div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:100px"></div></div>';
  Object.keys(groups).forEach(function(grp){
    var gitems=groups[grp];
    html+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:12px 0 6px">'+grp+'</div>';
    gitems.forEach(function(item){
      var checked=saved[item.id]?true:false;
      var borderCol=checked?'var(--green)':'var(--border)';
      var bgCol=checked?'rgba(0,200,150,0.05)':'var(--white)';
      var chkBorder=checked?'var(--green)':'#C5D0DD';
      var chkBg=checked?'var(--green)':'transparent';
      var txtStyle=checked?'text-decoration:line-through;color:var(--muted)':'color:var(--txt)';
      var tick=checked?'<svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>':'';
      html+='<div data-prefix="'+prefix+'" data-pid="'+pid+'" data-id="'+item.id+'" onclick="togglePropCheck(this.dataset.prefix,this.dataset.pid,this.dataset.id)" style="display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:8px;border:1px solid '+borderCol+';background:'+bgCol+';cursor:pointer;margin-bottom:6px">';
      html+='<div style="width:18px;height:18px;border-radius:4px;border:2px solid '+chkBorder+';background:'+chkBg+';flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center">'+tick+'</div>';
      html+='<div style="flex:1"><div style="font-size:12.5px;font-weight:500;'+txtStyle+'">'+item.label+'</div>';
      if(item.detail) html+='<div style="font-size:11px;color:var(--muted);margin-top:1px">'+item.detail+'</div>';
      if(item.meter){
        var mval=meters[item.mkey]||'';
        html+='<input type="text" placeholder="Enter reading e.g. 12345" value="'+mval+'" data-pid="'+pid+'" data-mkey="'+item.mkey+'" onclick="event.stopPropagation()" onchange="saveMeterReading(this.dataset.pid,this.dataset.mkey,this.value)" style="margin-top:6px;width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font)">';
      }
      html+='</div></div>';
    });
  });
  html+='<p style="font-size:10px;color:var(--muted);margin-top:10px">Guide only - not legal advice. Consult a solicitor for your circumstances.</p>';
  html+='</div>';
  return html;
}

function togglePropCheck(prefix,pid,itemId){
  var key='rsa_prop_'+prefix+'_'+pid;
  var saved=JSON.parse(localStorage.getItem(key)||'{}');
  if(saved[itemId]) delete saved[itemId]; else saved[itemId]=true;
  localStorage.setItem(key,JSON.stringify(saved));
  var el=document.getElementById('cb-'+prefix+'-'+pid);
  if(el) el.innerHTML=renderPropChecklist(prefix,pid,prefix==='ob'?'onboard':'deboard');
}

function saveMeterReading(pid,mkey,val){
  var key='rsa_prop_meters_'+pid;
  var meters=JSON.parse(localStorage.getItem(key)||'{}');
  meters[mkey]=val;
  localStorage.setItem(key,JSON.stringify(meters));
}

function propRentHtml(pid){
  var pr=D.rent.filter(function(r){return String(r.prop_id)===String(pid);});
  if(!pr.length) return '<div style="color:var(--muted);font-size:13px;padding:4px 0">No rent records yet</div>';
  var paid=pr.filter(function(r){return r.status==='Paid';}).reduce(function(s,r){return s+(r.amount||0);},0);

    +'<div style="background:var(--green-bg);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--muted)">Collected</div><div style="font-size:16px;font-weight:600;color:var(--green-dark)">£'+paid.toLocaleString()+'</div></div>'

    +'</div>';
  html+='<div class="tw"><table><thead><tr><th>Month</th><th>Amount</th><th>Due</th><th>Paid</th><th>Status</th></tr></thead><tbody>';
  pr.slice(0,6).forEach(function(r){
    html+='<tr><td style="font-size:12px">'+r.month+'</td><td>£'+(r.amount||0).toLocaleString()+'</td>'

  return html;

// ── CALENDAR EVENTS ENGINE ──
function getCalEvents(){
  const events=[];
  const today=new Date(); today.setHours(0,0,0,0);

  // Certificate expiries
  D.certs.filter(c=>c.expiry).forEach(c=>{
    const d=new Date(c.expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const prop=(P(c.prop_id)||{address:'—'}).address;
    const urg=days<0?'red':days<=7?'red':days<=30?'amber':'blue';
    events.push({date:c.expiry,type:'cert',label:c.type+' expiry',sub:prop,urg,days,icon:'📄'});
  });

  // Rent due dates (monthly recurring)
  D.tenants.filter(t=>t.rent&&t.status==='Active').forEach(t=>{
    const prop=(P(t.prop_id)||{address:'—'}).address;
    const day=t.rent_day||1;
    // Generate next 3 months of rent dates
    for(let m=0;m<3;m++){
      const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+m); d.setDate(day);
      const days=Math.round((d-today)/864e5);
      if(days>=-1&&days<=90){
        const dStr=d.toISOString().slice(0,10);
        const urg=days<0?'red':days===0?'red':days<=3?'amber':'blue';
        events.push({date:dStr,type:'rent',label:'Rent due — '+t.name,sub:prop,urg,days,icon:'💷'});
      }
    }
  });

  // Insurance expiries
  D.insurance&&D.insurance.filter(i=>i.expiry).forEach(i=>{
    const d=new Date(i.expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const prop=(P(i.prop_id)||{address:'—'}).address;
    const urg=days<0?'red':days<=7?'red':days<=30?'amber':'blue';
    events.push({date:i.expiry,type:'insurance',label:(i.type||'Insurance')+' expiry',sub:prop,urg,days,icon:'🛡'});
  });

  // Mortgage end dates
  D.properties.filter(p=>p.mortgage_end).forEach(p=>{
    const d=new Date(p.mortgage_end); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const urg=days<0?'red':days<=30?'red':days<=90?'amber':'blue';
    events.push({date:p.mortgage_end,type:'mortgage',label:'Mortgage end',sub:p.address,urg,days,icon:'🏦'});
  });

  // Licence expiries
  D.properties.filter(p=>p.licence_expiry).forEach(p=>{
    const d=new Date(p.licence_expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const urg=days<0?'red':days<=14?'red':days<=60?'amber':'blue';
    events.push({date:p.licence_expiry,type:'licence',label:(p.licence_type||'Licence')+' expiry',sub:p.address,urg,days,icon:'📋'});
  });

  return events.sort((a,b)=>new Date(a.date)-new Date(b.date));
}

function calDayLabel(days){
  if(days<0) return Math.abs(days)+' days overdue';
  if(days===0) return 'Today';
  if(days===1) return 'Tomorrow';
  if(days<=7) return 'In '+days+' days';
  if(days<=30) return 'In '+days+' days';
  return new Date(Date.now()+days*864e5).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function pgCalendar(){
  if(window.calYear===undefined){window.calYear=new Date().getFullYear();window.calMonth=new Date().getMonth();}
  const yr=window.calYear,mo=window.calMonth;
  const now=new Date(); now.setHours(0,0,0,0);
  const mn=new Date(yr,mo,1).toLocaleString('en-GB',{month:'long',year:'numeric'});
  const fd=(new Date(yr,mo,1).getDay()+6)%7;
  const dim=new Date(yr,mo+1,0).getDate();
  const dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const allEvents=getCalEvents();

  // Build event map for this month
  const evMap={};
  allEvents.forEach(ev=>{
    const d=new Date(ev.date);
    if(d.getFullYear()===yr&&d.getMonth()===mo){
      const k=d.getDate();
      if(!evMap[k]) evMap[k]=[];
      evMap[k].push(ev);
    }
  });

  // Calendar cells
  let cells='';
  for(let i=0;i<fd;i++) cells+=`<div class="cc"></div>`;
  for(let d=1;d<=dim;d++){
    const isToday=(yr===now.getFullYear()&&mo===now.getMonth()&&d===now.getDate());
    const dayEvs=evMap[d]||[];
    const hasRed=dayEvs.some(e=>e.urg==='red');
    const hasAmber=dayEvs.some(e=>e.urg==='amber');
    const dotCol=hasRed?'#E53E3E':hasAmber?'#D97706':dayEvs.length?'#3B6FE8':'';
    cells+=`<div class="cc cm${isToday?' td':''}" onclick="showCalDay(${yr},${mo},${d})" style="cursor:${dayEvs.length?'pointer':'default'}">
      ${d}
      ${dotCol?`<div style="width:5px;height:5px;border-radius:50%;background:${dotCol};margin:2px auto 0"></div>`:'<div style="height:7px"></div>'}
    </div>`;
  }

  // Reminders panel — next 60 days
  const upcoming=allEvents.filter(e=>{const days=e.days;return days>=-1&&days<=60;});
  const urgent=upcoming.filter(e=>e.days<=7);
  const warning=upcoming.filter(e=>e.days>7&&e.days<=30);
  const normal=upcoming.filter(e=>e.days>30&&e.days<=60);

  function evRow(e){
    const col=e.urg==='red'?'var(--red)':e.urg==='amber'?'var(--amber)':'var(--blue)';
    const bg=e.urg==='red'?'var(--red-bg)':e.urg==='amber'?'var(--amber-bg)':'var(--blue-bg)';
    return`<div class="ai-row">
      <div style="text-align:center;min-width:40px;font-size:18px">${e.icon}</div>
      <div class="ai-body"><div class="ai-title">${e.label}</div><div class="ai-sub">${e.sub}</div></div>
      <span style="font-size:11px;font-weight:600;color:${col};background:${bg};padding:2px 8px;border-radius:100px;white-space:nowrap">${calDayLabel(e.days)}</span>
    </div>`;
  }

  return`<div class="topbar"><span class="tb-title">Calendar</span></div>
  <div class="content">
    <div class="ph"><h1>Calendar</h1><p>Smart reminders · rent, certificates, inspections, licences</p></div>
    <div class="g2">
      <div>
        <div class="panel" style="margin-bottom:16px">
          <div class="cal-nav">
            <button class="btn btn-sm" onclick="calNav(-1)">‹</button>
            <h3>${mn}</h3>
            <button class="btn btn-sm" onclick="calNav(1)">›</button>
          </div>
          <div class="cal-wrap">
            <div class="cal-dh">${dn.map(d=>`<div class="cal-dn">${d}</div>`).join('')}</div>
            <div class="cal-g">${cells}</div>
          </div>
        </div>
        <div class="panel" id="cal-day-detail" style="display:none">
          <div class="ph2"><h2 id="cal-day-title">Events</h2></div>
          <div id="cal-day-body"></div>
        </div>
      </div>

      <div>
        ${urgent.length?`<div class="panel" style="margin-bottom:16px">
          <div class="ph2"><div><h2>🔴 Urgent — within 7 days</h2><p>${urgent.length} item${urgent.length!==1?'s':''}</p></div></div>
          ${urgent.map(evRow).join('')}
        </div>`:''}

        ${warning.length?`<div class="panel" style="margin-bottom:16px">
          <div class="ph2"><div><h2>🟡 Due soon — 8 to 30 days</h2><p>${warning.length} item${warning.length!==1?'s':''}</p></div></div>
          ${warning.map(evRow).join('')}
        </div>`:''}

        ${normal.length?`<div class="panel" style="margin-bottom:16px">
          <div class="ph2"><div><h2>🔵 Upcoming — 31 to 60 days</h2><p>${normal.length} item${normal.length!==1?'s':''}</p></div></div>
          ${normal.map(evRow).join('')}
        </div>`:''}

        ${!upcoming.length?`<div class="panel">
          <div class="empty"><div class="empty-ic">✓</div><div class="empty-t">All clear</div><div class="empty-s">No events in the next 60 days</div></div>
        </div>`:''}
      </div>
    </div>
  </div>`;
}

function calNav(dir){
  if(window.calYear===undefined){window.calYear=new Date().getFullYear();window.calMonth=new Date().getMonth();}
  window.calMonth+=dir;
  if(window.calMonth>11){window.calMonth=0;window.calYear++;}
  if(window.calMonth<0){window.calMonth=11;window.calYear--;}
  nav('calendar');
}

function showCalDay(yr,mo,d){
  const allEvents=getCalEvents();
  const dayEvs=allEvents.filter(e=>{const ev=new Date(e.date);return ev.getFullYear()===yr&&ev.getMonth()===mo&&ev.getDate()===d;});
  const panel=document.getElementById('cal-day-detail');
  const title=document.getElementById('cal-day-title');
  const body=document.getElementById('cal-day-body');
  if(!panel||!dayEvs.length) return;
  const dateStr=new Date(yr,mo,d).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  title.textContent=dateStr;
  const col=e=>e.urg==='red'?'var(--red)':e.urg==='amber'?'var(--amber)':'var(--blue)';
  const bg=e=>e.urg==='red'?'var(--red-bg)':e.urg==='amber'?'var(--amber-bg)':'var(--blue-bg)';
  body.innerHTML=dayEvs.map(e=>`<div class="ai-row">
    <div style="font-size:18px;min-width:36px;text-align:center">${e.icon}</div>
    <div class="ai-body"><div class="ai-title">${e.label}</div><div class="ai-sub">${e.sub}</div></div>
    <span style="font-size:11px;font-weight:600;color:${col(e)};background:${bg(e)};padding:2px 8px;border-radius:100px">${calDayLabel(e.days)}</span>
  </div>`).join('');
  panel.style.display='block';
}

async function runGenerate(templateId) {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Generating…';

  const propId = document.getElementById('gen-prop')?.value;
  const tenantId = document.getElementById('gen-tenant')?.value;
  const notes = document.getElementById('gen-notes')?.value || '';

  const prop = D.properties.find(p => String(p.id) === String(propId));
  const tenant = D.tenants.find(t => String(t.id) === String(tenantId));

  const contextInfo = `
Property: ${prop ? `${prop.address}, ${prop.city}, ${prop.postcode}` : 'Not specified'}
Monthly rent: ${prop ? '£' + prop.rent : 'Not specified'}
Landlord: ${(currentUser?.email || 'Landlord').split('@')[0]}
Tenant: ${tenant ? tenant.name : 'Not specified'}
Tenant email: ${tenant?.email || 'Not specified'}
Tenancy start: ${tenant?.start_date || 'Not specified'}
Tenancy end: ${tenant?.end_date || 'Periodic'}
Additional notes: ${notes || 'None'}
Today's date: ${new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})}
  `.trim();

  const prompts = {
    section8: `Generate a formal UK Section 8 Notice (Housing Act 1988) using these details:\n${contextInfo}\n\nInclude: header, property address, tenant name, grounds for possession (Ground 8 — rent arrears), required notice period (2 weeks minimum), date, landlord signature block. Format professionally. End with a clear disclaimer that this is a template only and not legal advice.`,
    section13: `Generate a formal UK Section 13 Notice (Housing Act 1988) for a rent increase using:\n${contextInfo}\n\nInclude: header, current rent, new proposed rent (add 5% as example if not specified), effective date (minimum 1 month notice), proper formatting. End with disclaimer.`,
    rrasheet: `Generate a covering letter to accompany the Government's Renters' Rights Act 2025 Information Sheet, addressed to the tenant, using:\n${contextInfo}\n\nExplain: what the Information Sheet is, key changes (end of fixed terms, periodic tenancies, Section 21 abolished), deadline of 1 May 2026, where to get help. Friendly but professional tone. End with disclaimer.`,
    writtenstatement: `Generate a Written Statement of Terms (replacement for AST under Renters' Rights Act 2025) using:\n${contextInfo}\n\nInclude all required sections: parties, property, rent amount & payment date, deposit details, periodic tenancy terms, repair obligations, pet policy, notice periods. End with disclaimer.`,
    petpermission: `Generate a Pet Permission Response letter (approving the request) under the Renters' Rights Act 2025 using:\n${contextInfo}\n\nInclude: acknowledgement of request, approval with reasonable conditions (professional cleaning at end, damage liability), tenant obligations. End with disclaimer.`,
    endoftenancy: `Generate an End of Tenancy Letter using:\n${contextInfo}\n\nInclude: confirmation of end date, key dates, requirements (cleaning, keys return, meter readings, forwarding address), deposit process timeline. End with disclaimer.`,
    depositdeduction: `Generate a Deposit Deduction Letter using:\n${contextInfo}\n\nInclude: itemised deductions table (use example items like cleaning, damage repair), remaining balance, timeline for return. Professional but clear tone. End with disclaimer.`,
    depositreturn: `Generate a Deposit Return Letter confirming full return using:\n${contextInfo}\n\nInclude: confirmation property left in good condition, full deposit amount being returned, bank transfer timeline. End with disclaimer.`,
    inspection: `Generate a Property Inspection Report using:\n${contextInfo}\n\nInclude: inspection date, inspector name, room-by-room condition table (kitchen, living room, bedrooms, bathroom, exterior), overall rating, any actions required. End with disclaimer.`,
    movein: `Generate a Move-in Inventory using:\n${contextInfo}\n\nInclude: date, meter readings section, room-by-room condition and contents checklist, signature blocks for landlord and tenant. End with disclaimer.`,
    moveout: `Generate a Move-out Inventory using:\n${contextInfo}\n\nInclude: date, meter readings, comparison notes against move-in, any damage noted, deposit implication column. End with disclaimer.`,
    rentarrears1: `Generate a friendly but firm first Rent Arrears Warning Letter using:\n${contextInfo}\n\nInclude: amount owed, due date, request to pay within 7 days, contact details, offer to discuss difficulties. Firm but not threatening. End with disclaimer.`,
    rentarrears2: `Generate a formal Final Rent Arrears Warning Letter using:\n${contextInfo}\n\nInclude: total arrears, previous warning reference, 7-day deadline before legal action, mention of Section 8 proceedings, consequences. Professional and serious tone. End with disclaimer.`,
    maintenanceack: `Generate a Maintenance Request Acknowledgement Letter using:\n${contextInfo}\n\nInclude: acknowledgement of issue reported, expected response timeline (within 24 hours for urgent, 7 days for routine), contractor visit process, contact details. End with disclaimer.`,
    contractoraccess: `Generate a Contractor Access Letter (24-hour notice) using:\n${contextInfo}\n\nInclude: date and time of visit, contractor name and trade, reason for visit, tenant rights, landlord contact details. End with disclaimer.`,
    rentincrease: `Generate a friendly Rent Increase Cover Letter to accompany a Section 13 Notice using:\n${contextInfo}\n\nInclude: reason for increase (market rates, costs), amount of increase, effective date, reassurance about tenancy continuing. Warm but professional. End with disclaimer.`,
  };

  const prompt = prompts[templateId] || `Generate a professional UK landlord document for: ${templateId}\n${contextInfo}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'Could not generate document. Please try again.';
    document.getElementById('gen-text').textContent = text;
    document.getElementById('gen-output').style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '✦ Regenerate';
    await logAudit('GENERATE_TEMPLATE', 'templates', templateId, `Generated: ${templateId}`);
  } catch(e) {
    toast('Error generating document. Please try again.', true);
    btn.disabled = false;
    btn.innerHTML = '✦ Generate document';
  }
}

function copyTemplate() {
  const text = document.getElementById('gen-text')?.textContent;
  if (text) {
    navigator.clipboard.writeText(text);
    toast('✓ Copied to clipboard!');
  }
}

function moUploadTemplate() {
  openMo('Upload template', 'Add your own custom template to the library',
    `<div class="fg"><label>Template name</label><input type="text" placeholder="e.g. My custom tenancy agreement"></div>
     <div class="fg"><label>Category</label>
       <select><option>Legal Notices</option><option>Tenancy Documents</option><option>Compliance</option><option>Communications</option></select>
     </div>
     <div class="scan-box"><input type="file" accept=".pdf,.doc,.docx"><div class="scan-ic">📄</div><div class="scan-t">Upload document</div><div class="scan-s">PDF or Word document</div></div>`,
    `<button class="btn" onclick="closeMo()">Cancel</button>
     <button class="btn btn-navy" onclick="toast('Upload coming soon — building storage next!');closeMo()">Upload</button>`
  );
}
// ── START ──
// Wire nav clicks
document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
  btn.addEventListener('click', () => nav(btn.dataset.page));
});
initApp();
</script>
