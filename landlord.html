// ── PLACEHOLDER DETECTION ──
function checkPlaceholders() {
  const el = document.getElementById('gen-text');
  const warn = document.getElementById('gen-placeholder-warn');
  if (!el) return;
  const text = el.textContent || '';
  const matches = [...text.matchAll(/\[[^\]]{1,80}\]/g)].map(m => m[0]);
  if (warn) {
    warn.style.display = matches.length > 0 ? 'block' : 'none';
    warn.innerHTML = matches.length > 0
      ? `ℹ️ <strong>${matches.length} field${matches.length>1?'s':''} to review:</strong> ${matches.slice(0,4).map(m=>`<code style="background:rgba(59,111,232,0.12);padding:1px 6px;border-radius:3px;font-size:11px">${m}</code>`).join(' ')}${matches.length>4?' …':''} — click the document to edit`
      : '';
  }
  if (window._genContext) window._genContext.rawText = text;
}

    <div style="margin-top:32px;padding-top:14px;border-top:1px solid #eee;font-size:11px;color:#999">
      Sent via RentSafe AI · documents@rentsafeai.co.uk · This document is for reference only and does not constitute legal advice.
    </div>
  </div>`;
  try {
    const res = await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'send_email', to, subject, html: htmlBody })
    });
    const data = await res.json();
    if (data.error || !res.ok) throw new Error(data.error || 'Send failed');
    const logEntry = {
      user_id: currentUser.id,
      tenant_id: ctx.tenantId ? parseInt(ctx.tenantId) : null,
      prop_id: ctx.propId ? parseInt(ctx.propId) : null,
      template_id: ctx.templateId,
      template_name: ctx.templateName,
      sent_to: to,
      subject,
      status: 'Sent',
      email_body: htmlBody || null
    };
    const { data: logData } = await sb.from('email_log').insert(logEntry).select().single();
    D.emailLog.unshift({ ...logEntry, sent_at: new Date().toISOString(), id: logData?.id });
    await logAudit('SEND_EMAIL', 'email_log', ctx.templateId, `Sent to ${to}`);
    closeMo();
    toast('✉ Email sent successfully!');
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '✉ Send email';
    toast('Send failed — check domain verification in Resend', true);
    console.error('Email send error:', e);
  }
}

function exportAuditTrail(pid) {

  }).join('');

  <style>body{font-family:Arial,sans-serif;font-size:12px;padding:24px;color:#222}h1{font-size:16px;margin-bottom:4px}p{font-size:12px;color:#666;margin:0 0 16px}table{width:100%;border-collapse:collapse}th{background:#0B1E3D;color:#fff;padding:8px;text-align:left;font-size:11px}td{padding:7px 8px;border-bottom:1px solid #ddd;font-size:11px}tr:nth-child(even){background:#f9f9f9}.meta{background:#f5f5f5;border:1px solid #ddd;border-radius:6px;padding:12px;margin-bottom:16px}@media print{button{display:none}}</style>
  </head><body>
  <h1>Communication Audit Trail — Court Ready</h1>
  <div class="meta"><strong>Property:</strong> ${p?.address||'—'}, ${p?.city||''} ${p?.postcode||''}<br>
  <strong>Tenant:</strong> ${tenant?.name||'—'} &nbsp;&nbsp; <strong>Email:</strong> ${tenant?.email||'—'}<br>
  <strong>Generated:</strong> ${new Date().toLocaleString('en-GB',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}<br>
  <strong>Reference:</strong> RentSafe AI — Timestamped Compliance Record</div>
  <p>This document provides a full timestamped record of all communications sent via RentSafe AI for use in legal proceedings, deposit disputes or compliance audits.</p>

  <script>window.onload=()=>window.print();<\/script>

// State for Section 8 generator
let _s8 = {};

function moSection8(pid) {
  // If no valid pid, show property picker first
  if (!pid || pid === 'undefined' || pid === '') {
    if (!D.properties.length) { toast('Add a property first', true); return; }
    if (D.properties.length === 1) { moSection8(String(D.properties[0].id)); return; }
    openMo('Section 8 Generator','Select property to start',
      `<div class="fg"><label>Which property?</label><select id="s8-prop-sel">${D.properties.map(p=>`<option value="${p.id}">${p.address}, ${p.city}</option>`).join('')}</select></div>`,
      `<button class="btn" onclick="closeMo()">Cancel</button><button class="btn btn-navy" onclick="const v=document.getElementById('s8-prop-sel').value;closeMo();setTimeout(()=>moSection8(v),50)">Start →</button>`
    ); return;
  }
  const p = D.properties.find(x => String(x.id) === String(pid));
  if (!p) {
    // Property ID not matched — show selector
    if (!D.properties.length) { toast('No properties found', true); return; }
    openMo('Section 8 Generator','Select property to start',
      `<div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--amber);margin-bottom:14px">⚠ Property not found — please select one below</div>
      <div class="fg"><label>Property</label><select id="s8-prop-sel">${D.properties.map(p=>`<option value="${p.id}">${p.address}, ${p.city}</option>`).join('')}</select></div>`,
      `<button class="btn" onclick="closeMo()">Cancel</button><button class="btn btn-navy" onclick="const v=document.getElementById('s8-prop-sel').value;closeMo();setTimeout(()=>moSection8(v),50)">Start →</button>`
    ); return;
  }

  const t = D.tenants.find(x => String(x.prop_id) === String(pid) && (x.is_lead !== false || true));

  _s8 = { pid: String(pid), tid: t ? String(t.id) : null, step: 1, category: null,
          selectedGrounds: [], fields: {}, prop: p, tenant: t };

  // Widen the modal
  const box = document.querySelector('.mo-box');
  if (box) box.classList.add('mo-wide');

  document.getElementById('mo-t').textContent = 'Section 8 Notice Generator';
  document.getElementById('mo-s').textContent = 'RRA 2025 compliant · All grounds included';
  document.getElementById('mo').classList.add('open');
  s8Render();
}

      <div style="display:flex;justify-content:space-between;width:100%;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="closeMo()">Close</button>
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="s8CopyText()">📋 Copy</button>
          <button class="btn" onclick="s8DownloadPDF()">📄 Download PDF</button>
          ${t?.email ? `<button class="btn btn-navy" onclick="s8SendToTenant()">✉ Send to ${t.name.split(' ')[0]}</button>` : ''}
        </div>

    toast('Generation failed — please try again', true);

  }

function s8CopyText() {
  navigator.clipboard.writeText(_s8.generatedText || '');
  toast('✓ Copied to clipboard!');
}

function s8DownloadPDF() {
  const text = _s8.generatedText;
  if (!text) { toast('Generate the draft first', true); return; }
  const p = _s8.prop;
  const win = window.open('', '_blank');
  if (!win) { toast('Please allow pop-ups to download PDF', true); return; }
  win.document.write(`<!DOCTYPE html><html><head><title>Section 8 Notice — ${p.address}</title>
    <style>body{font-family:Georgia,serif;font-size:13px;line-height:1.8;padding:48px;max-width:680px;margin:0 auto;color:#1A2B45}
    h3{font-size:16px;font-weight:700;margin:18px 0 6px;color:#0B1E3D}
    strong{font-weight:600}pre{white-space:pre-wrap;font-family:Georgia,serif}
    @media print{body{padding:0}}</style></head><body>
    <div style="border-bottom:2px solid #0B1E3D;margin-bottom:24px;padding-bottom:12px">
      <strong style="font-size:16px;color:#0B1E3D">RentSafe AI</strong>
      <span style="color:#999;font-size:12px;margin-left:12px">Section 8 Notice Draft — ${p.address}</span>
    </div>
    <pre>${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
    <div style="margin-top:32px;padding-top:12px;border-top:1px solid #eee;font-size:10px;color:#999">
      Generated by RentSafe AI · ${new Date().toLocaleDateString('en-GB')} · Draft only — transfer to GOV.UK Form 3A before serving
    </div>
    <script>window.onload=function(){window.print();}<\/script>
    </body></html>`);
  win.document.close();
}

async function s8SendToTenant() {
  const t = _s8.tenant, p = _s8.prop;
  if (!t?.email) { toast('No tenant email on file', true); return; }
  const text = _s8.generatedText;

  const subject = `Section 8 Notice — ${p.address}`;
  const htmlBody = `<div style="font-family:sans-serif;max-width:680px;margin:0 auto;padding:32px 24px;color:#1A2B45">
    <div style="border-bottom:2px solid #0B1E3D;padding-bottom:14px;margin-bottom:24px">
      <span style="font-size:18px;font-weight:700;color:#0B1E3D">Rent<span style="color:#00C896">Safe AI</span></span>
      <span style="color:#999;font-size:12px;margin-left:8px">Section 8 Notice</span>
    </div>
    <pre style="font-family:Georgia,serif;font-size:13px;line-height:1.8;white-space:pre-wrap">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
    <div style="margin-top:32px;padding-top:14px;border-top:1px solid #eee;font-size:11px;color:#999">
      Sent via RentSafe AI · documents@rentsafeai.co.uk · This is a draft. The official Form 3A must also be served in accordance with the Housing Act 1988. Service by email alone may not be sufficient — also serve by first class post.
    </div>
  </div>`;

  const btn = document.querySelector('#mo-f .btn-navy');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Sending…'; }

  try {
    const res = await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'send_email', to: t.email, subject, html: htmlBody })
    });
    const data = await res.json();
    if (data.error || !res.ok) throw new Error(data.error || 'Send failed');

    // Update log entry to 'Sent'
    const logEntry = {
      user_id: currentUser.id,
      tenant_id: parseInt(t.id),
      prop_id: parseInt(p.id),
      template_id: 'section8_notice',
      template_name: `Section 8 Notice — Grounds ${_s8.selectedGrounds.join(', ')}`,
      sent_to: t.email,
      subject,
      status: 'Sent'
    };
    await sb.from('email_log').insert(logEntry).select().single();
    D.emailLog.unshift({ ...logEntry, sent_at: new Date().toISOString() });

    if (btn) { btn.disabled = false; btn.innerHTML = '✓ Sent!'; }
    toast(`✉ Section 8 notice sent to ${t.email}`);
  } catch(e) {
    if (btn) { btn.disabled = false; btn.innerHTML = '✉ Send to ' + t.name.split(' ')[0]; }
    toast('Send failed — check Resend domain verification', true);
  }
}

function moTenantDetail(tid) {
  const t = D.tenants.find(x => String(x.id) === String(tid));
  if (!t) return;
  const p = P(t.prop_id) || { address: '—', city: '' };

  const rows = [
    ['Full name', t.name],
    ['Email', t.email || '—'],
    ['Phone', t.phone || '—'],
    ['Property', `${p.address}, ${p.city}`],
    ['Tenancy start', FMS(t.start_date)],
    ['Tenancy end', t.end_date ? FMS(t.end_date) : 'Periodic (ongoing)'],
    ['Monthly rent', t.rent ? `£${t.rent.toLocaleString()}` : '—'],
    ['Deposit amount', t.deposit ? `£${t.deposit.toLocaleString()}` : '—'],
    ['Deposit scheme', t.scheme || 'Not set'],
    ['Scheme reference', t.scheme_ref || '—'],
    ['Tenancy type', t.type === 'AST' ? 'AST (converts to APT 1 May 2026)' : t.type || 'APT'],
    ['Rent due day', t.rent_day ? `${t.rent_day}${['','st','nd','rd'][t.rent_day]||'th'} of month` : '—'],
    ['Status', t.status || 'Active'],
  ].map(([l,v]) => `<div class="t-det-row"><span class="lbl">${l}</span><span style="font-weight:500;text-align:right">${v}</span></div>`).join('');

  openMo(`${t.name}`, `Tenant at ${p.address}`,
    `<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:4px 14px;margin-bottom:14px">${rows}</div>
     <div style="display:flex;gap:8px;flex-wrap:wrap">
       ${t.email ? `<a href="mailto:${t.email}" class="btn btn-sm">✉ Email tenant</a>` : ''}
       ${t.phone ? `<a href="tel:${t.phone}" class="btn btn-sm">📞 Call</a>` : ''}
       <button class="btn btn-sm" onclick="closeMo();moSection8('${t.prop_id}')">⚖️ Generate Section 8</button>
     </div>`,
    `<button class="btn" onclick="closeMo()">Close</button><button class="btn btn-navy" onclick="closeMo();moTenant('${t.prop_id}')">✎ Edit tenant</button>`
  );
}

async function moRRASheet() {
  if (!D.tenants.filter(t=>t.status==='Active').length) {
    toast('Add tenants first before sending the RRA sheet', true); return;
  }

  const sentTenantIds = new Set(
    D.emailLog
      .filter(e => e.template_id === 'rra_info_sheet' && e.status === 'Sent')
      .map(e => String(e.tenant_id))
  );

  const daysLeft = Math.ceil((new Date('2026-05-31') - new Date()) / 864e5);
  const PDF_URL = 'https://assets.publishing.service.gov.uk/media/69bc04b8f7b1c24d8e23ce60/The_Renters__Rights_Act_Information_Sheet_2026.pdf';
  const GOV_URL = 'https://www.gov.uk/government/publications/the-renters-rights-act-information-sheet-2026';

  const rows = D.tenants.map(t => {
    const p = P(t.prop_id) || { address: '—' };
    const sent = sentTenantIds.has(String(t.id));
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)" id="rra-row-${t.id}">
      <div class="t-av" style="flex-shrink:0">${INI(t.name)}</div>
      <div style="flex:1">
        <div style="font-weight:500;font-size:13px">${t.name}</div>
        <div style="font-size:11px;color:var(--muted)">${p.address} · ${t.email || '⚠️ No email'}</div>
      </div>
      <div id="rra-status-${t.id}">
        ${sent
          ? `<span class="badge b-green">✓ Sent</span>`
          : t.email
            ? `<button class="btn btn-sm btn-navy" onclick="rraSendOne('${t.id}')">✉ Send</button>`
            : `<span style="font-size:11px;color:var(--red)">Add email first</span>`
        }
      </div>
    </div>`;
  }).join('');

  const unsentWithEmail = D.tenants.filter(t => t.email && !sentTenantIds.has(String(t.id)));

  openMo(
    "RRA 2025 Information Sheet",
    "Must reach all tenants by 31 May 2026",
    `<div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
      <div style="font-size:20px">⚠️</div>

    </div>

    <div style="background:var(--navy);border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">📋 Two steps to comply</div>
      <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px">
        <div style="background:var(--green);color:#0B1E3D;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;margin-top:1px">1</div>
        <div style="flex:1">
          <div style="color:#fff;font-size:12px;font-weight:600;margin-bottom:4px">Download the official PDF from GOV.UK</div>
          <div style="color:rgba(255,255,255,0.65);font-size:11px;margin-bottom:8px">This exact PDF must be attached to your email — a link alone is not legally valid.</div>
          <a href="${PDF_URL}" target="_blank" style="background:var(--green);color:#0B1E3D;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;text-decoration:none;display:inline-block">⬇ Download Official PDF</a>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="background:var(--blue);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;margin-top:1px">2</div>
        <div>
          <div style="color:#fff;font-size:12px;font-weight:600;margin-bottom:4px">Send the covering letter below</div>

        </div>
      </div>
    </div>

    <div style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">

  );
}

async function rraSendOne(tid) {
  const t = D.tenants.find(x => String(x.id) === String(tid));
  if (!t?.email) { toast('No email address for this tenant', true); return; }

  const btn = document.querySelector(`#rra-status-${tid} button`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>'; }

  const p = P(t.prop_id) || { address: '[Property address]', city: '', postcode: '' };

  // Generate covering letter via AI
  try {
    const prompt = `Generate a short, friendly covering letter to a tenant explaining the Renters' Rights Act 2025 Information Sheet.

Tenant: ${t.name}
Property: ${p.address}, ${p.city}, ${p.postcode}
Landlord: ${(currentUser?.email||'Your landlord').split('@')[0]}
Today's date: ${new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})}

The letter should:
1. Explain they are receiving the official GOV.UK RRA 2025 Information Sheet as a PDF attachment
2. Summarise the key changes in plain English: fixed terms abolished (all tenancies become periodic/rolling from 1 May 2026), Section 21 no-fault evictions abolished, rent can only be increased once per year using Form 4A, tenants can end tenancy with 2 months notice
3. Reassure them their tenancy continues and nothing changes immediately
4. Tell them to read the attached PDF for full details
5. End with a proper sign-off and landlord name

Keep it under 200 words. Professional but warm. Plain text, no markdown.`;

    const aiRes = await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 600, messages: [{ role: 'user', content: prompt }] })
    });
    const aiData = await aiRes.json();
    const letter = aiData.content?.[0]?.text || 'Please see the attached RRA 2025 Information Sheet.';

    const PDF_URL = 'https://assets.publishing.service.gov.uk/media/69bc04b8f7b1c24d8e23ce60/The_Renters__Rights_Act_Information_Sheet_2026.pdf';

    const htmlBody = `<div style="font-family:sans-serif;max-width:680px;margin:0 auto;padding:32px 24px;color:#1A2B45">
      <div style="border-bottom:2px solid #0B1E3D;padding-bottom:14px;margin-bottom:24px">
        <span style="font-size:18px;font-weight:700;color:#0B1E3D">Rent<span style="color:#00C896">Safe AI</span></span>
        <span style="color:#999;font-size:12px;margin-left:8px">Renters' Rights Act 2025 — Important Information</span>
      </div>
      <pre style="font-family:Georgia,serif;font-size:13px;line-height:1.8;white-space:pre-wrap">${letter}</pre>
      <div style="margin-top:24px;padding:14px;background:#fffbeb;border:1px solid #D97706;border-radius:8px;font-size:12px;color:#92400E">
        <strong>📋 Important:</strong> The official Renters' Rights Act 2025 Information Sheet will be attached to this email or sent separately as a PDF. The official document is available from GOV.UK at: <a href="${PDF_URL}" style="color:#0B1E3D">${PDF_URL}</a>
      </div>
      <div style="margin-top:24px;padding-top:14px;border-top:1px solid #eee;font-size:11px;color:#999">
        Sent via RentSafe AI · documents@rentsafeai.co.uk
      </div>
    </div>`;

    const emailRes = await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'send_email',
        to: t.email,
        subject: `Important: Renters' Rights Act 2025 Information — ${p.address}`,
        html: htmlBody,
        attachments: [{
          filename: 'Renters-Rights-Act-Information-Sheet-2026.pdf',
          content: RRA_PDF_B64
        }]
      })
    });
    const emailData = await emailRes.json();
    if (emailData.error || !emailRes.ok) throw new Error(emailData.error || 'Send failed');

    // Log it
    const logEntry = {
      user_id: currentUser.id,
      tenant_id: parseInt(t.id),
      prop_id: t.prop_id ? parseInt(t.prop_id) : null,
      template_id: 'rra_info_sheet',
      template_name: "RRA 2025 Information Sheet",
      sent_to: t.email,
      subject: `Important: Renters' Rights Act 2025 Information — ${p.address}`,
      status: 'Sent'
    };
    await sb.from('email_log').insert(logEntry);
    D.emailLog.unshift({ ...logEntry, sent_at: new Date().toISOString() });
    await logAudit('SEND_RRA_SHEET', 'email_log', t.id, `RRA sheet sent to ${t.email}`);

    // Update UI
    const statusEl = document.getElementById(`rra-status-${tid}`);
    if (statusEl) statusEl.innerHTML = `<span class="badge b-green">✓ Sent</span>`;
    toast(`✉ RRA sheet sent to ${t.name}`);

  } catch(e) {
    if (btn) { btn.disabled = false; btn.innerHTML = '✉ Send'; }
    toast('Send failed — check Resend domain verification', true);
    console.error(e);
  }
}

async function rraSendAll() {
  const btn = document.getElementById('rra-all-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Sending…'; }

  const sentTenantIds = new Set(
    D.emailLog
      .filter(e => e.template_id === 'rra_info_sheet' && e.status === 'Sent')
      .map(e => String(e.tenant_id))
  );
  const toSend = D.tenants.filter(t => t.email && !sentTenantIds.has(String(t.id)));

  let sent = 0;
  for (const t of toSend) {
    await rraSendOne(t.id);
    sent++;
    if (btn) btn.innerHTML = `<span class="spin"></span>Sent ${sent}/${toSend.length}…`;
    await new Promise(r => setTimeout(r, 800)); // small delay between sends
  }

  if (btn) { btn.disabled = true; btn.innerHTML = `✓ All ${sent} sent`; }
  toast(`✉ RRA Information Sheet sent to ${sent} tenant${sent!==1?'s':''}!`);
}

function updateNavBadges() {
  // Compliance — expired or missing certs
  const compBad = D.certs.filter(c => c.status === 'Expired' || c.status === 'Missing').length;
  const compEl = document.getElementById('nav-badge-compliance');
  if (compEl) {
    if (compBad > 0) { compEl.textContent = compBad; compEl.className = 'nav-badge red'; compEl.style.display = 'flex'; }
    else compEl.style.display = 'none';
  }
  // Maintenance — open issues
  const maintBad = D.maintenance.filter(m => m.status !== 'Resolved').length;
  const maintEl = document.getElementById('nav-badge-maintenance');
  if (maintEl) {
    if (maintBad > 0) { maintEl.textContent = maintBad; maintEl.className = `nav-badge ${maintBad > 3 ? 'red' : 'amber'}`; maintEl.style.display = 'flex'; }
    else maintEl.style.display = 'none';
  }
  // Properties — vacant properties
  const vacBad = D.properties.filter(p => !D.tenants.find(t => String(t.prop_id) === String(p.id))).length;
  const propEl = document.getElementById('nav-badge-properties');
  if (propEl) {
    if (vacBad > 0) { propEl.textContent = vacBad; propEl.className = 'nav-badge amber'; propEl.style.display = 'flex'; }
    else propEl.style.display = 'none';
  }
}

  `, `<button class="btn" onclick="closeMo()">Cancel</button>

function moEditContractor(id){ moAddContractor(id); }

async function saveContractor(id){
  const name = document.getElementById('con-name')?.value.trim();
  if(!name){toast('Name is required',true);return;}
  const contractor = {
    name, trade: document.getElementById('con-trade')?.value,
    phone: document.getElementById('con-phone')?.value.trim()||null,
    email: document.getElementById('con-email')?.value.trim()||null,
    notes: document.getElementById('con-notes')?.value.trim()||null,
    user_id: currentUser.id
  };
  if(id){
    const{error}=await sb.from('contractors').update(contractor).eq('id',id);
    if(error){toast('Error: '+error.message,true);return;}
    const i=(D.contractors||[]).findIndex(x=>String(x.id)===String(id));
    if(i>-1) D.contractors[i]={...D.contractors[i],...contractor};
    toast('✓ Contractor updated!');
  } else {
    const{data,error}=await sb.from('contractors').insert(contractor).select().single();
    if(error){toast('Error: '+error.message,true);return;}
    if(!D.contractors) D.contractors=[];
    D.contractors.push(data);
    toast('✓ Contractor added!');
  }
  closeMo();
  nav('contractors');
}

async function deleteContractor(id){
  if(!confirm('Delete this contractor?')) return;
  const{error}=await sb.from('contractors').delete().eq('id',id);
  if(error){toast('Error: '+error.message,true);return;}
  D.contractors=(D.contractors||[]).filter(x=>String(x.id)!==String(id));
  toast('Contractor deleted');
  nav('contractors');
}

// esign_requests schema (updated):

let _esignDocHtml = null;
let _esignPdfUrl  = null;
window._esign = {};

function moEsign(pid) {
  const p = P(pid);
  if (!p) { toast('Property not found', true); return; }
  const tenants = D.tenants.filter(t => String(t.prop_id) === String(pid) && t.status === 'Active');

  // Pre-populate signatories: landlord first, then all active tenants
  const signatories = [
    { party_id: crypto.randomUUID(), name: currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'Landlord', email: currentUser.email, role: 'Landlord', token: crypto.randomUUID(), signed_at: null },
    ...tenants.map(t => ({ party_id: crypto.randomUUID(), name: t.name, email: t.email || '', role: 'Tenant', token: crypto.randomUUID(), signed_at: null }))
  ];

  window._esign = { pid, step: 1, docMode: null, signatories, docLabel: 'Written Statement of Terms' };
  _esignDocHtml = null;
  _esignPdfUrl  = null;

  document.querySelector('.mo-box')?.classList.add('mo-wide');
  document.getElementById('mo-t').textContent = '✍️ Multi-Party Document Signing';
  document.getElementById('mo-s').textContent = `${p.address} · ${signatories.length} signatories`;
  document.getElementById('mo').classList.add('open');
  _renderEsignStep(1);
}

  window._esign.step = n;

  const bar = [1,2,3,4,5].map(i=>`<div style="flex:1;height:3px;border-radius:100px;background:${i<n?'var(--green)':i===n?'var(--blue)':'var(--border)'}"></div>`).join('');

  // Expand modal to full-screen on step 5 (signing step)
  const moBox = document.querySelector('.mo-box');
  if (moBox) {
    if (n === 5) {
      moBox.style.maxWidth = '100vw';
      moBox.style.width = '100vw';
      moBox.style.height = '100vh';
      moBox.style.margin = '0';
      moBox.style.borderRadius = '0';

      moBox.style.maxWidth = '';
      moBox.style.width = '';
      moBox.style.height = '';

}

function _esignSetMode(mode) {
  window._esign.docMode = mode;
  document.getElementById('esign-ai-fields').style.display   = mode==='ai'     ? 'block' : 'none';
  document.getElementById('esign-upload-fields').style.display = mode==='upload' ? 'block' : 'none';
  ['esign-opt-ai','esign-opt-upload'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.borderColor = (id==='esign-opt-ai'&&mode==='ai')||(id==='esign-opt-upload'&&mode==='upload') ? 'var(--blue)' : 'var(--border)';
  });
}

async function esignGenerateAI() {
  const s = window._esign;
  const p = P(s.pid);
  const btn = document.getElementById('esign-gen-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Generating…';
  try {
    const address = document.getElementById('esign-address')?.value;
    const tnames  = document.getElementById('esign-tnames')?.value;
    const start   = document.getElementById('esign-start')?.value;
    const rent    = document.getElementById('esign-rent')?.value;
    const deposit = document.getElementById('esign-deposit')?.value;
    const scheme  = document.getElementById('esign-scheme')?.value;
    const bills   = document.getElementById('esign-bills')?.value || 'None';
    const pets    = document.getElementById('esign-pets')?.value;
    const terms   = document.getElementById('esign-terms')?.value;
    const landlordName = currentUser.user_metadata?.full_name || currentUser.email;
    const res = await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:4000,messages:[{role:'user',content:`Generate a fully compliant UK Assured Periodic Tenancy Written Statement under the Renters Rights Act 2025.\nProperty: ${address}\nTenant(s): ${tnames}\nLandlord: ${landlordName}\nStart: ${start}\nRent: £${rent}/month\nDeposit: £${deposit} — ${scheme}\nBills: ${bills}\nPets: ${pets}\nSpecial terms: ${terms||'None'}\nInclude all RRA 2025 mandatory terms, repair obligations, notice periods (S.8/S.13), signature blocks for each tenant and landlord with printed name, date, and signature line.\nFormat as clean semantic HTML. No markdown. Return only the HTML document.`}]})
    });
    const data = await res.json();
    _esignDocHtml = data.content?.[0]?.text || '';
    toast('✓ Document generated — review in Step 2');
    btn.disabled=false; btn.innerHTML='✦ Regenerate';
    // Auto-advance
    window._esign.docMode = 'ai';
    _esignNav(1);
  } catch(e) {
    btn.disabled=false; btn.innerHTML='✦ Generate document';
    toast('Generation failed: '+e.message, true);
  }
}

async function esignHandlePDF(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { toast('PDF must be under 5MB', true); return; }
  const label = document.getElementById('esign-upload-label');
  label.innerHTML = '<span class="spin spin-dark" style="display:inline-block;margin-right:6px"></span>Uploading…';
  const filename = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  const { error } = await sb.storage.from('esign-documents').upload(filename, file, {contentType:'application/pdf'});
  if (error) { label.textContent='Upload failed'; toast('Upload error: '+error.message, true); return; }
  const { data:urlData } = sb.storage.from('esign-documents').getPublicUrl(filename);
  _esignPdfUrl = urlData.publicUrl;
  label.innerHTML = `<span style="color:var(--green-dark);font-weight:600">✓ ${file.name}</span>`;
  const labelInput = document.getElementById('esign-doc-label');
  if (labelInput) window._esign.docLabel = file.name.replace('.pdf','');
}

function _esignNav(dir) {
  const s = window._esign;
  const n = s.step;

  if (dir === 1) {
    if (n === 1) {
      if (!s.docMode) { toast('Please choose a document option', true); return; }
      if (s.docMode === 'ai' && !_esignDocHtml) { toast('Please generate the document first', true); return; }
      if (s.docMode === 'upload' && !_esignPdfUrl) { toast('Please upload a PDF first', true); return; }
      const labelEl = document.getElementById('esign-doc-label');
      if (labelEl) s.docLabel = labelEl.value.trim() || s.docLabel;
    }
    if (n === 2) { /* Preview step — just advance */ }
    if (n === 3) {
      const labelEl = document.getElementById('esign-final-label');
      if (labelEl) s.docLabel = labelEl.value.trim() || s.docLabel;
      const missingEmails = s.signatories.filter(x=>!x.email&&x.role!=='Landlord').length;
      if (missingEmails === s.signatories.filter(x=>x.role!=='Landlord').length && s.signatories.filter(x=>x.role!=='Landlord').length > 0) { toast('No tenants have email addresses', true); return; }
    }
    if (n === 4) { /* Confirm step — just advance to signing */ }
    if (n === 5) { esignLandlordSign(); return; }
  }

  _renderEsignStep(Math.max(1, Math.min(5, n + dir)));

  // Init SignaturePad on step 5 after render
  if (n + dir === 5) {
    setTimeout(() => {
      const canvas = document.getElementById('esign-landlord-pad');
      if (canvas && typeof SignaturePad !== 'undefined') {
        const wrap = document.getElementById('sig-pad-wrap');
        const ratio = Math.max(window.devicePixelRatio||1, 1);
        canvas.width = (wrap?.offsetWidth||600) * ratio;
        canvas.height = 160 * ratio;
        canvas.getContext('2d').scale(ratio, ratio);
        window._esignPad = new SignaturePad(canvas, { backgroundColor:'rgba(255,255,255,0)', penColor:'#0B1E3D' });
      }
    }, 80);
  }
}

function esignClearPad() {
  if (window._esignPad) window._esignPad.clear();
}

async function esignLandlordSign() {
  const s = window._esign;
  const btn = document.getElementById('esign-next-btn');

  // Validate
  const pad = window._esignPad;
  if (!pad || pad.isEmpty()) { toast('Please draw your signature', true); return; }
  const nameVal = document.getElementById('esign-landlord-name')?.value.trim();
  if (!nameVal) { toast('Please enter your full legal name', true); return; }
  if (!document.getElementById('esign-landlord-consent')?.checked) { toast('Please confirm your consent to sign electronically', true); return; }

  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spin spin-dark"></span>Signing…'; }

  const signatureDataUrl = pad.toDataURL('image/png');
  const signedAt = new Date().toISOString();

  // Mark landlord as signed in signatories array
  s.signatories = s.signatories.map(sig =>
    sig.role === 'Landlord' ? { ...sig, signed_at: signedAt, signature_data: signatureDataUrl, printed_name: nameVal } : sig
  );

  // Now send — only to tenants
  await _sendMultiPartyEsign(true);
}

async function _sendMultiPartyEsign(landlordAlreadySigned=false) {
  const s = window._esign;
  const p = P(s.pid);
  const btn = document.getElementById('esign-next-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spin spin-dark"></span>Sending…'; }

  const leadTenant = D.tenants.find(t=>String(t.prop_id)===String(s.pid)&&t.status==='Active');
  const expiresAt = new Date(Date.now()+7*864e5).toISOString();
  const mainToken = s.signatories[0]?.token || crypto.randomUUID(); // landlord token
  // Count: landlord already signed counts as 1
  const initialSignedCount = landlordAlreadySigned ? 1 : 0;

  try {
    const { data: req, error: reqErr } = await sb.from('esign_requests').insert({
      property_id:      s.pid,
      tenant_id:        leadTenant?.id || null,
      document_type:    'written_statement',
      document_html:    _esignDocHtml || null,
      document_pdf_url: _esignPdfUrl  || null,
      doc_label:        s.docLabel,
      token:            mainToken,
      signatories:      JSON.stringify(s.signatories),
      total_signatories: s.signatories.filter(x=>!!x.email).length,
      signed_count:     initialSignedCount,
      status:           'pending',
      expires_at:       expiresAt
    }).select().single();

    if (reqErr) throw new Error(reqErr.message);

    // Send unique email only to TENANTS (landlord signs first in-app)
    const origin = window.location.origin;
    const tenantsToEmail = s.signatories.filter(x=>!!x.email && x.role !== 'Landlord');
    for (const sig of tenantsToEmail) {
      const signingLink = `${origin}/tenant.html?esign=${sig.token}`;
      const expDate = new Date(expiresAt).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
      const othersStr = s.signatories.filter(x=>x.party_id!==sig.party_id).map(x=>`${x.name} (${x.role})`).join(', ');
      const html = `<div style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:28px 24px;color:#1A2B45">
        <div style="border-bottom:2px solid #0B1E3D;padding-bottom:12px;margin-bottom:20px"><span style="font-size:17px;font-weight:700;color:#0B1E3D">Rent<span style="color:#00C896">Safe AI</span></span></div>
        <h2 style="font-size:16px;font-weight:600;margin-bottom:8px">✍️ Your signature is required</h2>
        <p style="font-size:13px;color:#7A8FA6;margin-bottom:16px">Hi ${sig.name}, your landlord has signed the following document and it is now ready for your counter-signature.</p>
        <div style="background:#F6F8FB;border-radius:8px;padding:16px;margin-bottom:20px">
          <div style="font-size:12px;color:#7A8FA6;margin-bottom:4px">Document</div>
          <div style="font-size:13px;font-weight:600">${s.docLabel}</div>
          <div style="font-size:12px;color:#7A8FA6;margin-top:4px">Property: ${p?.address||'—'}</div>
          <div style="font-size:12px;color:#7A8FA6;margin-top:2px">Other signatories: ${othersStr}</div>
        </div>
        <p style="font-size:13px;margin-bottom:20px">Click the link below to review the full document and add your signature. Your link is private and unique to you.</p>
        <div style="text-align:center;margin:28px 0"><a href="${signingLink}" style="background:#0B1E3D;color:#fff;padding:13px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;display:inline-block">Review &amp; Sign →</a></div>
        <div style="background:#FEF3C7;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400E;margin-bottom:16px">⏰ Link expires: ${expDate}</div>
        <p style="font-size:11px;color:#999">Sent via RentSafe AI · rentsafeai.co.uk</p>
      </div>`;
      await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type:'send_email',to:sig.email,subject:`Action required — please counter-sign: ${s.docLabel}`,html})
      }).catch(()=>{});
    }

    // Log to email_log
    const logEntry = {
      user_id: currentUser.id, tenant_id: leadTenant?.id||null, prop_id: parseInt(s.pid),
      template_id: 'esign_multiparty',
      template_name: `E-Sign: ${s.docLabel} (${s.signatories.length} signatories)`,
      sent_to: s.signatories.filter(x=>x.email).map(x=>x.email).join(', '),
      subject: `Multi-party signing: ${s.docLabel}`,
      status: 'Sent'
    };
    await sb.from('email_log').insert(logEntry).catch(()=>{});
    await logAudit('ESIGN_SENT','esign_requests',req.id,`${s.docLabel} sent to ${s.signatories.length} signatories`);

    closeMo();
    toast(`✅ You have signed. Signing link sent to ${tenantsToEmail.length} tenant${tenantsToEmail.length!==1?'s':''}`);

  } catch(e) {
    if (btn) { btn.disabled=false; btn.textContent='✅ Sign & send to tenant'; }
    toast('Error: '+e.message, true);
  }
}

// ── ESIGN STATUS: CHECK SIGNING PROGRESS ──
async function loadEsignStatus(pid) {
  try {
    const { data } = await sb.from('esign_requests')
      .select('*')
      .eq('property_id', pid)
      .eq('status', 'pending')
      .order('created_at', {ascending:false})
      .limit(5);
    return data || [];
  } catch(e) { return []; }
}

async function checkEsignCompletion(reqId, pid) {
  try {
    const { data: req } = await sb.from('esign_requests').select('*').eq('id', reqId).single();
    if (!req) return;
    const sigs = typeof req.signatories === 'string' ? JSON.parse(req.signatories) : (req.signatories || []);
    const withEmails = sigs.filter(s=>s.email);
    const signedCount = sigs.filter(s=>s.signed_at).length;
    if (withEmails.length > 0 && signedCount >= withEmails.length) {
      // All signed — mark complete
      await sb.from('esign_requests').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',reqId);
      // Save compliance cert
      const certEntry = {
        prop_id: parseInt(pid), type: `Written Statement of Terms — Fully Signed`,
        status: 'Valid', served: true, has_file: !!(req.document_pdf_url||req.document_html),
        engineer: null, expiry: null, user_id: currentUser.id,
        notes: `Multi-party e-signed · ${signedCount} signatories · ${new Date().toLocaleDateString('en-GB')} · Doc: ${req.doc_label||'Written Statement'}`
      };
      const { data: cert } = await sb.from('certificates').insert(certEntry).select().single().catch(()=>({data:null}));
      if (cert) D.certs.push({...cert, file:true});
      await logAudit('ESIGN_COMPLETE','esign_requests',reqId,`${req.doc_label} fully signed by all parties`);
      toast('🎉 Document fully signed — saved to compliance!');
      nav('prop-detail', pid);
      setTimeout(()=>pdSetTab(pid,'compliance'),100);
    }
  } catch(e) { console.warn('checkEsignCompletion error', e); }
}

async function renderEsignStatusPanel(pid) {
  const el = document.getElementById(`esign-status-${pid}`);
  if (!el) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--muted)">Loading…</div>';

  el.innerHTML = reqs.map(req => {
    const sigs = typeof req.signatories==='string'?JSON.parse(req.signatories):(req.signatories||[]);
    const signedCount = sigs.filter(s=>s.signed_at).length;
    const total = sigs.filter(s=>s.email).length;
    const pct = total ? Math.round(signedCount/total*100) : 0;
    const expDays = Math.ceil((new Date(req.expires_at)-new Date())/864e5);
    return `<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

      <div style="height:5px;background:var(--off);border-radius:100px;margin-bottom:10px">
        <div style="height:100%;width:${pct}%;background:${pct===100?'var(--green)':'var(--blue)'};border-radius:100px;transition:width .5s"></div>

          <span style="font-size:9px;color:var(--muted)">${sig.role}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── SECTION 13 RENT INCREASE NOTICE GENERATOR ──
window._s13 = {};

function moSection13(pid) {
  if (!pid) {
    const t = D.tenants.find(t => t.status === 'Active');
    pid = t?.prop_id ? String(t.prop_id) : (D.properties[0]?.id ? String(D.properties[0].id) : null);
  }
  if (!D.properties.length) { toast('Add a property first', true); return; }
  const p = P(pid) || D.properties[0];
  const tenant = D.tenants.find(t => String(t.prop_id) === String(p?.id) && t.status === 'Active');

  const today = new Date();
  const minEff = new Date(today);
  minEff.setMonth(minEff.getMonth() + 2);
  const rentDay = parseInt(tenant?.rent_day || 1);
  if (minEff.getDate() > rentDay) minEff.setMonth(minEff.getMonth() + 1);
  minEff.setDate(rentDay);

  window._s13 = {
    step: 1, pid: String(p?.id || ''), tenantId: tenant?.id ? String(tenant.id) : '',
    currentRent: p?.rent || 0, newRent: '',
    noticeDate: today.toISOString().slice(0,10),
    effectiveDate: minEff.toISOString().slice(0,10),
    landlordName: currentUser?.user_metadata?.full_name || currentUser?.email?.split('@')[0] || 'Landlord',
    landlordAddress: '', noticeHtml: '',
  };
  document.getElementById('mo-t').textContent = 'Section 13 Notice';
  document.getElementById('mo-s').textContent = 'Rent increase · Housing Act 1988 s.13';
  document.querySelector('.mo-box').classList.add('mo-wide');
  _renderS13Step(1);
  document.getElementById('mo').classList.add('open');
}

function _renderS13Step(n) {
  const segBar = [1,2,3].map(i=>`<div style="flex:1;height:3px;border-radius:100px;background:${i<n?'var(--green)':i===n?'var(--blue)':'var(--border)'}"></div>`).join('');
  const labels = ['','Details','New rent','Preview & send'];
  document.getElementById('mo-b').innerHTML = `
    <div style="display:flex;gap:4px;margin-bottom:6px">${segBar}</div>
    <div style="display:flex;margin-bottom:20px">${[1,2,3].map(i=>`<div style="flex:1;font-size:9px;font-weight:${i===n?700:400};color:${i<n?'var(--green-dark)':i===n?'var(--blue)':'var(--muted)'};text-align:center">${labels[i]}</div>`).join('')}</div>
    ${_s13StepHtml(n)}`;
  document.getElementById('mo-f').innerHTML = `
    <button onclick="s13Back()" style="background:none;border:none;font-family:var(--font);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;padding:7px 0;visibility:${n===1?'hidden':'visible'}">← Back</button>
    <span style="font-size:12px;color:var(--muted)">Step ${n} of 3</span>
    <button class="btn btn-navy" id="s13-btn" onclick="s13Next()">${n===3?'Send notice':'Next →'}</button>`;
}

function _s13StepHtml(n) {
  const s = window._s13;
  if (n === 1) {
    const propOpts = D.properties.map(p=>`<option value="${p.id}"${String(p.id)===s.pid?' selected':''}>${p.address}, ${p.city}</option>`).join('');
    const tenOpts  = D.tenants.filter(t=>t.status==='Active').map(t=>`<option value="${t.id}"${String(t.id)===s.tenantId?' selected':''}>${t.name}</option>`).join('') || '<option value="">No active tenants</option>';
    const p = P(s.pid);
    const tenant = D.tenants.find(t=>String(t.id)===s.tenantId);
    const monthsIn = tenant?.start_date ? Math.floor((new Date()-new Date(tenant.start_date))/(30.44*864e5)) : 99;
    const tooEarly = monthsIn < 12;
    return `
    <div style="font-size:15px;font-weight:600;margin-bottom:2px">Property & tenant</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Select the property and tenant receiving this notice</div>
    <div class="fg-row">
      <div class="fg"><label>Property <span class="req">*</span></label><select id="s13-prop" onchange="s13PropSwitch(this.value)">${propOpts}</select></div>
      <div class="fg"><label>Tenant <span class="req">*</span></label><select id="s13-tenant">${tenOpts}</select></div>
    </div>
    ${p&&tenant?`<div style="background:var(--off);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
      <div><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:2px">Current rent</div><div style="font-size:16px;font-weight:700">£${(p.rent||0).toLocaleString()}/mo</div></div>
      <div><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:2px">Tenant</div><div style="font-size:13px;font-weight:600">${tenant.name}</div></div>
      <div><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:2px">Tenancy start</div><div style="font-size:13px;font-weight:600">${FMS(tenant.start_date)}</div></div>
    </div>`:''}
    ${tooEarly&&tenant?.start_date?`<div style="background:var(--red-bg);border:1px solid rgba(229,62,62,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px;display:flex;gap:8px"><span>⚠️</span><div><strong>Notice may be invalid</strong> — rent cannot be increased in the first 12 months. Tenancy started ${FMS(tenant.start_date)} (${monthsIn} months ago). You can still generate for future use.</div></div>`:''}
    <div class="fg"><label>Landlord name (as it appears on the notice)</label><input type="text" id="s13-lname" value="${s.landlordName}" placeholder="Full name or company"></div>
    <div class="fg"><label>Landlord address</label><input type="text" id="s13-laddr" value="${s.landlordAddress}" placeholder="Full UK address including postcode"></div>
    <div style="background:var(--blue-bg);border:1px solid rgba(59,111,232,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--blue)">ℹ️ Under RRA 2025, rent can only be increased <strong>once every 12 months</strong> using a Section 13 notice with <strong>2 months minimum notice</strong>.</div>`;
  }
  if (n === 2) {
    const p = P(s.pid);
    const tenant = D.tenants.find(t=>String(t.id)===s.tenantId);
    const cur = p?.rent || 0;
    const nw = parseFloat(s.newRent)||0;
    const rentDay = parseInt(tenant?.rent_day||1);
    const dayLabel = rentDay===1?'1st':rentDay===2?'2nd':rentDay===3?'3rd':`${rentDay}th`;
    return `
    <div style="font-size:15px;font-weight:600;margin-bottom:2px">New rent & dates</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Notice must give at least 2 months before the effective date</div>
    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">
      <div class="fg-row">
        <div class="fg"><label>Current monthly rent</label><input type="text" value="£${cur.toLocaleString()}" disabled style="background:var(--off);color:var(--muted)"></div>
        <div class="fg"><label>New monthly rent (£) <span class="req">*</span></label><input type="number" id="s13-newrent" value="${s.newRent}" placeholder="e.g. 1350" min="${cur+1}" oninput="s13Calc(this.value)"></div>
      </div>
      <div id="s13-calc"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>Date of this notice</label><input type="date" id="s13-ndate" value="${s.noticeDate}" onchange="s13MinEff(this.value,'${rentDay}')"></div>
      <div class="fg"><label>Proposed effective date <span class="req">*</span></label><input type="date" id="s13-edate" value="${s.effectiveDate}" min="${s.effectiveDate}"><div style="font-size:10px;color:var(--muted);margin-top:3px">≥2 months from notice · falls on rent day (${dayLabel} of month)</div></div>
    </div>
    <div style="background:var(--amber-bg);border:1px solid rgba(217,119,6,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--amber);display:flex;gap:8px"><span>⚠️</span><div>Tenant can refer to the <strong>First-tier Tribunal</strong> before the effective date if they consider the proposed rent above market rate.</div></div>`;
  }
  if (n === 3) {
    const p = P(s.pid);
    const tenant = D.tenants.find(t=>String(t.id)===s.tenantId);
    const propAddr = [p?.address,p?.city,p?.postcode].filter(Boolean).join(', ');
    const nDate = s.noticeDate ? new Date(s.noticeDate).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—';
    const eDate = s.effectiveDate ? new Date(s.effectiveDate).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—';
    const cur = p?.rent || 0;
    const nw = parseFloat(s.newRent)||0;
    window._s13.noticeHtml = `<div style="font-family:Georgia,serif;font-size:13px;line-height:1.8;color:#1A2B45">
      <div style="text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #0B1E3D">
        <div style="font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px">Notice of Rent Increase</div>
        <div style="font-size:12px;color:#666;margin-top:4px">Housing Act 1988, Section 13 (as amended by the Renters' Rights Act 2025)</div>
      </div>
      <p><strong>To:</strong> ${tenant?.name||'[Tenant]'}<br><strong>Of:</strong> ${propAddr}</p>
      <p><strong>From (Landlord):</strong> ${s.landlordName}${s.landlordAddress?`<br><strong>Address:</strong> ${s.landlordAddress}`:''}</p>
      <p><strong>Date of notice:</strong> ${nDate}</p>
      <hr style="border:none;border-top:1px solid #E4EAF1;margin:14px 0">
      <p>I give you notice under Section 13 of the Housing Act 1988 that I propose to increase the rent payable under your assured periodic tenancy of the above property.</p>
      <table style="width:100%;border-collapse:collapse;margin:14px 0;font-size:13px">
        <tr style="background:#F6F8FB"><td style="padding:8px 12px;border:1px solid #ddd;font-weight:600">Current monthly rent</td><td style="padding:8px 12px;border:1px solid #ddd">£${cur.toLocaleString()}</td></tr>
        <tr><td style="padding:8px 12px;border:1px solid #ddd;font-weight:600">Proposed new monthly rent</td><td style="padding:8px 12px;border:1px solid #ddd;font-weight:700">£${nw.toLocaleString()}</td></tr>
        <tr style="background:#F6F8FB"><td style="padding:8px 12px;border:1px solid #ddd;font-weight:600">Proposed effective date</td><td style="padding:8px 12px;border:1px solid #ddd">${eDate}</td></tr>
      </table>
      <p>The new rent of <strong>£${nw.toLocaleString()} per calendar month</strong> is proposed to take effect from <strong>${eDate}</strong>.</p>
      <p><strong>Your right to challenge:</strong> If you consider the proposed rent is above the open market rent, you may refer this notice to the First-tier Tribunal (Property Chamber) before ${eDate}. The Tribunal will set a market rent. You will not be penalised for exercising this right.</p>
      <p>Please continue paying the current rent of £${cur.toLocaleString()}/month until the effective date.</p>
      <div style="margin-top:24px;padding-top:14px;border-top:1px solid #E4EAF1">
        <p style="margin-bottom:24px">Signed: ___________________________</p>
        <p>Name: <strong>${s.landlordName}</strong> &nbsp;&nbsp; Date: ${nDate}</p>
      </div>
    </div>`;
    return `
    <div style="font-size:15px;font-weight:600;margin-bottom:2px">Review & send</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">Review the notice below then send to tenant</div>
    <div style="border:1px solid var(--border);border-radius:10px;padding:20px;max-height:320px;overflow-y:auto;margin-bottom:14px;background:var(--white)">${window._s13.noticeHtml}</div>
    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:10px">Delivery</div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px">
        <input type="checkbox" id="s13-email" ${tenant?.email?'checked':''} ${!tenant?.email?'disabled':''} style="width:14px;height:14px">
        <div><div style="font-size:13px;font-weight:500">${tenant?.email?'Email to '+tenant.email:'No email on file — add in tenant details'}</div></div>
      </label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="s13-audit" checked style="width:14px;height:14px">
        <div><div style="font-size:13px;font-weight:500">Log to audit trail</div><div style="font-size:11px;color:var(--muted)">Timestamped court-admissible record of service</div></div>
      </label>
    </div>
    <div style="background:var(--amber-bg);border:1px solid rgba(217,119,6,0.2);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--amber)">⚠️ Email is valid service under RRA 2025. For extra evidence, also send by first-class post and keep proof of postage.</div>`;
  }
  return '';
}

function s13PropSwitch(pid) {
  window._s13.pid = pid;
  const t = D.tenants.find(t=>String(t.prop_id)===String(pid)&&t.status==='Active');
  window._s13.tenantId = t?.id ? String(t.id) : '';
  window._s13.currentRent = P(pid)?.rent || 0;
  _renderS13Step(1);
}

function s13Calc(val) {
  const cur = P(window._s13.pid)?.rent || 0;
  const nw = parseFloat(val)||0;
  const el = document.getElementById('s13-calc');
  if (!el) return;
  if (!nw || nw <= cur) { el.innerHTML = ''; return; }
  const pct = (((nw-cur)/cur)*100).toFixed(1);
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;padding:10px;background:var(--green-bg);border-radius:8px;border:1px solid rgba(0,200,150,0.2)">
    <div style="text-align:center"><div style="font-size:17px;font-weight:700;color:var(--green-dark)">${pct}%</div><div style="font-size:10px;color:var(--muted)">Increase</div></div>
    <div style="text-align:center"><div style="font-size:17px;font-weight:700;color:var(--txt)">+£${(nw-cur).toFixed(0)}/mo</div><div style="font-size:10px;color:var(--muted)">Monthly change</div></div>
    <div style="text-align:center"><div style="font-size:17px;font-weight:700;color:var(--txt)">£${(nw*12).toLocaleString()}/yr</div><div style="font-size:10px;color:var(--muted)">New annual</div></div>
  </div>`;
}

function s13MinEff(noticeDateVal, rentDay) {
  const d = new Date(noticeDateVal);
  d.setMonth(d.getMonth()+2);
  const rd = parseInt(rentDay||1);
  if (d.getDate() > rd) d.setMonth(d.getMonth()+1);
  d.setDate(rd);
  const minStr = d.toISOString().slice(0,10);
  const el = document.getElementById('s13-edate');
  if (el) { el.min = minStr; if (el.value < minStr) el.value = minStr; }
}

function s13Next() {
  const n = window._s13.step;
  const s = window._s13;
  if (n===1) {
    s.pid = document.getElementById('s13-prop')?.value||s.pid;
    s.tenantId = document.getElementById('s13-tenant')?.value||s.tenantId;
    s.landlordName = document.getElementById('s13-lname')?.value.trim()||s.landlordName;
    s.landlordAddress = document.getElementById('s13-laddr')?.value.trim()||'';
    if (!s.tenantId) { toast('Please select a tenant', true); return; }
  } else if (n===2) {
    s.newRent = document.getElementById('s13-newrent')?.value||'';
    s.noticeDate = document.getElementById('s13-ndate')?.value||s.noticeDate;
    s.effectiveDate = document.getElementById('s13-edate')?.value||s.effectiveDate;
    const cur = P(s.pid)?.rent||0;
    if (!s.newRent||parseFloat(s.newRent)<=cur) { toast('New rent must be higher than current rent', true); return; }
    if (!s.effectiveDate) { toast('Please set an effective date', true); return; }
  } else if (n===3) {
    _sendS13();
    return;
  }
  window._s13.step = n+1;
  _renderS13Step(n+1);
  document.querySelector('.mo-box')?.scrollTo?.(0,0);
}

function s13Back() {
  if (window._s13.step<=1) return;
  window._s13.step--;
  _renderS13Step(window._s13.step);
  document.querySelector('.mo-box')?.scrollTo?.(0,0);
}

async function _sendS13() {
  const btn = document.getElementById('s13-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spin"></span>Sending…'; }
  const s = window._s13;
  const p = P(s.pid);
  const tenant = D.tenants.find(t=>String(t.id)===s.tenantId);
  const propAddr = [p?.address,p?.city,p?.postcode].filter(Boolean).join(', ');
  const nw = parseFloat(s.newRent);
  const curRent = p?.rent || 0;
  const eDate = new Date(s.effectiveDate).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const sendEmail = document.getElementById('s13-email')?.checked;
  const doAudit   = document.getElementById('s13-audit')?.checked ?? true;

  try {
    if (sendEmail && tenant?.email) {
      const emailHtml = `<div style="font-family:sans-serif;max-width:620px;margin:0 auto">
        <div style="background:#0B1E3D;padding:20px 24px;border-radius:10px 10px 0 0">
          <div style="font-size:17px;font-weight:700;color:#fff">Rent<span style="color:#00C896">Safe AI</span></div>
          <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px">Section 13 Rent Increase Notice</div>
        </div>
        <div style="background:#fff;border:1px solid #E4EAF1;border-top:none;border-radius:0 0 10px 10px;padding:24px">
          <p style="font-size:13px;color:#7A8FA6;margin:0 0 14px">Dear ${tenant.name},</p>
          <p style="font-size:13px;margin:0 0 16px">Please find your formal Section 13 rent increase notice for your tenancy at <strong>${propAddr}</strong>.</p>
          <div style="background:#F6F8FB;border-radius:8px;padding:16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
            <div><div style="font-size:10px;color:#7A8FA6;font-weight:600;text-transform:uppercase;margin-bottom:3px">Current rent</div><div style="font-size:15px;font-weight:700">£${curRent.toLocaleString()}/mo</div></div>
            <div><div style="font-size:10px;color:#7A8FA6;font-weight:600;text-transform:uppercase;margin-bottom:3px">New rent</div><div style="font-size:15px;font-weight:700;color:#0B1E3D">£${nw.toLocaleString()}/mo</div></div>
            <div><div style="font-size:10px;color:#7A8FA6;font-weight:600;text-transform:uppercase;margin-bottom:3px">Effective from</div><div style="font-size:13px;font-weight:700;color:#0B1E3D">${eDate}</div></div>
          </div>
          <div style="border:1px solid #E4EAF1;border-radius:8px;padding:16px;margin-bottom:16px;font-size:12px">${s.noticeHtml}</div>
          <div style="background:#FFF8F0;border:1px solid #F6AD55;border-radius:8px;padding:12px 14px;font-size:12px;color:#C05621;margin-bottom:16px">
            <strong>Your right to challenge:</strong> If you believe this rent is above market rate, you can refer this notice to the First-tier Tribunal (Property Chamber) before <strong>${eDate}</strong>.
          </div>
          <p style="font-size:11px;color:#999;margin:0">Sent via RentSafe AI · rentsafeai.co.uk</p>
        </div>
      </div>`;
      await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ type:'send_email', to: tenant.email, subject:`Section 13 Rent Increase Notice — ${propAddr}`, html: emailHtml })
      }).catch(()=>{});
    }

    // Log to email_log
    const { data: logData } = await sb.from('email_log').insert({
      prop_id: parseInt(s.pid), tenant_id: tenant?.id||null, tenant_name: tenant?.name||'—',
      template_id: 'section13',
      subject: `Section 13 Notice — £${curRent.toLocaleString()} → £${nw.toLocaleString()}/mo from ${eDate}`,
      status: 'Sent', user_id: currentUser.id,
    }).select().single();
    if (logData) D.emailLog.unshift(logData);

    // Update property rent
    await sb.from('properties').update({ rent: nw }).eq('id', s.pid);
    if (p) p.rent = nw;

    if (doAudit) await logAudit('S13_NOTICE_SENT','properties',s.pid,
      `S.13 sent to ${tenant?.email||'no email'} · £${curRent.toLocaleString()} → £${nw.toLocaleString()}/mo effective ${eDate}`);

    closeMo();
    toast('✓ S.13 notice sent — rent updated to £'+nw.toLocaleString()+'/mo');

    openMo('✅ Section 13 sent!',`${tenant?.name||''} · ${propAddr}`,`
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:48px;margin-bottom:12px">📈</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">Rent increase notice served</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:20px">New rent <strong>£${nw.toLocaleString()}/mo</strong> takes effect <strong>${eDate}</strong></div>
        <div style="background:var(--off);border-radius:8px;padding:14px;text-align:left;font-size:12px;color:var(--muted)">
          <div style="font-weight:600;color:var(--txt);margin-bottom:8px">What was done</div>
          <div style="margin-bottom:4px">${sendEmail&&tenant?.email?'✓ Emailed to '+tenant.email:'— No email sent'}</div>
          <div style="margin-bottom:4px">✓ Rent updated to £${nw.toLocaleString()}/mo in property record</div>
          <div style="margin-bottom:4px">✓ Logged to Documents history</div>
          <div>${doAudit?'✓ Court-admissible audit record saved':'—'}</div>
        </div>
      </div>
    `,`<button class="btn btn-navy" onclick="closeMo()">Done</button>`);

  } catch(err) {
    if (btn) { btn.disabled=false; btn.textContent='Send notice'; }
    toast('Error: '+err.message, true);
  }
}

function toggleMobSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sb-overlay');
  const hm=document.getElementById('mob-ham');
  const open=sb.classList.toggle('mob-open');
  ov.classList.toggle('show',open);

  document.body.style.overflow=open?'hidden':'';
}
function closeMobSidebar(){
  document.getElementById('sidebar').classList.remove('mob-open');

// ── SET LEAD TENANT ──
async function setLeadTenant(tid, pid) {
  if (!confirm('Set this tenant as the lead tenant? The current lead will be changed.')) return;
  // Clear all leads for this property
  const propTenants = D.tenants.filter(t => String(t.prop_id) === String(pid));
  for (const t of propTenants) {
    await sb.from('tenants').update({ is_lead: String(t.id) === String(tid) }).eq('id', t.id).catch(()=>{});
    t.is_lead = String(t.id) === String(tid);
  }
  await logAudit('SET_LEAD_TENANT', 'tenants', tid, `Set as lead tenant`);
  toast('✓ Lead tenant updated');
  pdSetTab(pid, 'tenant');
}

function moNotifyTenant(maintenanceId) {

  const tenant = D.tenants.find(t=>String(t.prop_id)===String(m.prop_id)&&t.status==='Active');

async function sendMaintenanceNotify(maintenanceId) {
  const m = D.maintenance.find(x=>String(x.id)===String(maintenanceId));
  const tenant = D.tenants.find(t=>String(t.prop_id)===String(m?.prop_id)&&t.status==='Active');
  const msg = document.getElementById('mnt-msg')?.value.trim();
  const sig = document.getElementById('mnt-sig')?.value.trim() || 'Your Landlord';
  if (!msg) { toast('Please enter a message', true); return; }
  if (!tenant?.email) { toast('No tenant email', true); return; }
  const prop = P(m.prop_id);
  const html = `<div style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:24px;color:#1A2B45">
    <div style="border-bottom:2px solid #0B1E3D;padding-bottom:10px;margin-bottom:16px"><span style="font-size:16px;font-weight:700;color:#0B1E3D">Rent<span style="color:#00C896">Safe AI</span></span></div>
    <h2 style="font-size:15px;margin-bottom:8px">Maintenance Update — ${m.title||'Maintenance'}</h2>
    <p style="font-size:13px;color:#7A8FA6;margin-bottom:16px">${prop?.address||''}</p>
    <div style="font-size:13px;line-height:1.7;white-space:pre-wrap">${msg}</div>
    <p style="font-size:13px;margin-top:16px">Kind regards,<br><strong>${sig}</strong></p>
    <div style="font-size:11px;color:#999;margin-top:16px;padding-top:12px;border-top:1px solid #eee">Sent via RentSafe AI · ${new Date().toLocaleString('en-GB')}</div>
  </div>`;
  try {
    await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'send_email',to:tenant.email,subject:`Maintenance update: ${m.title||'Job'}`,html})
    });
    const logEntry = {
      user_id: currentUser.id, tenant_id: tenant.id||null,
      prop_id: parseInt(m.prop_id), template_id: 'maintenance_notification',
      template_name: `Maintenance: ${m.title||'Job'}`,
      sent_to: tenant.email, subject: `Maintenance update: ${m.title||'Job'}`,
      status: 'Sent', email_body: html
    };
    const { data: logData } = await sb.from('email_log').insert(logEntry).select().single().catch(()=>({data:null}));
    D.emailLog.unshift({...logEntry, sent_at: new Date().toISOString(), id: logData?.id});
    await logAudit('MAINT_NOTIFY','email_log',maintenanceId,`Tenant notified: ${m.title}`);
    closeMo();
    toast('✉ Tenant notified and logged');
  } catch(e) {
    toast('Error: ' + e.message, true);
  }
}

// ── POSTCODE LOOKUP (moAddProp Step 1) ──
async function lookupPostcode() {
  const pc = (document.getElementById('p-post')?.value || '').trim().replace(/\s+/g,'');
  if (!pc) { toast('Enter a postcode first', true); return; }
  const btn = document.getElementById('p-post-btn');
  const res_div = document.getElementById('p-post-result');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const r = await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(pc)}`);
    const d = await r.json();
    if (d.status === 200 && d.result) {
      const city = d.result.admin_district || d.result.parliamentary_constituency || d.result.region || '';
      const cityEl = document.getElementById('p-city');
      if (cityEl && !cityEl.value) cityEl.value = city;
      if (res_div) res_div.innerHTML = `<span style="color:var(--green-dark)">✓ ${d.result.admin_ward || ''}, ${city}, ${d.result.region || ''}</span>`;
    } else {
      if (res_div) res_div.innerHTML = `<span style="color:var(--red)">Postcode not found — enter city manually</span>`;
    }
  } catch(e) {
    if (res_div) res_div.innerHTML = `<span style="color:var(--red)">Lookup failed — enter city manually</span>`;
  }
  if (btn) { btn.disabled = false; btn.textContent = 'Find →'; }
}

// ── AI SCAN: PROPERTY LICENCE (moAddProp Step 4) ──
function scanPropLicence(input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  const box = document.getElementById('p-lic-scan-box');
  if (box) box.innerHTML = `<span style="font-size:20px">⏳</span><div><div style="font-size:12px;font-weight:600;color:var(--muted)">Scanning licence…</div><div class="scan-badge" style="margin-top:4px">✦ AI reading</div></div>`;
  const reader = new FileReader();
  reader.onload = async () => {
    const b64 = reader.result.split(',')[1];
    const isImg = file.type.startsWith('image/');
    const msgContent = isImg
      ? [{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'UK property licence document. Extract: licence type (e.g. Selective, Mandatory HMO, Additional HMO), licence reference number, expiry date (YYYY-MM-DD), issuing council. Return JSON only, keys: type, ref, expiry, council.'}]
      : [{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'UK property licence document. Extract: licence type (e.g. Selective, Mandatory HMO, Additional HMO), licence reference number, expiry date (YYYY-MM-DD), issuing council. Return JSON only, keys: type, ref, expiry, council.'}];
    try {
      const res = await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:300,messages:[{role:'user',content:msgContent}]})});
      const data = await res.json();
      const parsed = JSON.parse((data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
      if (parsed.expiry) { const el=document.getElementById('p-lic-expiry'); if(el) el.value=parsed.expiry; }
      if (parsed.ref) { const el=document.getElementById('p-lic-ref'); if(el) el.value=parsed.ref; }
      if (parsed.type) {
        const lt = parsed.type.toLowerCase();
        const sel = document.getElementById('p-licence');
        const matchMap = { hmo:'Mandatory HMO', additional:'Additional HMO', selective:'Selective Licence', 'article 4':'Article 4', 'short-term':'Short-term Let', 'short term':'Short-term Let' };
        for (const [key, val] of Object.entries(matchMap)) { if (lt.includes(key) && sel) { sel.value = val; break; } }
      }
      if (box) box.innerHTML = `<span style="font-size:20px">✅</span><div><div style="font-size:12px;font-weight:600;color:var(--green-dark)">✓ Licence scanned — fields filled</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${file.name}</div></div>`;
      toast('✓ Licence scanned — check fields below');
    } catch(e) {
      if (box) box.innerHTML = `<span style="font-size:20px">📄</span><div><div style="font-size:12px;color:var(--red)">Scan failed — fill manually</div></div>`;
    }
  };
  reader.readAsDataURL(file);
}

      : [{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'UK tenancy deposit protection certificate. Extract: scheme name (DPS, MyDeposits, or TDS), deposit amount in GBP (number only), protection reference number. Return JSON only, keys: scheme, amount, ref.'}];
    try {
      const res = await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:200,messages:[{role:'user',content:msgContent}]})});
      const data = await res.json();
      const parsed = JSON.parse((data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
      if (parsed.amount) { const el=document.getElementById('p-deposit'); if(el) el.value=parsed.amount; }
      if (parsed.scheme) {
        const s = parsed.scheme.toLowerCase();

          if (s.includes('dps')) sel.value='DPS (Deposit Protection Service)';
