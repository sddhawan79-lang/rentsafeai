  const d30b = document.getElementById('sk-tab-d30-btn');
  if (d1b)  { d1b.style.borderBottomColor  = tab==='day1'  ? 'var(--navy)' : 'transparent'; d1b.style.color  = tab==='day1'  ? 'var(--navy)'  : 'var(--muted)'; d1b.style.fontWeight  = tab==='day1'  ? '700' : '500'; }
  if (d30b) { d30b.style.borderBottomColor = tab==='day30' ? 'var(--navy)' : 'transparent'; d30b.style.color = tab==='day30' ? 'var(--navy)'  : 'var(--muted)'; d30b.style.fontWeight = tab==='day30' ? '700' : '500'; }
}

async function sendStarterKitPack(pid, phase) {
  const btn = document.getElementById(phase==='day1'?'sk-send-day1':'sk-send-day30');
  const lbl = document.getElementById(phase==='day1'?'sk-d1-label':'sk-d30-label');
  if (btn) { btn.disabled = true; if(lbl) lbl.textContent = '⏳ AI drafting email…'; }

  const email = document.getElementById('sk-email')?.value.trim();
  const landlordName = document.getElementById('sk-landlord')?.value.trim() || 'Your Landlord';
  if (!email) { toast('Tenant email required', true); if(btn){btn.disabled=false;if(lbl)lbl.textContent=phase==='day1'?'✦ AI draft & send Day 1 pack →':'✦ AI draft & send Day 30 pack →';} return; }

  const p = P(pid);
  const tenant = D.tenants.find(t => String(t.prop_id) === String(pid) && t.status === 'Active');
  const propAddr = [p?.address, p?.city].filter(Boolean).join(', ');
  const pCerts = CF(pid);
  const findCert = type => pCerts.find(c => c.type && c.type.toLowerCase().includes(type.toLowerCase()));

  // Get checked items for this phase — standard + additional property docs
  const prefix = `sk-${phase}-`;
  const checkedIds = [...document.querySelectorAll(`[id^="${prefix}"]`)]
    .filter(el => el.type==='checkbox' && el.checked)
    .map(el => el.id.replace(prefix,''));

  const day1Labels = {rra:'RRA 2025 Information Sheet',h2r:'How to Rent Guide',gsc:'Gas Safety Certificate',eicr:'EICR (Electrical Report)',epc:'EPC (Energy Performance Certificate)',written:'Written Statement of Terms',deposit_c:'Deposit Protection Certificate',alarms:'Smoke & CO Alarm Test Confirmation'};
  const day30Labels = {prescribed:'Prescribed Information (Deposit)',section48:'Section 48 Notice',rtr_rec:'Right to Rent Check Record',inventory:'Inventory / Schedule of Condition',ins_sched:'Buildings Insurance Schedule',smoke_rec:'Smoke & CO Alarm Test Record'};
  const labelMap = phase==='day1'?day1Labels:day30Labels;

  // Standard doc labels
  const standardDocs = checkedIds.filter(id=>!id.startsWith('add-')).map(id=>labelMap[id]||id).filter(Boolean);

  // Additional property certs selected
  const addPrefix = `add-`;
  const additionalDocs = checkedIds
    .filter(id=>id.startsWith(addPrefix))
    .map(id => {
      const certId = id.replace(addPrefix,'');
      const el = document.getElementById(`${prefix}${id}`);
      return el?.dataset?.label || certId;
    }).filter(Boolean);

  const docList = [...standardDocs, ...additionalDocs];

  if (!docList.length) { toast('Select at least one document to send', true); if(btn){btn.disabled=false;if(lbl)lbl.textContent=phase==='day1'?'✦ AI draft & send Day 1 pack →':'✦ AI draft & send Day 30 pack →';} return; }

  try {
    // AI generates personalised intro
    const startDate = tenant?.start_date ? new Date(tenant.start_date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : 'your agreed start date';

    // Check Written Statement e-sign status for email
    const writtenSignedCertEmail = pCerts.find(c => c.type && c.type.toLowerCase().includes('written') && c.type.toLowerCase().includes('signed'));
    const pendingEsignsEmail = await loadEsignStatus(pid).catch(()=>[]);
    const writtenPendingEmail = pendingEsignsEmail.find(r => r.doc_label && r.doc_label.toLowerCase().includes('written')) || pendingEsignsEmail[0];
    const docRows = docList.map(label => {
      let status='✓ Provided', detail='';
      if(label.includes('Gas')&&gasCert)detail=`Expires: ${gasCert.expiry?new Date(gasCert.expiry).toLocaleDateString('en-GB'):'No expiry'}`;
      else if(label.includes('EICR')&&eicrCert)detail=`Expires: ${eicrCert.expiry?new Date(eicrCert.expiry).toLocaleDateString('en-GB'):'No expiry'}`;
      else if(label.includes('EPC')&&epcCert)detail=`Expires: ${epcCert.expiry?new Date(epcCert.expiry).toLocaleDateString('en-GB'):'No expiry'}`;
      else if(label.includes('Deposit')&&tenant?.scheme)detail=`${tenant.scheme} · Ref: ${tenant.scheme_ref||'—'} · £${(tenant.deposit||0).toLocaleString()}`;
      else if(label.includes('Written')||label.includes('Statement')) {

        <p style="font-size:13px;color:#1A2B45;line-height:1.7;margin:0 0 20px">${intro}</p>
        <h3 style="font-size:14px;font-weight:700;margin:0 0 10px">Documents included</h3>
        <table style="width:100%;border-collapse:collapse;margin-bottom:20px;border:1px solid #E4EAF1;border-radius:8px;overflow:hidden">
          <thead><tr style="background:#F6F8FB"><th style="padding:9px 14px;text-align:left;font-size:11px;font-weight:700;color:#7A8FA6;text-transform:uppercase;letter-spacing:.4px">Document</th><th style="padding:9px 14px;text-align:left;font-size:11px;font-weight:700;color:#7A8FA6;text-transform:uppercase;letter-spacing:.4px">Status</th><th style="padding:9px 14px;text-align:left;font-size:11px;font-weight:700;color:#7A8FA6;text-transform:uppercase;letter-spacing:.4px">Details</th></tr></thead>
          <tbody>${docRows}</tbody>
        </table>
        <div style="background:#F6F8FB;border-radius:8px;padding:14px;margin-bottom:20px">
          ${[['Property',propAddr],['Monthly rent',tenant?.rent?`£${tenant.rent.toLocaleString()}`:'—'],['Deposit',tenant?.deposit?`£${tenant.deposit.toLocaleString()}`:'—'],['Start date',startDate]].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span style="color:#7A8FA6">${l}</span><strong>${v}</strong></div>`).join('')}
        </div>
        ${tenant?.invite_token?`<div style="background:#F0FBF7;border:1px solid rgba(0,200,150,0.2);border-radius:8px;padding:14px;margin-bottom:20px"><div style="font-size:13px;font-weight:600;color:#009970;margin-bottom:6px">🔗 Your tenant portal</div><div style="font-size:12px;color:#1A2B45;margin-bottom:10px">Report maintenance, view certificates and sign documents.</div><a href="https://rentsafeai.co.uk/tenant.html?token=${tenant.invite_token}" style="background:#0B1E3D;color:#fff;padding:10px 20px;border-radius:7px;text-decoration:none;font-weight:600;font-size:13px;display:inline-block">Access portal →</a></div>`:''}
        <p style="font-size:12px;color:#7A8FA6;line-height:1.6;margin:0">This document pack was served on <strong>${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</strong>. A timestamped record has been created for compliance purposes.</p>
        <p style="font-size:13px;margin-top:16px">Kind regards,<br><strong>${landlordName}</strong></p>
      </div>
      <div style="padding:16px;text-align:center;font-size:11px;color:#999">Sent via RentSafe AI · rentsafeai.co.uk</div>
    </body></html>`;

    const subject = phase==='day1' ? `Your tenancy starter pack — ${propAddr}` : `Your 30-day compliance pack — ${propAddr}`;
    await fetch('https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type:'send_email', to:email, subject, html })
    });

    // Log to email_log
    const logEntry = { user_id:currentUser.id, tenant_id:tenant?.id||null, prop_id:parseInt(pid),
      template_id: phase==='day1'?'starter_kit_day1':'starter_kit_day30',
      template_name: phase==='day1'?`Starter Kit — Day 1 (${docList.length} docs)`:`Starter Kit — 30 days (${docList.length} docs)`,
      sent_to:email, subject, status:'Sent', email_body:html };
    const { data:logData } = await sb.from('email_log').insert(logEntry).select().single().catch(()=>({data:null}));
    D.emailLog.unshift({...logEntry, sent_at:new Date().toISOString(), id:logData?.id});
    await logAudit('STARTER_KIT_SENT','tenants',tenant?.id||pid,`${phase==='day1'?'Day 1':'30-day'} starter kit sent to ${email} · Docs: ${docList.join(', ')}`);

    closeMo();

  } catch(err) {
    if(btn){btn.disabled=false;if(lbl)lbl.textContent=phase==='day1'?'✦ AI draft & send Day 1 pack →':'✦ AI draft & send Day 30 pack →';}
    toast('Error: '+err.message, true);
  }
}

// ── ACTION ITEMS ──
function UA(){
  const today=new Date(); today.setHours(0,0,0,0);
  const miss=D.certs.filter(c=>c.status==='Missing').map(c=>({b:'red',l:'Urgent',t:`Missing ${c.type}`,s:(P(c.prop_id)||{address:'—'}).address}));
  const mnt=D.maintenance.filter(x=>x.status!=='Resolved').map(x=>({b:x.priority==='Urgent'?'red':'amber',l:x.awaab?'Awaab':x.priority,t:x.title,s:(P(x.prop_id)||{address:'—'}).address}));
  const rnt=D.rent.filter(x=>x.status==='Due'||x.status==='Late').map(x=>({b:x.status==='Late'?'red':'amber',l:x.status,t:`Rent ${x.status.toLowerCase()} — ${x.month}`,s:(P(x.prop_id)||{address:'—'}).address}));
  // Smart reminders from calendar
  const reminders=[];
  D.certs.filter(c=>c.expiry).forEach(c=>{
    const d=new Date(c.expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    if(days>=0&&days<=30){
      const prop=(P(c.prop_id)||{address:'—'}).address;
      reminders.push({b:days<=7?'red':'amber',l:days===0?'Today':days<=7?'This week':'Due soon',t:`${c.type} expires in ${days===0?'today':days+' days'}`,s:prop});
    }
  });
  D.properties.filter(p=>p.licence_expiry).forEach(p=>{
    const d=new Date(p.licence_expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    if(days>=0&&days<=30) reminders.push({b:days<=7?'red':'amber',l:'Licence',t:`${p.licence_type||'Licence'} expires in ${days} days`,s:p.address});
  });
  D.properties.filter(p=>p.mortgage_end).forEach(p=>{
    const d=new Date(p.mortgage_end); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    if(days>=0&&days<=30) reminders.push({b:days<=7?'red':'amber',l:'Mortgage',t:`Mortgage ends in ${days} days`,s:p.address});
  });
  return[...miss,...reminders,...mnt,...rnt];
}

function toggleGrp(grpId){
  var body=document.getElementById(grpId+'-body');
  var arr=document.getElementById(grpId+'-arr');
  if(!body) return;
  var open=body.style.display!=='none';
  body.style.display=open?'none':'block';

}

function renderPropChecklist(prefix, pid, mode, saved, meters){
  var ITEMS = getPropCheckItems(mode);
  saved = saved || {};
  var total=ITEMS.length, done=ITEMS.filter(function(i){return saved[i.id];}).length;
  var pct=Math.round(done/total*100);
  var col=pct===100?'#00C896':pct>=50?'#D97706':'#E53E3E';
  setTimeout(function(){var el=document.getElementById(prefix+'-cnt-'+pid);if(el)el.textContent=done+'/'+total;},0);

  var groups={};
  ITEMS.forEach(function(item){if(!groups[item.group])groups[item.group]=[];groups[item.group].push(item);});

  var html='<div style="padding:8px 0 4px">';
  // Overall progress bar
  html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
  html+='<div style="flex:1;height:6px;background:#E4EAF1;border-radius:100px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:100px;transition:width .3s ease"></div></div>';
  html+='<span style="font-size:12px;font-weight:600;color:'+col+';white-space:nowrap">'+done+'/'+total+' complete</span>';
  html+='</div>';

  // Groups as collapsible dropdowns
  Object.keys(groups).forEach(function(grpName){
    var gitems=groups[grpName];
    var grpDone=gitems.filter(function(i){return saved[i.id];}).length;
    var allDone=grpDone===gitems.length;
    var grpId=prefix+'-'+pid+'-'+grpName.replace(/[^a-z0-9]/gi,'-').toLowerCase();
    var borderCol=allDone?'var(--green)':'var(--border)';
    var headerBg=allDone?'rgba(0,200,150,0.06)':'var(--off)';

    html+='<div style="margin-bottom:8px;border:1px solid '+borderCol+';border-radius:10px;overflow:hidden">';
    // Group header
    html+='<div onclick="toggleGrp(\''+grpId+'\')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:'+headerBg+';user-select:none">';
    html+='<span style="font-size:12.5px;font-weight:600;color:'+(allDone?'var(--green-dark)':'var(--txt)')+'">'+grpName+'</span>';
    html+='<div style="display:flex;align-items:center;gap:8px">';
    if(allDone){
      html+='<span style="font-size:11px;font-weight:600;color:var(--green-dark);background:var(--green-bg);padding:2px 8px;border-radius:100px">✓ Complete</span>';
    } else {
      html+='<span style="font-size:11px;color:var(--muted)">'+grpDone+'/'+gitems.length+'</span>';
    }
    html+='<span id="'+grpId+'-arr" style="font-size:10px;color:var(--muted);transition:transform .2s;display:inline-block;transform:rotate(-90deg)">▾</span>';
    html+='</div></div>';

    // Group body (closed by default)
    html+='<div id="'+grpId+'-body" style="padding:8px 12px 10px;display:none">';
    gitems.forEach(function(item){
      var checked=saved[item.id]?true:false;
      html+='<div data-prefix="'+prefix+'" data-pid="'+pid+'" data-id="'+item.id+'" onclick="togglePropCheck(this.dataset.prefix,this.dataset.pid,this.dataset.id)" ';
      html+='style="display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:7px;border:1px solid '+(checked?'var(--green)':'var(--border)')+';background:'+(checked?'rgba(0,200,150,0.04)':'var(--white)')+';cursor:pointer;margin-bottom:6px;transition:all .12s">';
      html+='<div style="width:17px;height:17px;border-radius:4px;border:2px solid '+(checked?'var(--green)':'#C5D0DD')+';background:'+(checked?'var(--green)':'transparent')+';flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center">';
      html+=checked?'<svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>':'';
      html+='</div>';
      html+='<div style="flex:1"><div style="font-size:12.5px;font-weight:500;'+(checked?'text-decoration:line-through;color:var(--muted)':'color:var(--txt)')+'">'+item.label+'</div>';
      if(item.detail) html+='<div style="font-size:11px;color:var(--muted);margin-top:2px;line-height:1.45">'+item.detail+'</div>';
      html+='</div></div>';
    });
    html+='</div></div>';
  });

  html+='<p style="font-size:10px;color:var(--muted);margin-top:10px;line-height:1.5">⚠️ Guide only — not legal advice. Consult a qualified solicitor for your circumstances.</p>';
  html+='</div>';
  return html;
}

async function togglePropCheck(prefix,pid,itemId){
  const cacheKey = prefix + '_' + pid;
  const saved = await sbLoadChecklist(pid, prefix);
  if(saved[itemId]) delete saved[itemId]; else saved[itemId]=true;
  _checkCache[cacheKey] = saved;
  const meters = _meterCache[pid] || {};
  const el=document.getElementById('cb-'+prefix+'-'+pid);
  if(el) el.innerHTML=renderPropChecklist(prefix,pid,prefix==='ob'?'onboard':'deboard',saved,meters);
  await sbSaveChecklist(pid, prefix, saved);
}

async function saveMeterReading(pid,mkey,val){
  if (!val || !currentUser) return;
  // Update local cache immediately so UI stays in sync
  if (!_meterCache[pid]) _meterCache[pid] = {};
  _meterCache[pid][mkey] = val;
  try {
    await sb.from('meter_readings').insert({
      user_id: currentUser.id,
      prop_id: parseInt(pid),
      type: mkey,
      reading: parseFloat(val) || 0,
      read_date: new Date().toISOString().split('T')[0],
      read_type: mkey.endsWith('_in') ? 'in' : 'out'
    });
  } catch(e) { console.warn('Meter save failed:', e); }
}


async function initPropChecklist(prefix, pid, mode) {
  const [saved, meters] = await Promise.all([
    sbLoadChecklist(pid, prefix),
    sbLoadMeters(pid)
  ]);
  const el = document.getElementById('cb-'+prefix+'-'+pid);
  if (el) el.innerHTML = renderPropChecklist(prefix, pid, mode, saved, meters);
}

function propMaintHtml(pid){

  const res=pm.filter(m=>m.status==='Resolved').length;

  const totalCost=pm.filter(m=>m.cost).reduce((s,m)=>s+(m.cost||0),0);
  const stageCol={'Reported':'#7A8FA6','Assigned':'#3B6FE8','In Progress':'#D97706','Completed':'#00C896','Closed':'#556678'};

  let html=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
    <div style="background:${opn?'rgba(229,62,62,0.07)':'rgba(0,200,150,0.07)'};border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--muted)">Open</div><div style="font-size:16px;font-weight:600;color:${opn?'var(--red)':'var(--green-dark)'}">${opn}</div></div>
    <div style="background:rgba(0,200,150,0.07);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--muted)">Resolved</div><div style="font-size:16px;font-weight:600;color:var(--green-dark)">${res}</div></div>

    <div style="background:rgba(0,200,150,0.07);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--muted)">Total costs</div><div style="font-size:16px;font-weight:600;color:var(--green-dark)">£${totalCost.toLocaleString()}</div></div>

  html+=pm.slice(0,6).map(m=>{

        <div style="font-size:11px;color:var(--muted);margin-top:1px">${m.cat||'—'}${m.assigned_to?' · 👷 '+m.assigned_to:''}</div>

        ${m.awaab?'<span style="font-size:10px;font-weight:700;color:var(--red)">⚠</span>':''}

    const isActive = tb.id===activeTab;
    return `<button class="pd-tab${isActive?' active':''}" data-tab="${tb.id}" onclick="pdSetTab('${pid}','${tb.id}')"
      style="${isActive?`color:${tb.col};border-bottom-color:${tb.col};font-weight:700`:``}">
      ${tb.icon} ${tb.label}
      ${tb.cnt > 0 ? `<span class="pd-cnt"${isActive?` style="background:${tb.col};border-color:${tb.col};color:#fff"`:``}>${tb.cnt}</span>` : ''}
    </button>`;
  }).join('')}</div>`;

  return `<div class="topbar"><span class="tb-title">Properties</span><div class="tb-right">
    <button class="btn" onclick="moEditProp('${pid}')">✎ Edit</button>
  </div></div>
  <div class="content">
    <button class="detail-back" onclick="nav('properties')"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg> Back to properties</button>

    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div>
        <h1 style="font-size:21px;font-weight:700;margin-bottom:3px">${p.address}</h1>
        <p style="font-size:13px;color:var(--muted)">${p.city}, ${p.postcode}</p>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${B(t?'Active':'Vacant')}
        <span class="badge b-gray">${p.type||'—'}</span>
        ${p.beds?`<span class="badge b-gray">${p.beds} bed · ${p.bathrooms||1} bath</span>`:''}
        ${p.licence_type&&p.licence_type!=='None'?`<span class="badge b-amber">${p.licence_type}</span>`:''}
      </div>
    </div>

    ${statHtml}
    ${tabBar}
    <div id="pd-tab-content">${pdTabContent(pid, activeTab)}</div>
  </div>`;
}

function pdSetTab(pid, tab) {
  window._pdTab[pid] = tab;
  document.querySelectorAll('.pd-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const el = document.getElementById('pd-tab-content');
  if (!el) return;
  try {
    el.innerHTML = pdTabContent(pid, tab);
  } catch(err) {
    el.innerHTML = `<div style="padding:24px;background:rgba(229,62,62,0.06);border:1px solid rgba(229,62,62,0.2);border-radius:10px;margin-top:8px">
      <div style="font-size:13px;font-weight:600;color:var(--red);margin-bottom:4px">Error loading ${tab} tab</div>
      <div style="font-size:11px;color:var(--muted);font-family:monospace">${err.message}</div>
    </div>`;
    console.error('pdTabContent error:', tab, err);
  }
  if (tab === 'tenant') {
    try {
      initPropChecklist('ob', pid, 'onboard');
      initPropChecklist('db', pid, 'deboard');
    } catch(e) { console.warn('checklist init failed', e); }
  }
}

  // ── FINANCIALS TAB ──
  if (tab === 'financials') {

function buildCertStatusGrid(pid) {
  const today = new Date(); today.setHours(0,0,0,0);
  const pc = CF(pid);
  const CERT_TYPES = [
    // MANDATORY — legal requirement
    'Gas Safety Certificate',
    'EICR (Electrical Installation)',
    'EPC (Energy Performance)',
    'How to Rent Guide',
    'Smoke Alarm Test Record',
    'CO Alarm Check Record',
    // DEPOSIT & TENANCY
    'Deposit Protection Certificate',
    'Written Statement of Terms',
    'Right to Rent Record',
    // COMPLIANCE — required for some properties
    'Legionella Risk Assessment',
    'Fire Risk Assessment',
    'Asbestos Survey',
    'PAT Testing Certificate',
    'HMO Licence',
    'Selective Licence',
    'Planning Permission / Article 4',
    // PROPERTY DOCUMENTS
    'Inventory / Schedule of Condition',
    'Buildings Insurance Schedule',
    'Contents Insurance Schedule',
    'Rent Guarantee Insurance',
    'Section 48 Notice (Landlord Address)',
    // CUSTOM
    'Other',
  ];

  function findCert(label) {
    const lo = label.toLowerCase();
    return pc.find(c => {
      const t = (c.type || '').toLowerCase();
      if (lo === 'gas safety certificate') return t.includes('gas');
      if (lo === 'eicr') return t.includes('eicr') || t.includes('electrical installation');
      if (lo === 'epc') return t.includes('epc') || t.includes('energy performance');
      if (lo === 'how to rent guide') return t.includes('how to rent');
      if (lo === 'deposit certificate') return t.includes('deposit');
      if (lo === 'tenancy agreement') return t.includes('tenancy agreement');
      return false;
    });
  }

  function getCertStatus(cert) {
    if (!cert) return { label: 'MISSING', bg: '#E4EAF1', color: '#7A8FA6', border: 'transparent', days: null };
    if (cert.expiry) {
      const days = Math.round((new Date(cert.expiry) - today) / 864e5);
      if (days < 0)   return { label: 'EXPIRED',       bg: 'rgba(229,62,62,0.1)',   color: '#E53E3E', border: 'rgba(229,62,62,0.25)',   days };
      if (days <= 14) return { label: 'URGENT',         bg: 'rgba(217,119,6,0.1)',   color: '#D97706', border: 'rgba(217,119,6,0.25)',   days };
      if (days <= 60) return { label: 'EXPIRING SOON',  bg: 'rgba(59,111,232,0.08)', color: '#3B6FE8', border: 'rgba(59,111,232,0.2)',   days };
      return                 { label: 'VALID',           bg: 'rgba(0,200,150,0.08)',  color: '#00A87A', border: 'rgba(0,200,150,0.2)',    days };
    }
    return { label: 'VALID', bg: 'rgba(0,200,150,0.08)', color: '#00A87A', border: 'rgba(0,200,150,0.2)', days: null };
  }

  const items = CERT_TYPES.map(label => {
    const cert = findCert(label);
    const st = getCertStatus(cert);
    const dayStr = st.days !== null
      ? (st.days < 0 ? `${Math.abs(st.days)}d overdue` : `${st.days}d left`)
      : (cert && !cert.expiry ? 'No expiry' : '');
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:${st.bg};border:1px solid ${st.border};border-radius:7px;gap:8px">
      <span style="font-size:12px;font-weight:500;color:var(--txt);flex:1;min-width:0">${label}</span>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        ${dayStr ? `<span style="font-size:10px;color:${st.color}">${dayStr}</span>` : ''}
        <span style="font-size:10px;font-weight:700;color:${st.color};letter-spacing:.3px;white-space:nowrap">${st.label}</span>
      </div>
    </div>`;
  }).join('');

  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">${items}</div>`;
}

function pgCompliance(){
  const today = new Date(); today.setHours(0,0,0,0);

  // Build enriched cert list with days-to-expiry
  const allCerts = D.certs.map(c => {
    const p = P(c.prop_id) || { address: '—', city: '' };
    const daysLeft = c.expiry ? Math.round((new Date(c.expiry) - today) / 864e5) : null;
    const urgency = !c.expiry ? 'none'
      : daysLeft < 0 ? 'expired'
      : daysLeft <= 14 ? 'critical'
      : daysLeft <= 60 ? 'soon'
      : 'ok';
    return { ...c, p, daysLeft, urgency };
  });

  // Portfolio health score — weighted calculation
  const total = allCerts.length;
  const expired = allCerts.filter(c => c.urgency === 'expired').length;
  const critical = allCerts.filter(c => c.urgency === 'critical').length;
  const soon = allCerts.filter(c => c.urgency === 'soon').length;
  const ok = allCerts.filter(c => c.urgency === 'ok').length;
  const noExpiry = allCerts.filter(c => c.urgency === 'none').length;

  let score = 100;
  if (total > 0) {
    score = Math.round(((ok + noExpiry * 0.8) / total) * 100);
    score = Math.max(0, score - (expired * 15) - (critical * 5));
    score = Math.min(100, Math.max(0, score));
  }
  if (!total) score = 0;

  // Score colour and label
  const scoreCol = score >= 80 ? '#00C896' : score >= 50 ? '#D97706' : '#E53E3E';
  const scoreLabel = score >= 80 ? 'Healthy' : score >= 50 ? 'Needs attention' : 'At risk';
  const scoreSub = score >= 80 ? 'Your portfolio is well maintained' : score >= 50 ? 'Some items need your attention' : 'Urgent action required';

  // SVG circular gauge
  const r = 54, cx = 70, cy = 70;
  const circumference = 2 * Math.PI * r;
  const dashOffset = circumference - (score / 100) * circumference;
  const gauge = `<svg width="140" height="140" viewBox="0 0 140 140">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${scoreCol}" stroke-width="10"
      stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
      stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dashoffset 1s ease,stroke .5s ease"/>
    <text x="${cx}" y="${cy - 8}" text-anchor="middle" fill="#fff" font-size="28" font-weight="700" font-family="DM Sans,sans-serif">${score}</text>
    <text x="${cx}" y="${cy + 12}" text-anchor="middle" fill="${scoreCol}" font-size="11" font-weight="600" font-family="DM Sans,sans-serif">${scoreLabel.toUpperCase()}</text>
    <text x="${cx}" y="${cy + 26}" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9" font-family="DM Sans,sans-serif">out of 100</text>
  </svg>`;

  // Action items — filtered by stat card click, sorted by urgency then days
  const activeFilter = window._compFilter || 'all';
  const actionItems = allCerts
    .filter(c => {
      if (activeFilter === 'expired') return c.urgency === 'expired';
      if (activeFilter === 'critical') return c.urgency === 'critical' || c.urgency === 'soon';
      if (activeFilter === 'ok') return c.urgency === 'ok' || c.urgency === 'none';
      return c.urgency === 'expired' || c.urgency === 'critical' || c.urgency === 'soon';
    })
    .sort((a,b) => (a.daysLeft ?? 999) - (b.daysLeft ?? 999));

  const filterLabel = activeFilter === 'expired' ? 'Expired certificates'
    : activeFilter === 'critical' ? 'Expiring soon (critical)'

  const actionHtml = actionItems.length ? actionItems.map(c => {

    return `<div style="display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--border);background:${urgBg};transition:background .15s" onmouseenter="this.style.background='rgba(0,0,0,0.02)'" onmouseleave="this.style.background='${urgBg}'">

  return `<div class="topbar"><span class="tb-title">Compliance</span><div class="tb-right">
    <button class="btn btn-navy" onclick="moBulkScan()">✦ Bulk scan</button>

function getReminderPrefs() {
  try { return JSON.parse(localStorage.getItem('rsa_reminders_v1') || '{}'); } catch(e) { return {}; }
}

  localStorage.setItem('rsa_reminders_v1', JSON.stringify(prefs));
}
function isReminderEnabled(id) {
  const prefs = getReminderPrefs();
  // mandatory types always on; others default on
  return prefs[id] !== false;

async function checkAllReminders() {
  if (!currentUser) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const email = currentUser.email;
  const EDGE = 'https://mahtcfukgzbonwibtsxz.supabase.co/functions/v1/super-processor';
  const TOL = 1; // day tolerance window

  async function alreadySent(action, recordId, key) {
    const twoDaysAgo = new Date(today); twoDaysAgo.setDate(twoDaysAgo.getDate()-2);
    try {
      const { data } = await sb.from('audit_log').select('id')
        .eq('action', action).eq('record_id', String(recordId))
        .ilike('details', `%${key}%`).gte('created_at', twoDaysAgo.toISOString()).limit(1);
      return !!(data && data.length);
    } catch(e) { return false; }
  }

  async function sendReminder(subject, html, action, recordId, key) {
    try {
      await fetch(EDGE, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ type:'send_email', to: email, subject, html }) });
      await logAudit(action, 'reminders', recordId, key);
    } catch(e) { /* non-critical */ }
  }

  function emailWrap(title, subtitle, bodyHtml) {
    return `<div style="font-family:DM Sans,Arial,sans-serif;color:#1A2B45;max-width:600px;margin:0 auto;padding:0">
      <div style="background:#0B1E3D;padding:20px 24px;border-radius:10px 10px 0 0">
        <div style="font-size:17px;font-weight:700;color:#fff">Rent<span style="color:#00C896">Safe AI</span></div>

      </div>
      <div style="background:#fff;border:1px solid #E4EAF1;border-top:none;border-radius:0 0 10px 10px;padding:24px">
        <h2 style="font-size:16px;font-weight:700;margin:0 0 14px">${title}</h2>
        ${bodyHtml}
        <p style="font-size:11px;color:#999;margin-top:20px;border-top:1px solid #eee;padding-top:12px">Sent via RentSafe AI · rentsafeai.co.uk · Manage reminders in your dashboard</p>
      </div>
    </div>`;
  }

  // ── 1. Certificate expiry ──
  if (isReminderEnabled('cert')) {
    for (const prop of D.properties) {
      for (const ms of [60,30,14]) {
        const expiring = D.certs.filter(c => {
          if (String(c.prop_id) !== String(prop.id) || !c.expiry) return false;
          const d = Math.round((new Date(c.expiry)-today)/864e5);
          return d >= ms-TOL && d <= ms+TOL;
        });
        if (!expiring.length) continue;
        if (await alreadySent('REMINDER_CERT', prop.id, `cert_${ms}d`)) continue;
        const rows = expiring.map(c=>`<tr><td style="padding:8px 12px;border-bottom:1px solid #eee;font-size:13px">${c.type}</td><td style="padding:8px 12px;border-bottom:1px solid #eee;color:#D97706;font-weight:600;font-size:13px">${Math.round((new Date(c.expiry)-today)/864e5)}d left</td><td style="padding:8px 12px;border-bottom:1px solid #eee;font-size:12px;color:#7A8FA6">${new Date(c.expiry).toLocaleDateString('en-GB')}</td></tr>`).join('');
        const html = emailWrap(`⚠️ Certificate expiry — ${prop.address}`,`Compliance reminder · ${ms} days`,`<p style="font-size:13px;margin:0 0 14px">The following certificate${expiring.length!==1?'s':''} will expire in approximately <strong>${ms} days</strong>:</p><table style="width:100%;border-collapse:collapse;margin-bottom:16px;border:1px solid #eee"><thead><tr style="background:#0B1E3D"><th style="padding:8px 12px;color:#fff;text-align:left;font-size:11px">Certificate</th><th style="padding:8px 12px;color:#fff;text-align:left;font-size:11px">Days left</th><th style="padding:8px 12px;color:#fff;text-align:left;font-size:11px">Expiry date</th></tr></thead><tbody>${rows}</tbody></table><p style="font-size:12px;color:#7A8FA6">Please arrange renewal to maintain legal compliance.</p>`);
        await sendReminder(`⚠️ Certificate expiry — ${prop.address} — ${ms} days`, html, 'REMINDER_CERT', prop.id, `cert_${ms}d`);
      }
    }
  }

  // ── 2. Licence expiry ──
  if (isReminderEnabled('licence')) {
    for (const prop of D.properties.filter(p=>p.licence_expiry)) {
      for (const ms of [60,30,14]) {
        const d = Math.round((new Date(prop.licence_expiry)-today)/864e5);
        if (d < ms-TOL || d > ms+TOL) continue;
        if (await alreadySent('REMINDER_LICENCE', prop.id, `lic_${ms}d`)) continue;
        const html = emailWrap(`📋 Licence expiry — ${prop.address}`,`Property licence reminder · ${ms} days`,`<p style="font-size:13px">Your <strong>${prop.licence_type||'property licence'}</strong> for <strong>${prop.address}</strong> expires in <strong>${d} days</strong> (${new Date(prop.licence_expiry).toLocaleDateString('en-GB')}).</p><p style="font-size:13px;margin-top:10px;color:#7A8FA6">Non-compliance with licensing requirements can result in fines up to £30,000. Please arrange renewal.</p>`);
        await sendReminder(`📋 Licence expiry in ${d} days — ${prop.address}`, html, 'REMINDER_LICENCE', prop.id, `lic_${ms}d`);
      }
    }
  }

  // ── 3. Insurance renewal ──
  if (isReminderEnabled('insurance')) {
    for (const ins of D.insurance.filter(i=>i.expiry)) {
      for (const ms of [60,30]) {
        const d = Math.round((new Date(ins.expiry)-today)/864e5);
        if (d < ms-TOL || d > ms+TOL) continue;
        const prop = P(ins.prop_id)||{address:'—'};
        if (await alreadySent('REMINDER_INSURANCE', ins.id, `ins_${ms}d`)) continue;
        const html = emailWrap(`🛡 Insurance renewal — ${prop.address}`,`Insurance reminder · ${ms} days`,`<p style="font-size:13px">Your <strong>${ins.type||'insurance policy'}</strong> for <strong>${prop.address}</strong> renews in <strong>${d} days</strong> (${new Date(ins.expiry).toLocaleDateString('en-GB')}).</p><p style="font-size:13px;margin-top:10px;color:#7A8FA6">Provider: ${ins.provider||'—'} · Policy: ${ins.policy||'—'}. Please arrange renewal to maintain cover.</p>`);
        await sendReminder(`🛡 Insurance renewal in ${d} days — ${prop.address}`, html, 'REMINDER_INSURANCE', ins.id, `ins_${ms}d`);
      }
    }
  }

  // ── 4. Mortgage end ──
  if (isReminderEnabled('mortgage')) {
    for (const prop of D.properties.filter(p=>p.mortgage_end)) {
      for (const ms of [90,30]) {
        const d = Math.round((new Date(prop.mortgage_end)-today)/864e5);
        if (d < ms-TOL || d > ms+TOL) continue;
        if (await alreadySent('REMINDER_MORTGAGE', prop.id, `mort_${ms}d`)) continue;
        const html = emailWrap(`🏦 Mortgage ending — ${prop.address}`,`Mortgage reminder · ${ms} days`,`<p style="font-size:13px">The mortgage on <strong>${prop.address}</strong> ends in <strong>${d} days</strong> (${new Date(prop.mortgage_end).toLocaleDateString('en-GB')}).</p><p style="font-size:13px;margin-top:10px;color:#7A8FA6">Lender: ${prop.mortgage_lender||'—'} · Outstanding: £${(prop.mortgage_outstanding||0).toLocaleString()}. Please arrange remortgage or contact your lender.</p>`);
        await sendReminder(`🏦 Mortgage ending in ${d} days — ${prop.address}`, html, 'REMINDER_MORTGAGE', prop.id, `mort_${ms}d`);
      }
    }
  }

  // ── 5. Tenancy end ──
  if (isReminderEnabled('tenancy')) {
    for (const t of D.tenants.filter(t=>t.end_date&&t.status==='Active')) {
      for (const ms of [90,60,30]) {
        const d = Math.round((new Date(t.end_date)-today)/864e5);
        if (d < ms-TOL || d > ms+TOL) continue;
        const prop = P(t.prop_id)||{address:'—'};
        if (await alreadySent('REMINDER_TENANCY_END', t.id, `tend_${ms}d`)) continue;
        const html = emailWrap(`🔑 Tenancy ending — ${t.name}`,`Tenancy end reminder · ${ms} days`,`<p style="font-size:13px">The tenancy for <strong>${t.name}</strong> at <strong>${prop.address}</strong> ends in <strong>${d} days</strong> (${new Date(t.end_date).toLocaleDateString('en-GB')}).</p><p style="font-size:13px;margin-top:10px;color:#7A8FA6">Under RRA 2025, all tenancies are now periodic — consider whether you need to serve notice or agree a renewal.</p>`);
        await sendReminder(`🔑 Tenancy ending in ${d} days — ${t.name}`, html, 'REMINDER_TENANCY_END', t.id, `tend_${ms}d`);
      }
    }
  }

  // ── 6. Boiler service ──
  if (isReminderEnabled('boiler')) {
    for (const prop of D.properties.filter(p=>p.boiler_next_service)) {
      for (const ms of [30,14]) {
        const d = Math.round((new Date(prop.boiler_next_service)-today)/864e5);
        if (d < ms-TOL || d > ms+TOL) continue;
        if (await alreadySent('REMINDER_BOILER', prop.id, `boil_${ms}d`)) continue;
        const html = emailWrap(`🔧 Boiler service due — ${prop.address}`,`Boiler service reminder · ${ms} days`,`<p style="font-size:13px">The annual boiler service for <strong>${prop.address}</strong> is due in <strong>${d} days</strong> (${new Date(prop.boiler_next_service).toLocaleDateString('en-GB')}).</p><p style="font-size:13px;margin-top:10px;color:#7A8FA6">${prop.boiler_engineer?'Last engineer: '+prop.boiler_engineer+'. ':''} Annual servicing is a legal requirement for landlords under gas safety regulations.</p>`);
        await sendReminder(`🔧 Boiler service due in ${d} days — ${prop.address}`, html, 'REMINDER_BOILER', prop.id, `boil_${ms}d`);
      }
    }
  }

  // ── 7. Right to Rent re-check ──
  if (isReminderEnabled('rtr')) {
    for (const t of D.tenants.filter(t=>t.rtr_expiry&&t.status==='Active')) {
      for (const ms of [60,30]) {
        const d = Math.round((new Date(t.rtr_expiry)-today)/864e5);
        if (d < ms-TOL || d > ms+TOL) continue;
        const prop = P(t.prop_id)||{address:'—'};
        if (await alreadySent('REMINDER_RTR', t.id, `rtr_${ms}d`)) continue;
        const html = emailWrap(`🔍 Right to Rent re-check — ${t.name}`,`Right to Rent reminder · ${ms} days`,`<p style="font-size:13px">The Right to Rent document for <strong>${t.name}</strong> at <strong>${prop.address}</strong> expires in <strong>${d} days</strong> (${new Date(t.rtr_expiry).toLocaleDateString('en-GB')}).</p><p style="font-size:13px;margin-top:10px;color:#7A8FA6">You must carry out a follow-up Right to Rent check before the document expires. Failure to do so is a criminal offence with unlimited fines.</p>`);
        await sendReminder(`🔍 Right to Rent re-check due — ${t.name}`, html, 'REMINDER_RTR', t.id, `rtr_${ms}d`);
      }
    }
  }

  // ── 8. Rent overdue ──
  if (isReminderEnabled('rent')) {
    for (const t of D.tenants.filter(t=>t.rent&&t.rent_day&&t.status==='Active')) {
      const dueThis = new Date(); dueThis.setDate(t.rent_day);
      dueThis.setHours(0,0,0,0);
      const daysLate = Math.round((today-dueThis)/864e5);
      if (![1,3,7].includes(daysLate)) continue;
      // Check if paid
      const paid = D.rent.some(r => String(r.prop_id)===String(t.prop_id) && r.status==='Paid' && new Date(r.due_date).getMonth()===today.getMonth());
      if (paid) continue;
      const prop = P(t.prop_id)||{address:'—'};
      if (await alreadySent('REMINDER_RENT_LATE', t.id, `rent_${daysLate}d`)) continue;
      const html = emailWrap(`💷 Rent overdue — ${t.name}`,`Rent reminder · ${daysLate} day${daysLate!==1?'s':''} late`,`<p style="font-size:13px">Rent from <strong>${t.name}</strong> at <strong>${prop.address}</strong> was due on the <strong>${t.rent_day}${t.rent_day===1?'st':t.rent_day===2?'nd':t.rent_day===3?'rd':'th'}</strong> and appears to be <strong>${daysLate} day${daysLate!==1?'s':''} late</strong>.</p><p style="font-size:13px;margin-top:10px;color:#7A8FA6">Expected: £${(t.rent||0).toLocaleString()}/mo. Log in to mark as paid or begin the arrears process if needed.</p>`);
      await sendReminder(`💷 Rent ${daysLate}d overdue — ${t.name}`, html, 'REMINDER_RENT_LATE', t.id, `rent_${daysLate}d`);
    }
  }

  // ── 9. S.13 eligibility ──
  if (isReminderEnabled('s13')) {
    for (const t of D.tenants.filter(t=>t.start_date&&t.status==='Active')) {
      const anniv = new Date(t.start_date); anniv.setFullYear(anniv.getFullYear()+1); anniv.setHours(0,0,0,0);
      const d = Math.round((anniv-today)/864e5);
      if (d !== 0) continue;
      if (await alreadySent('REMINDER_S13', t.id, 's13_unlock')) continue;
      const prop = P(t.prop_id)||{address:'—'};
      const html = emailWrap(`📈 S.13 rent increase now available — ${t.name}`,`Section 13 eligibility unlocked`,`<p style="font-size:13px">The tenancy for <strong>${t.name}</strong> at <strong>${prop.address}</strong> has now passed its 12-month anniversary.</p><p style="font-size:13px;margin-top:10px">You are now eligible to propose a rent increase using a <strong>Section 13 notice</strong>. Under RRA 2025, rent can only be increased once every 12 months.</p><p style="font-size:13px;margin-top:10px;color:#7A8FA6">Current rent: £${(t.rent||0).toLocaleString()}/mo. Log in to generate a Section 13 notice.</p>`);
      await sendReminder(`📈 S.13 eligible now — ${t.name}, ${prop.address}`, html, 'REMINDER_S13', t.id, 's13_unlock');
    }
  }

  // ── 10. RRA sheet deadline ──
  if (isReminderEnabled('rra')) {
    const rraSent = new Set(D.emailLog.filter(e=>e.template_id==='rra_info_sheet'&&e.status==='Sent').map(e=>String(e.tenant_id)));
    const unsent = D.tenants.filter(t=>t.status==='Active'&&!rraSent.has(String(t.id)));
    if (unsent.length) {
      const dToDeadline = Math.round((new Date('2026-05-31')-today)/864e5);
      for (const ms of [30,14,7]) {
        if (dToDeadline < ms-TOL || dToDeadline > ms+TOL) continue;
        if (await alreadySent('REMINDER_RRA', 'portfolio', `rra_${ms}d`)) continue;
        const names = unsent.map(t=>t.name).join(', ');
        const html = emailWrap(`⚠️ RRA sheet deadline — ${ms} days left`,`Renters Rights Act 2025 · Urgent`,`<p style="font-size:13px;color:#E53E3E;font-weight:600">You have ${dToDeadline} days to send the mandatory RRA 2025 Information Sheet to ${unsent.length} tenant${unsent.length!==1?'s':''}.</p><p style="font-size:13px;margin-top:10px">Unsent: <strong>${names}</strong></p><p style="font-size:13px;margin-top:10px;color:#7A8FA6">Failure to send by 31 May 2026 can result in a fine of up to <strong>£7,000 per tenant</strong>. Log in now to send.</p>`);
        await sendReminder(`⚠️ RRA sheet — ${dToDeadline} days left — ${unsent.length} tenant${unsent.length!==1?'s':''} unsent`, html, 'REMINDER_RRA', 'portfolio', `rra_${ms}d`);
        break; // Only one RRA reminder at a time
      }
    }
  }
  // ── 11. Compliance score digest (weekly) ──
  if (isReminderEnabled('compliance_digest') && D.properties.length) {
    const sevenDaysAgo = new Date(today); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
    try {
      const { data: existing } = await sb.from('audit_log').select('id')
        .eq('action','REMINDER_COMPLIANCE_DIGEST')
        .eq('record_id','portfolio')
        .gte('created_at', sevenDaysAgo.toISOString())
        .limit(1);
      if (existing && existing.length) return; // already sent this week
    } catch(e) { return; }

    // Calculate portfolio score
    const allCerts = D.certs;
    const totalCerts = allCerts.length;
    const expiredCerts = allCerts.filter(c => c.expiry && new Date(c.expiry) < today).length;
    const criticalCerts = allCerts.filter(c => { if(!c.expiry) return false; const d=Math.round((new Date(c.expiry)-today)/864e5); return d>=0&&d<=14; }).length;
    const portfolioScore = totalCerts > 0
      ? Math.max(0, Math.min(100, Math.round(((totalCerts-expiredCerts)/totalCerts)*100) - (criticalCerts*5)))
      : 0;
    const scoreCol = portfolioScore>=80?'#00C896':portfolioScore>=50?'#D97706':'#E53E3E';
    const scoreLabel = portfolioScore>=80?'Healthy ✅':portfolioScore>=50?'Needs attention ⚠️':'At risk 🔴';

    // Per-property rows
    const propRows = D.properties.map(p => {
      const rag = calcRAG(p.id);
      const ragColMap = { green:'#00A87A', amber:'#D97706', red:'#E53E3E' };
      const col = ragColMap[rag.rag]||'#7A8FA6';
      const pCerts = D.certs.filter(c=>String(c.prop_id)===String(p.id));
      const expCount = pCerts.filter(c=>c.expiry&&new Date(c.expiry)<today).length;
      const dueCount = pCerts.filter(c=>{if(!c.expiry)return false;const d=Math.round((new Date(c.expiry)-today)/864e5);return d>=0&&d<=60;}).length;
      const tenant = D.tenants.find(t=>String(t.prop_id)===String(p.id)&&t.status==='Active');
      return `<tr>
        <td style="padding:10px 12px;border-bottom:1px solid #eee;font-size:13px;font-weight:600">${p.address}${p.city?', '+p.city:''}</td>
        <td style="padding:10px 12px;border-bottom:1px solid #eee;font-size:14px;font-weight:700;color:${col}">${rag.score}/100</td>
        <td style="padding:10px 12px;border-bottom:1px solid #eee;font-size:12px;color:${col};font-weight:600">${rag.label}</td>
        <td style="padding:10px 12px;border-bottom:1px solid #eee;font-size:12px;color:#7A8FA6">${expCount>0?`<span style="color:#E53E3E;font-weight:600">${expCount} expired</span>`:dueCount>0?`<span style="color:#D97706">${dueCount} due soon</span>`:'<span style="color:#00A87A">All clear</span>'}</td>
        <td style="padding:10px 12px;border-bottom:1px solid #eee;font-size:12px;color:#7A8FA6">${tenant?tenant.name:'Vacant'}</td>
      </tr>`;
    }).join('');

    // Action items — expiring certs
    const actionItems = D.certs
      .filter(c => { if(!c.expiry) return false; const d=Math.round((new Date(c.expiry)-today)/864e5); return d<=60; })
      .sort((a,b)=>new Date(a.expiry)-new Date(b.expiry))
      .slice(0,5);
    const actionHtml = actionItems.length ? `
      <h3 style="font-size:14px;font-weight:700;margin:20px 0 10px;color:#1A2B45">⚡ Action required</h3>
      <table style="width:100%;border-collapse:collapse;margin-bottom:16px;border:1px solid #eee">
        <thead><tr style="background:#0B1E3D">
          <th style="padding:8px 12px;color:#fff;text-align:left;font-size:11px">Certificate</th>
          <th style="padding:8px 12px;color:#fff;text-align:left;font-size:11px">Property</th>
          <th style="padding:8px 12px;color:#fff;text-align:left;font-size:11px">Status</th>
          <th style="padding:8px 12px;color:#fff;text-align:left;font-size:11px">Expiry</th>
        </tr></thead>
        <tbody>${actionItems.map(c => {
          const daysLeft = Math.round((new Date(c.expiry)-today)/864e5);
          const prop = P(c.prop_id)||{address:'—'};
          const col = daysLeft<0?'#E53E3E':daysLeft<=14?'#D97706':'#3B6FE8';
          const status = daysLeft<0?`${Math.abs(daysLeft)}d overdue`:daysLeft===0?'Expires today':`${daysLeft}d left`;
          return `<tr><td style="padding:8px 12px;border-bottom:1px solid #eee;font-size:12px">${c.type}</td><td style="padding:8px 12px;border-bottom:1px solid #eee;font-size:12px;color:#7A8FA6">${prop.address}</td><td style="padding:8px 12px;border-bottom:1px solid #eee;font-size:12px;font-weight:600;color:${col}">${status}</td><td style="padding:8px 12px;border-bottom:1px solid #eee;font-size:12px;color:#7A8FA6">${new Date(c.expiry).toLocaleDateString('en-GB')}</td></tr>`;
        }).join('')}</tbody>
      </table>` : '';

    const html = `<div style="font-family:DM Sans,Arial,sans-serif;color:#1A2B45;max-width:620px;margin:0 auto">
      <div style="background:#0B1E3D;padding:20px 24px;border-radius:10px 10px 0 0">
        <div style="font-size:17px;font-weight:700;color:#fff">Rent<span style="color:#00C896">Safe AI</span></div>
        <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px">Weekly compliance digest · ${today.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      <div style="background:#fff;border:1px solid #E4EAF1;border-top:none;border-radius:0 0 10px 10px;padding:24px">

        <!-- Portfolio score banner -->
        <div style="background:#0B1E3D;border-radius:10px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:20px">
          <div>
            <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Portfolio compliance score</div>
            <div style="font-size:42px;font-weight:700;color:${scoreCol};line-height:1">${portfolioScore}</div>
            <div style="font-size:13px;font-weight:600;color:${scoreCol};margin-top:4px">${scoreLabel}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:4px">${D.properties.length} propert${D.properties.length!==1?'ies':'y'}</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:4px">${D.tenants.filter(t=>t.status==='Active').length} active tenant${D.tenants.filter(t=>t.status==='Active').length!==1?'s':''}</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.5)">${totalCerts} certificates tracked</div>
          </div>
        </div>

        <!-- Per-property breakdown -->
        <h3 style="font-size:14px;font-weight:700;margin:0 0 10px;color:#1A2B45">Property breakdown</h3>
        <table style="width:100%;border-collapse:collapse;margin-bottom:16px;border:1px solid #eee">
          <thead><tr style="background:#F6F8FB">
            <th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#7A8FA6;text-transform:uppercase;letter-spacing:.4px">Property</th>
            <th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#7A8FA6;text-transform:uppercase;letter-spacing:.4px">Score</th>
            <th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#7A8FA6;text-transform:uppercase;letter-spacing:.4px">Status</th>
            <th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#7A8FA6;text-transform:uppercase;letter-spacing:.4px">Certs</th>
            <th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#7A8FA6;text-transform:uppercase;letter-spacing:.4px">Tenant</th>
          </tr></thead>
          <tbody>${propRows}</tbody>
        </table>

        ${actionHtml}

        <div style="text-align:center;margin-top:20px">
          <a href="https://rentsafeai.co.uk/landlord.html" style="background:#0B1E3D;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;display:inline-block">Open RentSafe AI dashboard →</a>
        </div>
        <p style="font-size:11px;color:#999;margin-top:16px;text-align:center;border-top:1px solid #eee;padding-top:12px">Sent weekly by RentSafe AI · Manage reminders in Settings</p>
      </div>
    </div>`;

    await sendReminder(
      `📊 Weekly compliance digest — Portfolio score: ${portfolioScore}/100`,
      html, 'REMINDER_COMPLIANCE_DIGEST', 'portfolio', `digest_${today.toISOString().slice(0,10)}`
    );
  }
}

// ── PAGE: REMINDERS ──
function pgReminders() {
  const prefs = getReminderPrefs();
  const today = new Date(); today.setHours(0,0,0,0);

  // Calculate next fire date for each type
  function nextFire(id) {
    const events = getCalEvents();
    const typeMap = { cert:'cert', licence:'licence', insurance:'insurance', mortgage:'mortgage', tenancy:'tenancy', boiler:'boiler', rtr:'compliance', rent:'rent', s13:'tenancy', rra:'compliance' };
    const t = typeMap[id];
    const match = events.filter(e => e.type === t && e.days >= -1 && e.days <= 180);
    if (!match.length) return null;
    const soonest = match.sort((a,b)=>a.days-b.days)[0];
    return soonest;
  }

  const cards = REMINDER_TYPES.map(rt => {
    const enabled = isReminderEnabled(rt.id);
    const next = nextFire(rt.id);
    const nextStr = next ? `Next: ${next.label} · ${calDayLabel(next.days)}` : 'No upcoming events';
    const milestoneStr = rt.milestones.map(m => rt.unit === 'days' ? `${m}d before` : rt.unit === 'days late' ? `${m}d late` : 'on unlock').join(', ');
    return `<div style="background:var(--white);border:1px solid ${enabled?'var(--border)':'var(--border)'};border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;opacity:${enabled?'1':'0.55'}">

async function moveStage(id,stage){
  const statusMap={'Reported':'Open','Assigned':'Open','In Progress':'Open','Completed':'Resolved','Closed':'Resolved'};
  const{error}=await sb.from('maintenance').update({
    stage,status:statusMap[stage]||'Open',
    completed_date:(stage==='Completed'||stage==='Closed')?new Date().toISOString().slice(0,10):null
  }).eq('id',id);
  if(error){toast('Error: '+error.message,true);return;}
  const m=D.maintenance.find(x=>String(x.id)===String(id));
  if(m){m.stage=stage;m.status=statusMap[stage]||'Open';}
  await logAudit('UPDATE_STAGE','maintenance',id,`Stage → ${stage}`);

  // Auto-notify tenant on key stage changes
  const notifyStages = ['Assigned','In Progress','Completed'];
  if (notifyStages.includes(stage)) {
    const prop = P(m?.prop_id);

async function updateIssueStatus(id,status){
  const stageMap={'Open':'Reported','In progress':'In Progress','Resolved':'Completed'};
  const{error}=await sb.from('maintenance').update({status,stage:stageMap[status]||'Reported'}).eq('id',id);
  if(error){toast('Error: '+error.message,true);return;}
  const m=D.maintenance.find(x=>String(x.id)===String(id));
  if(m){m.status=status;m.stage=stageMap[status]||m.stage;}
  await logAudit('UPDATE_MAINTENANCE','maintenance',id,`Status → ${status}`);
  toast(`✓ Marked as ${status}`);
  nav('maintenance');
}

// ── CALENDAR EVENTS ENGINE ──
function getCalEvents(){
  const events=[];
  const today=new Date(); today.setHours(0,0,0,0);

  // ── Certificate expiries ──
  D.certs.filter(c=>c.expiry).forEach(c=>{
    const d=new Date(c.expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const prop=(P(c.prop_id)||{address:'—'}).address;
    const urg=days<0?'red':days<=7?'red':days<=30?'amber':'blue';
    events.push({date:c.expiry,type:'cert',label:c.type+' expiry',sub:prop,urg,days,icon:'📄',pid:c.prop_id});
  });

  // ── Rent due dates (monthly recurring — 6 months) ──
  D.tenants.filter(t=>t.rent&&t.status==='Active').forEach(t=>{
    const prop=(P(t.prop_id)||{address:'—'}).address;
    const day=t.rent_day||1;
    for(let m=0;m<6;m++){
      const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+m); d.setDate(day);
      const days=Math.round((d-today)/864e5);
      if(days>=-1&&days<=180){
        const dStr=d.toISOString().slice(0,10);
        const urg=days<0?'red':days===0?'red':days<=3?'amber':'blue';
        events.push({date:dStr,type:'rent',label:`Rent due — ${t.name}`,sub:`£${(t.rent||0).toLocaleString()} · ${prop}`,urg,days,icon:'💷',pid:t.prop_id});
      }
    }
  });

  // ── Insurance expiries ──
  D.insurance&&D.insurance.filter(i=>i.expiry).forEach(i=>{
    const d=new Date(i.expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const prop=(P(i.prop_id)||{address:'—'}).address;
    const urg=days<0?'red':days<=14?'red':days<=60?'amber':'blue';
    events.push({date:i.expiry,type:'insurance',label:`${i.type||'Insurance'} renewal`,sub:prop,urg,days,icon:'🛡',pid:i.prop_id});
  });

  // ── Mortgage end dates ──
  D.properties.filter(p=>p.mortgage_end).forEach(p=>{
    const d=new Date(p.mortgage_end); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const urg=days<0?'red':days<=30?'red':days<=90?'amber':'blue';
    events.push({date:p.mortgage_end,type:'mortgage',label:'Mortgage end',sub:p.address,urg,days,icon:'🏦',pid:p.id});
  });

  // ── Licence expiries ──
  D.properties.filter(p=>p.licence_expiry).forEach(p=>{
    const d=new Date(p.licence_expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const urg=days<0?'red':days<=14?'red':days<=60?'amber':'blue';
    events.push({date:p.licence_expiry,type:'licence',label:`${p.licence_type||'Licence'} expiry`,sub:p.address,urg,days,icon:'📋',pid:p.id});
  });

  // ── Tenancy end dates ──
  D.tenants.filter(t=>t.end_date&&t.status==='Active').forEach(t=>{
    const d=new Date(t.end_date); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const prop=(P(t.prop_id)||{address:'—'}).address;
    const urg=days<0?'red':days<=30?'red':days<=90?'amber':'blue';
    events.push({date:t.end_date,type:'tenancy',label:`Tenancy ends — ${t.name}`,sub:prop,urg,days,icon:'🔑',pid:t.prop_id});
  });

  // ── Tenancy 12-month anniversary (S.13 eligibility unlocks) ──
  D.tenants.filter(t=>t.start_date&&t.status==='Active').forEach(t=>{
    const anniv=new Date(t.start_date);
    anniv.setFullYear(anniv.getFullYear()+1);
    anniv.setHours(0,0,0,0);
    const days=Math.round((anniv-today)/864e5);
    if(days>=-7&&days<=180){
      const prop=(P(t.prop_id)||{address:'—'}).address;
      const urg=days<=0?'blue':days<=14?'blue':'blue';
      events.push({date:anniv.toISOString().slice(0,10),type:'tenancy',label:`S.13 eligible — ${t.name}`,sub:`Can now propose rent increase · ${prop}`,urg:'blue',days,icon:'📈',pid:t.prop_id});
    }
  });

  // ── Boiler service next due ──
  D.properties.filter(p=>p.boiler_next_service).forEach(p=>{
    const d=new Date(p.boiler_next_service); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const urg=days<0?'red':days<=14?'red':days<=60?'amber':'blue';
    events.push({date:p.boiler_next_service,type:'boiler',label:'Boiler service due',sub:`${p.boiler_engineer?'Engineer: '+p.boiler_engineer+' · ':''}${p.address}`,urg,days,icon:'🔧',pid:p.id});
  });

  // ── Right to Rent re-check ──
  D.tenants.filter(t=>t.rtr_expiry&&t.status==='Active').forEach(t=>{
    const d=new Date(t.rtr_expiry); d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const prop=(P(t.prop_id)||{address:'—'}).address;
    const urg=days<0?'red':days<=14?'red':days<=60?'amber':'blue';
    events.push({date:t.rtr_expiry,type:'compliance',label:`Right to Rent re-check — ${t.name}`,sub:`Document expires · ${prop}`,urg,days,icon:'🔍',pid:t.prop_id});
  });

  // ── Open maintenance jobs ──
  D.maintenance.filter(m=>m.status!=='Resolved'&&m.status!=='Closed').forEach(m=>{
    const d=new Date(m.date||m.issue_date||m.created_at||today);
    d.setHours(0,0,0,0);
    const days=Math.round((d-today)/864e5);
    const prop=(P(m.prop_id)||{address:'—'}).address;
    const urg=m.priority==='Urgent'||m.awaab?'red':m.priority==='High'?'amber':'blue';
    events.push({date:d.toISOString().slice(0,10),type:'maintenance',label:`${m.title||'Maintenance job'}`,sub:`${m.stage||m.status||'Open'} · ${prop}`,urg,days,icon:'🔧',pid:m.prop_id,mid:m.id});
  });

  // ── RRA sheet deadline (31 May 2026) if not sent ──
  const rraSentIds=new Set(D.emailLog.filter(e=>e.template_id==='rra_info_sheet'&&e.status==='Sent').map(e=>String(e.tenant_id)));
  D.tenants.filter(t=>t.status==='Active'&&!rraSentIds.has(String(t.id))).forEach(t=>{
    const daysToDeadline=Math.round((new Date('2026-05-31')-today)/864e5);
    if(daysToDeadline>=-1){
      const prop=(P(t.prop_id)||{address:'—'}).address;
      const urg=daysToDeadline<=7?'red':daysToDeadline<=30?'amber':'blue';
      events.push({date:'2026-05-31',type:'compliance',label:`RRA sheet unsent — ${t.name}`,sub:`Deadline 31 May 2026 · Fine up to £7,000 · ${prop}`,urg,days:daysToDeadline,icon:'⚠️',pid:t.prop_id});
    }
  });

  return events.sort((a,b)=>new Date(a.date)-new Date(b.date));
}

function calDayLabel(days){
  if(days<0) return Math.abs(days)+' days overdue';
  if(days===0) return 'Today';
  if(days===1) return 'Tomorrow';
  if(days<=7) return 'In '+days+' days';
  if(days<=30) return 'In '+days+' days';
  return new Date(Date.now()+days*864e5).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function pgCalendar(){
  if(window.calYear===undefined){window.calYear=new Date().getFullYear();window.calMonth=new Date().getMonth();}
  if(window.calFilter===undefined){window.calFilter='all';window.calProp='';}
  const yr=window.calYear,mo=window.calMonth;
  const now=new Date(); now.setHours(0,0,0,0);
  const mn=new Date(yr,mo,1).toLocaleString('en-GB',{month:'long',year:'numeric'});
  const fd=(new Date(yr,mo,1).getDay()+6)%7;
  const dim=new Date(yr,mo+1,0).getDate();
  const dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // All events + apply filters
  let allEvents=getCalEvents();
  if(window.calProp) allEvents=allEvents.filter(e=>String(e.pid)===String(window.calProp));
  if(window.calFilter!=='all') allEvents=allEvents.filter(e=>e.type===window.calFilter);

  // Summary counts
  const urgentCount = allEvents.filter(e=>e.days<=7&&e.days>=-1).length;
  const soonCount   = allEvents.filter(e=>e.days>7&&e.days<=30).length;

  // Build event map for current month
  const evMap={};
  allEvents.forEach(ev=>{
    const d=new Date(ev.date);
    if(d.getFullYear()===yr&&d.getMonth()===mo){
      const k=d.getDate(); if(!evMap[k]) evMap[k]=[]; evMap[k].push(ev);
    }
  });

  // Calendar cells — up to 3 coloured dots per day
  let cells='';
  for(let i=0;i<fd;i++) cells+=`<div class="cc"></div>`;
  for(let d=1;d<=dim;d++){
    const isToday=(yr===now.getFullYear()&&mo===now.getMonth()&&d===now.getDate());
    const dayEvs=evMap[d]||[];
    const dotColors=[...new Set(dayEvs.map(e=>e.urg==='red'?'#E53E3E':e.urg==='amber'?'#D97706':'#3B6FE8'))].slice(0,3);
    const dots=dotColors.map(c=>`<div style="width:4px;height:4px;border-radius:50%;background:${c}"></div>`).join('');
    cells+=`<div class="cc cm${isToday?' td':''}" onclick="${dayEvs.length?`showCalDay(${yr},${mo},${d})`:'void(0)'}" style="cursor:${dayEvs.length?'pointer':'default'}">
      ${d}
      <div style="display:flex;justify-content:center;gap:2px;margin-top:2px;min-height:6px">${dots}</div>
    </div>`;
  }

  // Today's events summary strip
  const todayEvs = allEvents.filter(e=>{const ev=new Date(e.date);return ev.getFullYear()===now.getFullYear()&&ev.getMonth()===now.getMonth()&&ev.getDate()===now.getDate();});
  const todayStrip = todayEvs.length ? `<div style="background:var(--navy);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.4px;flex-shrink:0">📅 Today</div>
    ${todayEvs.slice(0,3).map(e=>`<div style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);border-radius:6px;padding:4px 10px">
      <span style="font-size:12px">${e.icon}</span>
      <span style="font-size:11px;color:#fff;font-weight:500">${e.label}</span>
    </div>`).join('')}
    ${todayEvs.length>3?`<div style="font-size:11px;color:rgba(255,255,255,0.5)">+${todayEvs.length-3} more</div>`:''}
  </div>` : '';

  // Property filter options
  const propOpts = `<option value="">All properties</option>`+D.properties.map(p=>`<option value="${p.id}"${String(p.id)===String(window.calProp)?' selected':''}>${p.address}</option>`).join('');

  // Event type filter chips
  const filterTypes=[
    {k:'all',label:'All',icon:'📅'},
    {k:'cert',label:'Certs',icon:'📄'},
    {k:'maintenance',label:'Jobs',icon:'🔧'},
    {k:'rent',label:'Rent',icon:'💷'},
    {k:'tenancy',label:'Tenancy',icon:'🔑'},
    {k:'insurance',label:'Insurance',icon:'🛡'},
    {k:'compliance',label:'Compliance',icon:'⚠️'},
    {k:'boiler',label:'Boiler',icon:'🔥'},
    {k:'mortgage',label:'Mortgage',icon:'🏦'},
  ];
  const filterChips = filterTypes.map(f=>`<button onclick="window.calFilter='${f.k}';nav('calendar')" style="padding:5px 12px;border-radius:100px;font-size:11px;font-weight:${window.calFilter===f.k?'700':'500'};border:1px solid ${window.calFilter===f.k?'var(--navy)':'var(--border)'};background:${window.calFilter===f.k?'var(--navy)':'var(--white)'};color:${window.calFilter===f.k?'#fff':'var(--muted)'};cursor:pointer;font-family:var(--font)">${f.icon} ${f.label}</button>`).join('');

  // Upcoming panel — grouped by time window, 180 days
  const upcoming = allEvents.filter(e=>e.days>=-1&&e.days<=180);

function calNav(dir){
  if(window.calYear===undefined){window.calYear=new Date().getFullYear();window.calMonth=new Date().getMonth();}
  window.calMonth+=dir;
  if(window.calMonth>11){window.calMonth=0;window.calYear++;}
  if(window.calMonth<0){window.calMonth=11;window.calYear--;}
  nav('calendar');
}

function showCalDay(yr,mo,d){
  const allEvents=getCalEvents();
  const dayEvs=allEvents.filter(e=>{const ev=new Date(e.date);return ev.getFullYear()===yr&&ev.getMonth()===mo&&ev.getDate()===d;});
  const panel=document.getElementById('cal-day-detail');

  if(!panel||!dayEvs.length) return;

  const bg=e=>e.urg==='red'?'var(--red-bg)':e.urg==='amber'?'var(--amber-bg)':'var(--blue-bg)';

// ── FINANCE HELPERS ──
function getMaintCostTotal(pid){
  const fromJA = D.jobAssignments
    .filter(j => j.tenant_maintenance && String(j.tenant_maintenance.prop_id) === String(pid))
    .reduce((s,j) => s + (j.cost||0), 0);
  const fromM = D.maintenance
    .filter(m => String(m.prop_id) === String(pid))
    .reduce((s,m) => s + (m.cost||0), 0);
  return fromJA + fromM;
}
function getMaintCostMonthly(pid){
  return getMaintCostTotal(pid) / 12;
}
function getMonthlyPL(pid){
  const out = [];
  const now = new Date();
  for(let i=5; i>=0; i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label = d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'});
    const income = D.rent
      .filter(r => String(r.prop_id)===String(pid) && r.status==='Paid')
      .filter(r => { const pd = r.paid_date||r.paid; return pd && pd.startsWith(key); })
      .reduce((s,r) => s+(r.amount||0), 0);
    const maintJA = D.jobAssignments
      .filter(j => j.tenant_maintenance && String(j.tenant_maintenance.prop_id)===String(pid))
      .filter(j => j.completed_at && j.completed_at.startsWith(key))
      .reduce((s,j) => s+(j.cost||0), 0);
    const maintM = D.maintenance
      .filter(m => String(m.prop_id)===String(pid) && m.cost)
      .filter(m => { const rd = m.resolved_at||m.actioned_at; return rd && rd.startsWith(key); })
      .reduce((s,m) => s+(m.cost||0), 0);
    const maint = maintJA + maintM;
    const prop = D.properties.find(x => String(x.id)===String(pid));
    const mortgage = prop ? (prop.mortgage_monthly||0) : 0;
    const ins = D.insurance.filter(ii=>String(ii.prop_id)===String(pid)).reduce((s,ii)=>s+(ii.premium||0)/12,0);
    const expenses = mortgage + ins + maint;
    const profit = income ? income - expenses : null;
    out.push({ key, label, income, mortgage, ins: Math.round(ins), maint: Math.round(maint), expenses: Math.round(expenses), profit });
  }
  return out;
}

function pgMTD() {
  const profile = getMTDProfile();
  const taxYear = new Date().getMonth() >= 3
    ? new Date().getFullYear()
    : new Date().getFullYear() - 1;
  const taxYearLabel = `${taxYear}/${String(taxYear+1).slice(2)}`;

  // ── Portfolio income & costs from existing data ──
  const totalMonthlyRent = D.properties.reduce((s,p) => s + (p.rent||0), 0);
  const totalAnnualRent = totalMonthlyRent * 12;
  const totalMortgageAnnual = D.properties.reduce((s,p) => s + (p.mortgage_monthly||0)*12, 0);
  const mortgageInterestAnnual = Math.round(totalMortgageAnnual * (parseFloat(profile.interestPct||100)/100));
  const totalMaintAnnual = D.properties.reduce((s,p) => s + getMaintCostTotal(p.id), 0);
  const totalInsAnnual = D.insurance.reduce((s,ii) => s + (ii.premium||0), 0);
  const allowableExpenses = totalMaintAnnual + totalInsAnnual;
  const otherExpenses = parseFloat(profile.otherExpenses||0);

  // Section 24: full finance cost relief removed, 20% basic rate credit only
  const financeCredit = Math.round(mortgageInterestAnnual * 0.20);
  const taxableIncome = Math.max(0, totalAnnualRent - allowableExpenses - otherExpenses);
  const band = profile.taxBand || 'basic';
  const taxRate = band === 'higher' ? 0.40 : band === 'additional' ? 0.45 : 0.20;
  const grossTax = Math.round(taxableIncome * taxRate);
  const netTaxDue = Math.max(0, grossTax - financeCredit);
  const quarterlyPayment = Math.round(netTaxDue / 4);

  // ── MTD threshold check ──
  const threshold2025 = 50000;
  const threshold2026 = 30000;
  const threshold2027 = 20000;
  const threshold2028 = 10000;
  const mtdMandatory = totalAnnualRent >= threshold2026;
  const mtdStatus = totalAnnualRent >= threshold2025
    ? { label: 'Mandatory now', col: 'var(--red)', bg: 'var(--red-bg)' }
    : totalAnnualRent >= threshold2026
    ? { label: 'Mandatory from April 2026', col: 'var(--amber)', bg: 'var(--amber-bg)' }
    : totalAnnualRent >= threshold2027
    ? { label: 'Mandatory from April 2027', col: 'var(--blue)', bg: 'var(--blue-bg)' }
    : { label: 'Mandatory from April 2028', col: 'var(--muted)', bg: 'var(--off)' };

  // ── Quarterly deadline calc ──
  const quarters = [
    { q: 'Q1', period: '6 Apr – 5 Jul', due: `${taxYear}-08-07`, label: 'Q1' },
    { q: 'Q2', period: '6 Jul – 5 Oct', due: `${taxYear}-11-07`, label: 'Q2' },
    { q: 'Q3', period: '6 Oct – 5 Jan', due: `${taxYear+1}-02-07`, label: 'Q3' },
    { q: 'Q4', period: '6 Jan – 5 Apr', due: `${taxYear+1}-05-07`, label: 'Q4' },
  ];
  const today = new Date(); today.setHours(0,0,0,0);

  function qStatus(dueStr) {
    const d = new Date(dueStr); d.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 864e5);
    if (diff < 0) return { label: `Overdue by ${Math.abs(diff)}d`, col: 'var(--red)', bg: 'var(--red-bg)' };
    if (diff <= 30) return { label: `Due in ${diff} days`, col: 'var(--amber)', bg: 'var(--amber-bg)' };
    return { label: `Due ${new Date(dueStr).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`, col: 'var(--blue)', bg: 'var(--blue-bg)' };
  }

  const qCards = quarters.map(q => {
    const s = qStatus(q.due);
    const qIncome = Math.round(totalAnnualRent / 4);
    const qExpenses = Math.round((allowableExpenses + otherExpenses) / 4);
    return `<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--txt)">${q.q} · ${q.period}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Due ${new Date(q.due).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
        </div>
        <span style="font-size:11px;font-weight:600;color:${s.col};background:${s.bg};padding:3px 10px;border-radius:100px">${s.label}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div style="background:var(--green-bg);border-radius:7px;padding:10px">
          <div style="font-size:10px;color:var(--green-dark);font-weight:600;margin-bottom:2px">INCOME</div>
          <div style="font-size:18px;font-weight:700;color:var(--green-dark)">£${qIncome.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--muted)">Pre-filled from rent records</div>
        </div>
        <div style="background:var(--red-bg);border-radius:7px;padding:10px">
          <div style="font-size:10px;color:var(--red);font-weight:600;margin-bottom:2px">ALLOWABLE EXPENSES</div>
          <div style="font-size:18px;font-weight:700;color:var(--red)">£${qExpenses.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--muted)">Maint + insurance + other</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--off);border-radius:7px">
        <span style="font-size:12px;font-weight:600;color:var(--txt)">Quarterly tax payment</span>
        <span style="font-size:16px;font-weight:700;color:var(--navy)">~£${quarterlyPayment.toLocaleString()}</span>
      </div>
    </div>`;
  }).join('');

  // ── Section 24 explainer ──
  const s24Html = `<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px">
    <div class="ph2">
      <div><h2>Section 24 — Finance Cost Relief</h2><p>Mortgage interest restriction impact on your tax bill</p></div>
    </div>
    <div style="padding:18px">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">

          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Mortgage interest (annual)</div>
          <div style="font-size:22px;font-weight:700;color:var(--txt)">£${mortgageInterestAnnual.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${profile.interestPct||100}% of total mortgage cost</div>
        </div>
        <div style="text-align:center;padding:14px;background:var(--green-bg);border-radius:8px">
          <div style="font-size:11px;color:var(--green-dark);margin-bottom:4px">20% tax credit (S24)</div>
          <div style="font-size:22px;font-weight:700;color:var(--green-dark)">£${financeCredit.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">Deducted from gross tax</div>
        </div>
        <div style="text-align:center;padding:14px;background:var(--red-bg);border-radius:8px">
          <div style="font-size:11px;color:var(--red);margin-bottom:4px">Net tax due</div>
          <div style="font-size:22px;font-weight:700;color:var(--red)">£${netTaxDue.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">After S24 credit applied</div>
        </div>
      </div>
      <div style="background:#FEF3C7;border-radius:8px;padding:12px 14px;font-size:12px;color:#92400E;line-height:1.6">
        ⚠️ <strong>Section 24 impact:</strong> You cannot deduct mortgage interest as an expense. Instead, you get a 20% basic-rate tax credit (£${financeCredit.toLocaleString()}/yr). If you pay higher-rate tax, this costs you more. Consider speaking to an accountant about Ltd company structure.
      </div>
    </div>
  </div>`;

  // ── CSV Export ──
  // (function defined separately below)

  return `<div class="topbar"><span class="tb-title">MTD Tax — ${taxYearLabel}</span><div class="tb-right">

function mtdExportCSV() {
  const profile = getMTDProfile();
  const taxYear = new Date().getMonth() >= 3 ? new Date().getFullYear() : new Date().getFullYear() - 1;
  const taxYearLabel = `${taxYear}/${String(taxYear+1).slice(2)}`;
  const totalAnnualRent = D.properties.reduce((s,p) => s + (p.rent||0), 0) * 12;
  const totalMortgageAnnual = D.properties.reduce((s,p) => s + (p.mortgage_monthly||0)*12, 0);
  const mortgageInterestAnnual = Math.round(totalMortgageAnnual * (parseFloat(profile.interestPct||100)/100));
  const totalMaintAnnual = D.properties.reduce((s,p) => s + getMaintCostTotal(p.id), 0);
  const totalInsAnnual = D.insurance.reduce((s,ii) => s + (ii.premium||0), 0);
  const otherExpenses = parseFloat(profile.otherExpenses||0);
  const allowableExpenses = totalMaintAnnual + totalInsAnnual + otherExpenses;
  const financeCredit = Math.round(mortgageInterestAnnual * 0.20);
  const taxableIncome = Math.max(0, totalAnnualRent - allowableExpenses);
  const band = profile.taxBand || 'basic';
  const taxRate = band === 'higher' ? 0.40 : band === 'additional' ? 0.45 : 0.20;
  const grossTax = Math.round(taxableIncome * taxRate);
  const netTaxDue = Math.max(0, grossTax - financeCredit);
  const quarters = ['Q1 (Apr–Jun)','Q2 (Jul–Sep)','Q3 (Oct–Dec)','Q4 (Jan–Mar)'];
  const rows = [
    ['RentSafe AI — MTD Summary Export','','',''],
    ['Tax Year', taxYearLabel,'',''],
    ['Generated', new Date().toLocaleDateString('en-GB'),'',''],
    ['','','',''],
    ['Property','Monthly Rent','Annual Rent','Mortgage (monthly)'],
    ...D.properties.map(p=>[p.address, p.rent||0, (p.rent||0)*12, p.mortgage_monthly||0]),
    ['','','',''],
    ['ANNUAL SUMMARY','','',''],
    ['Total rental income', `£${totalAnnualRent.toLocaleString()}`,'',''],
    ['Maintenance costs', `£${totalMaintAnnual.toLocaleString()}`,'',''],
    ['Insurance costs', `£${totalInsAnnual.toLocaleString()}`,'',''],
    ['Other allowable expenses', `£${otherExpenses.toLocaleString()}`,'',''],
    ['Total allowable expenses', `£${allowableExpenses.toLocaleString()}`,'',''],
    ['Taxable profit (before S24)', `£${taxableIncome.toLocaleString()}`,'',''],
    ['Mortgage interest (S24 restricted)', `£${mortgageInterestAnnual.toLocaleString()}`,'',''],
    ['S24 tax credit (20%)', `£${financeCredit.toLocaleString()}`,'',''],
    ['Net tax due (est.)', `£${netTaxDue.toLocaleString()}`,'',''],
    ['Tax band', band,'',''],
    ['','','',''],
    ['QUARTERLY BREAKDOWN','Income','Expenses','Tax payment'],
    ...quarters.map(q=>[q, `£${Math.round(totalAnnualRent/4).toLocaleString()}`, `£${Math.round(allowableExpenses/4).toLocaleString()}`, `£${Math.round(netTaxDue/4).toLocaleString()}`]),
    ['','','',''],
    ['DISCLAIMER','Figures are indicative only. Consult a qualified accountant.','',''],
  ];
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `rentsafeai_mtd_${taxYearLabel.replace('/','_')}.csv`;
  a.click();
  toast('✓ CSV exported');
}

function nav(page, param){
  const pageMap = {
    'prop-detail': 'properties',
    'tenants': 'properties',
    'rent': 'financials',
    'insurance': 'financials',
    'calendar': 'dashboard',
  };
  const activeTab = pageMap[page] || page;
  document.querySelectorAll('.sb-item[data-page]').forEach(el=>{
    el.classList.toggle('active', el.dataset.page === activeTab);
  });
  try {
    main.innerHTML=(PAGES[page]||pgDashboard)(param);
  } catch(err) {
    main.innerHTML='<div style="padding:32px;font-family:sans-serif"><h2 style="color:#E53E3E">Page Error: '+page+'</h2><pre style="background:#fff5f5;padding:16px;border-radius:8px;font-size:12px;overflow:auto;white-space:pre-wrap">'+err.stack+'</pre></div>';
    console.error('Nav error on page '+page+':', err);
  }
  main.scrollTo(0,0);
  // Async post-render hooks
  if (page === 'prop-detail' && param) {
    const activeTab = window._pdTab && window._pdTab[param] || 'tenant';
    if (activeTab === 'tenant') {
      initPropChecklist('ob', param, 'onboard');
      initPropChecklist('db', param, 'deboard');
    }
  }
}

// ── MARKDOWN → HTML (for template output) ──
function mdToHtml(md) {
  if (!md) return '';
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // Headings
    .replace(/^### (.+)$/gm,'<h5 style="font-size:13px;font-weight:700;margin:14px 0 4px;color:var(--txt)">$1</h5>')
    .replace(/^## (.+)$/gm,'<h4 style="font-size:14px;font-weight:700;margin:16px 0 5px;color:var(--txt)">$1</h4>')
    .replace(/^# (.+)$/gm,'<h3 style="font-size:16px;font-weight:700;margin:18px 0 6px;color:var(--navy)">$1</h3>')
    // Bold & italic
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    // Horizontal rule
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">')
    // Numbered lists
    .replace(/^\d+\. (.+)$/gm,'<div style="display:flex;gap:8px;margin:3px 0"><span style="color:var(--muted);min-width:18px;font-size:12px">•</span><span>$1</span></div>')
    // Bullet lists
    .replace(/^[-*] (.+)$/gm,'<div style="display:flex;gap:8px;margin:3px 0"><span style="color:var(--muted);min-width:18px">–</span><span>$1</span></div>')
    // Paragraphs (double newline)
    .replace(/\n\n/g,'</p><p style="margin:8px 0">')
    // Single newlines
    .replace(/\n/g,'<br>');
}
